[[bin]]
name = "cross-exchange-arbitrage-live-runner"
path = "src/bin/cross_exchange_arbitrage_live_runner.rs"

[[bin]]
name = "cross-arb-position-admin"
path = "src/bin/cross_arb_position_admin.rs"

[[bin]]
name = "local-gateway-smoke"
path = "src/bin/local_gateway_smoke.rs"
