[package]
name = "rustcta-gateway"
version.workspace = true
edition.workspace = true
publish.workspace = true

[dependencies]
anyhow.workspace = true
axum.workspace = true
chrono.workspace = true
rustcta-exchange-api.workspace = true
rustcta-exchange-gateway.workspace = true
rustcta-cross-arb-live-runner = { path = "../../crates/rustcta-cross-arb-live-runner" }
rustcta-observability.workspace = true
serde_json.workspace = true
tokio.workspace = true
tracing.workspace = true

[dev-dependencies]
chrono.workspace = true
serde_json.workspace = true
tower = "0.5"

[lib]
name = "rustcta_gateway_app"
