# Bitunix gateway adapter example.
# Credentials are read from environment variables by default:
# BITUNIX_API_KEY and BITUNIX_API_SECRET.

exchange: bitunix
market_types:
  - spot
  - perpetual
adapter: bitunix
enabled: true

api_key: ${BITUNIX_API_KEY}
api_secret: ${BITUNIX_API_SECRET}

spot_rest_base_url: https://openapi.bitunix.com
futures_rest_base_url: https://fapi.bitunix.com
testnet: false
sandbox: false

# Keep private REST disabled until read-only preflight, permissions, notional
# limits, and audit logging are verified with exchange-issued API keys.
enabled_private_rest: false
enabled_public_streams: false
enabled_private_streams: false

request_timeout_ms: 10000
order_timeout_ms: 10000
orderbook_depth: 100
log_raw_messages: false

enabled_symbols:
  spot:
    - BTCUSDT
    - ETHUSDT
  perpetual:
    - BTCUSDT
    - ETHUSDT

rate_limit:
  max_requests_per_second: 1
  burst: 2

permissions:
  required:
    - read_account
    - spot_trading
    - futures_trading
  optional:
    - positions
    - fee_rate

notes:
  - Bitunix Spot and USDT perpetual symbols use compact format, for example BTCUSDT.
  - Spot fills require an order id in the current adapter.
  - WebSocket request specs and Futures stream parsers are implemented; enable streams only after live-dry-run validation.
