service_name: smart-money
environment: local
log_level: info

postgres:
  enabled: false
  url_env: SMART_MONEY_POSTGRES_URL
  max_connections: 8
  connect_timeout_secs: 5
  statement_timeout_ms: 30000

clickhouse:
  enabled: false
  url: http://localhost:8123
  database: rustcta
  user_env: SMART_MONEY_CLICKHOUSE_USER
  password_env: SMART_MONEY_CLICKHOUSE_PASSWORD
  insert_batch_size: 1000
  flush_interval_secs: 5

redis:
  enabled: false
  url_env: SMART_MONEY_REDIS_URL
  key_prefix: smart_money
  pool_size: 4
  default_ttl_secs: 300

nats:
  enabled: false
  url_env: SMART_MONEY_NATS_URL
  subject_prefix: smart_money
  durable_name: smart_money_service
  request_timeout_secs: 5

binance_collector:
  enabled: false
  rest_base_url: https://fapi.binance.com
  ws_base_url: wss://fstream.binance.com/ws
  symbols:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
    - HYPEUSDT
    - ZECUSDT
  intervals:
    - 1m
  collect_trades: true
  collect_orderbook: true
  orderbook_depth: 20
  poll_interval_secs: 5

hyperliquid_wallet_ingestion:
  enabled: false
  api_base_url: https://api.hyperliquid.xyz
  wallets: &smart_money_hyperliquid_wallets
