strategy:
  name: "short_ladder_live_aggressive_usdc"
  version: "0.1.0"
  enabled: true
  log_level: "INFO"
  description: "BJT 19-06 + L1 only + 动态 ATR 止盈 + L1 45秒挂单转市价；仅做空 USDC 合约，单交易对最大名义仓位 200U，重启后按交易所真实空头仓位接管 L1 进度。"

account:
  account_id: "binance_hcr"
  market_type: "Futures"
  dual_position_mode: true
  default_leverage: 10

data:
  poll_interval_secs: 30
  decision_interval: "5m"
  kline_limit: 720
  session_start_hour_utc: 11
  session_end_hour_utc: 22

symbols:
  - symbol: "BOME/USDC"
    enabled: true
    initial_notional: 50.0
    max_notional: 50.0
    leverage: 10
  - symbol: "1000BONK/USDC"
    enabled: true
    initial_notional: 50.0
    max_notional: 50.0
    leverage: 10
  - symbol: "ENA/USDC"
    enabled: true
    initial_notional: 50.0
    max_notional: 50.0
    leverage: 10
  - symbol: "TIA/USDC"
    enabled: true
    initial_notional: 50.0
    max_notional: 50.0
    leverage: 10
  - symbol: "CRV/USDC"
    enabled: true
    initial_notional: 50.0
    max_notional: 50.0
    leverage: 10
  - symbol: "ETHFI/USDC"
    enabled: true
    initial_notional: 50.0
    max_notional: 50.0
    leverage: 10
  - symbol: "ORDI/USDC"
    enabled: true
    initial_notional: 50.0
    max_notional: 50.0
    leverage: 10
  - symbol: "FIL/USDC"
    enabled: true
    initial_notional: 50.0
    max_notional: 50.0
    leverage: 10
  - symbol: "ARB/USDC"
    enabled: true
    initial_notional: 50.0
    max_notional: 50.0
    leverage: 10
  - symbol: "AVAX/USDC"
    enabled: true
    initial_notional: 50.0
    max_notional: 50.0
    leverage: 10

signal:
  atr_period: 14
  rsi_period: 14
  entry_rsi_min: 52.0
  entry_requires_lower_close: false
  entry_requires_prior_high_sweep: false
  filter_15m_ema: 50
  filter_1h_ema: 50
  final_layer_requires_strong_1h: true
  strong_1h_ema_slope_lookback: 3
  strong_1h_ema_slope_max_pct: -0.03

ladder:
  layer_weights: [1.0]
  layer_spacing_atr: 0.55
  take_profit_atr: 1.2
  take_profit_mode: "atr_trailing"
  trailing_take_profit_activation_atr: 2.0
  trailing_take_profit_distance_atr: 2.0
  stop_loss_atr: 2.4
  max_hold_bars: 48
  breakeven_stop: false
  adopt_progress_tolerance_pct: 0.02

execution:
  use_post_only_entry: true
  maker_price_offset_bps: 1.0
  order_cooldown_secs: 900
  initial_order_taker_fallback_secs: 45
  close_with_market_order: true
  take_profit_maker_first: true
  take_profit_maker_timeout_secs: 45
  take_profit_maker_poll_secs: 5
  websocket:
    enabled: true
    exit_check_interval_ms: 1000
    trailing_update_interval_secs: 15
    reconnect_delay_secs: 5

notifications:
  enabled: true
  wechat_webhook_url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=21c70d13-f279-4af7-adc7-a99f3bb10905"
