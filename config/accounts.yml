# 统一账户配置文件
# 所有账户的集中管理
version: "1.0"

# 第一版账户定义：每个交易所只保留一个标准账户。
accounts:
  binance:
    name: Binance
    exchange: binance
    type: futures
    description: "Binance 标准账户"
    env_prefix: BINANCE
    enabled: true
    settings:
      max_positions: 10
      max_orders_per_symbol: 20
      leverage: 10

  bitget:
    name: Bitget
    exchange: bitget
    type: futures
    description: "Bitget 标准账户"
    env_prefix: BITGET
    enabled: true
    settings:
      max_positions: 10
      max_orders_per_symbol: 20
      leverage: 10

  gate:
    name: Gate.io
    exchange: gate
    type: futures
    description: "Gate.io 标准账户"
    env_prefix: GATE
    enabled: true
    settings:
      max_positions: 10
      max_orders_per_symbol: 20
      leverage: 10

  # ===== 其他交易所 =====
  bitmart:
    name: BitMart
    exchange: bitmart
    type: futures
    description: "BitMart 标准账户"
    env_prefix: BITMART
    enabled: true
    settings:
      max_positions: 10
      max_orders_per_symbol: 20
      
  htx:
    name: HTX
    exchange: htx
    type: spot
    description: "HTX 标准账户"
    env_prefix: HTX
    enabled: false
    settings:
      max_positions: 10
      max_orders_per_symbol: 20
  
  # ===== HyperLiquid 账户 =====
  hyperliquid:
    name: HyperLiquid
    exchange: hyperliquid
    type: futures
    description: "HyperLiquid 标准账户 - 永续合约"
    env_prefix: HYPERLIQUID
    enabled: true
    settings:
      max_positions: 10
      max_orders_per_symbol: 20
      leverage: 10

# 账户分组（可选）
groups:
  production:
    - binance
    - bitget
    - gate
    - hyperliquid
    
  testing:
    - bitmart
    
  disabled:
    - htx

# 默认设置
defaults:
  max_positions: 10
  max_orders_per_symbol: 20
  leverage: 10
  recv_window: 5000  # 时间窗口，解决时间戳问题
