# BNB/USDC 泊松做市策略配置
# 免手续费合约，双向持仓版本

name: "POISSON_BNB_USDC"
enabled: true
version: "1.0.0"

account:
  account_id: "binance_hcr"
  exchange: "binance"

trading:
  symbol: "BNB/USDC"
  order_size_usdc: 11.5        # ≈0.01 BNB @ 1115 USDC
  max_inventory: 2230.0        # ≈2 BNB 的名义价值
  min_spread_bp: 1.5
  max_spread_bp: 20.0
  refresh_interval_secs: 15
  price_precision: 3
  quantity_precision: 4

poisson:
  observation_window_secs: 300   # 5分钟窗口
  min_samples: 40
  smoothing_alpha: 0.25
  depth_levels: 8
  confidence_interval: 0.95
  initial_lambda: 10.0

risk:
  max_unrealized_loss: 35.0
  max_daily_loss: 90.0
  inventory_skew_limit: 0.65
  stop_loss_pct: 0.008
