name: "Professional Trend Following Strategy"
account_id: "binance_hcr"
symbols:
  - "ETH/USDC"
  - "SOL/USDC"
max_positions: 2
max_daily_trades: 10
min_account_balance: 100.0
min_risk_reward_ratio: 2.0
min_signal_confidence: 60.0
max_holding_hours: 24
pyramid_enabled: true
pyramid_levels:
  - trigger_profit: 0.5
    size_ratio: 0.3
  - trigger_profit: 1.0
    size_ratio: 0.3
  - trigger_profit: 2.0
    size_ratio: 0.2
risk_config:
  max_risk_per_trade: 0.01
  max_daily_loss: 0.03
  max_drawdown: 0.15
  max_consecutive_losses: 5
  max_total_exposure: 0.5
  max_single_exposure: 0.1
  max_correlated_exposure: 0.2
  max_leverage: 3.0
  max_slippage: 0.002
  emergency_stop_loss: 0.1
indicator_config:
  primary_timeframe: "15m"
  secondary_timeframe: "5m"
  trigger_timeframe: "1m"
  fast_ema: 20
  slow_ema: 50
  atr_period: 14
  adx_period: 14
  adx_threshold: 25.0
  rsi_period: 14
  rsi_overbought: 70.0
  rsi_oversold: 30.0
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_period: 20
  bb_std: 2.0
signal_config:
  breakout_lookback: 20
  breakout_confirmation_bars: 2
  pullback_ratio: 0.382
  pullback_min_trend_strength: 40.0
  momentum_threshold: 0.02
  momentum_lookback: 10
  pattern_min_bars: 5
  pattern_confidence: 70.0
  volume_multiplier: 1.5
  volume_lookback: 20
  signal_expiry: 300
position_config:
  base_risk_ratio: 0.01
  kelly_fraction: 0.25
  pyramid_enabled: true
  pyramid_levels:
    - trigger_profit: 0.5
      size_ratio: 0.3
    - trigger_profit: 1.0
      size_ratio: 0.3
    - trigger_profit: 2.0
      size_ratio: 0.2
  trend_factor_enabled: false
  volatility_factor_enabled: false
  time_factor_enabled: false
  max_holding_hours: 24
stop_config:
  initial_stop_type: "ATR"
  atr_multiplier: 2.0
  fixed_stop_percent: 0.02
  trailing_stop_enabled: true
  trailing_activation: 1.0
  trailing_distance: 0.5
  trailing_step: 0.5
  time_stop_hours: 24
  breakeven_enabled: true
  breakeven_trigger: 0.5
  partial_targets:
    - target_r: 1.0
      close_ratio: 0.3
    - target_r: 2.0
      close_ratio: 0.3
    - target_r: 3.0
      close_ratio: 0.2
