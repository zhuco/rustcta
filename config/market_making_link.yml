strategy:
  name: "mm_link_skew"
  log_level: "info"

account:
  account_id: "binance_hcr"
  market_type: "LinearPerpetual"

symbols:
  - symbol: "LINK/USDC"
    enabled: true
    tick_size: 0.0001
    lot_size: 0.1
    min_notional: 5.0
    order_ttl_secs: 5
    base_order_size: 2.0
    min_order_size: 1.0
    max_inventory: 400.0

quoting:
  refresh_interval_ms: 200
  base_spread_bps: 6.0
  min_spread_bps: 2.5
  max_spread_bps: 80.0
  vol_sensitivity: 18.0
  depth_sensitivity: 6.0
  trend_sensitivity: 3.0
  mid_price_alpha: 0.35
  min_depth_levels: 5
  levels_per_side: 3
  grid_step_bps: 4.0
  level_size_decay: 0.7

inventory:
  max_inventory: 400.0
  soft_limit: 280.0
  hard_limit: 450.0
  target_pct: 0.0
  skew_strength: 0.12
  size_sensitivity: 0.6
  rebalance_threshold: 0.25

trend:
  ema_fast_alpha: 0.5
  ema_slow_alpha: 0.2
  slope_threshold: 0.25
  cooldown_secs: 8

risk:
  max_inventory_notional: 10000.0
  max_loss: 300.0
  max_drawdown: 600.0
  vol_spike_threshold: 0.02
  vol_widen_factor: 1.5
  max_api_errors: 3
