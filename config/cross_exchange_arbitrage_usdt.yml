mode: simulation

strategy:
  name: cross_exchange_arbitrage_usdt_perp
  mode: simulation
  log_level: INFO

market:
  quote_asset: USDT
  market_type: futures
  depth_levels: 5
  stale_quote_ms: 1000
  min_common_exchanges: 2

thresholds:
  min_display_raw_spread: 0.001
  min_open_maker_taker_net_edge: 0.005
  lock_profit_dual_taker_pct: 0.003
  strong_lock_profit_dual_taker_pct: 0.005

sizing:
  min_notional_usdt: 20.0
  target_notional_usdt: 100.0
  max_notional_usdt: 500.0
  capital_fraction_of_smaller_equity: 0.10
  max_symbol_notional_usdt: 200.0
  max_exchange_usage_pct: 0.35

fees:
  default_maker_fee_rate: 0.0002
  default_taker_fee_rate: 0.0005
  use_account_fee_api: false
  per_exchange:
    binance:
      maker: 0.0002
      taker: 0.0005
    okx:
      maker: 0.0002
      taker: 0.0005
    bitget:
      maker: 0.0002
      taker: 0.0006
    gate:
      maker: 0.00015
      taker: 0.0005

funding:
  enabled: true
  mode: settlement
  expected_holding_hours: 8.0
  refresh_secs: 30
  no_open_before_funding_mins: 5
  block_if_expected_funding_negative_pct: 0.001
  max_adverse_funding_rate: 0.001

exchanges:
  binance:
    enabled: true
    position_mode: hedge
    ws_batch_size: 80
    routes:
      market_ws:
        - wss://fstream.binance.com/ws
        - wss://fstream.binance.com/stream
      rest_public:
        - https://fapi.binance.com
      rest_private:
        - https://fapi.binance.com
  okx:
    enabled: true
    position_mode: net
    ws_batch_size: 80
    routes:
      market_ws:
        - wss://ws.okx.com:8443/ws/v5/public
      private_ws:
        - wss://ws.okx.com:8443/ws/v5/private
      rest_public:
        - https://www.okx.com
      rest_private:
        - https://www.okx.com
  bitget:
    enabled: false
    position_mode: hedge
    ws_batch_size: 80
    routes:
      market_ws: []
      private_ws: []
      rest_public: []
      rest_private: []
  gate:
    enabled: false
    position_mode: one_way
    ws_batch_size: 80
    routes:
      market_ws: []
      private_ws: []
      rest_public: []
      rest_private: []

routing:
  ws_stale_limit_ms: 3000
  order_latency_p95_degrade_ms: 1200
  order_error_rate_degrade: 0.05
  auto_failover: true
  degraded_mode_blocks_new_entries: true

execution:
  dry_run: true
  max_hedge_retries: 1
  maker_order_ttl_ms: 5000
  taker_ioc_slippage_limit_pct: 0.003

reconciliation:
  open_orders_interval_secs: 5
  positions_interval_secs: 10
  full_audit_interval_secs: 60
  quantity_tolerance: 0.00000001
  orphan_tolerance: 0.000001

risk:
  stale_quote_ms: 1500
  max_book_age_ms: 2000
  taker_slippage_buffer: 0.0005
  max_taker_slippage_pct: 0.003
  maker_non_fill_penalty: 0.001
  safety_buffer: 0.001
  max_notional_per_symbol_usdt: 2000.0
  max_open_bundles: 3
  symbol_whitelist_required_live: true

persistence:
  enabled: true
  jsonl_dir: logs/cross_exchange_arbitrage
  clickhouse_enabled: false

dashboard:
  enabled: true
  bind_host: 0.0.0.0
  port: 8090

alerts:
  enabled: true
  orphan_alert: true
  route_offline_alert: true
  reconcile_critical_alert: true

