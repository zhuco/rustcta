initial_equity: 10000.0
trade_notional: 1000.0
fee_rate: 0.001
slippage_rate: 0.0002
search:
  min_trades: 25
cost_scenarios:
  - name: normal
    fee_rate: 0.001
    slippage_rate: 0.0002
  - name: stress
    fee_rate: 0.0012
    slippage_rate: 0.0005
candidate_filter:
  min_trades: 30
  min_profit_factor: 1.08
  min_roi_pct: 0.2
  max_drawdown_pct: -8.0
  require_profitable_cost_scenarios: 2
timeframes:
  trend: "15m"
  structure: "5m"
  trigger: "1m"
strategies:
  - name: mtf_15m_trend_5m_breakout_1m_trigger
    trend:
      ema_trend:
        fast: [20, 34]
        slow: [55, 89]
      adx_min: [18, 22]
      choppiness_max:
        period: [14]
        threshold: [55]
    structure:
      donchian_breakout:
        lookback: [20]
      bb_width_min:
        period: [20]
        threshold: [0.008, 0.012]
    trigger:
      roc_direction:
        period: [6, 12]
        threshold: [0.05, 0.1]
      volume_zscore_min:
        period: [20]
        threshold: [0.0, 0.3]
      supertrend_direction:
        period: [10]
        multiplier: [2.0]
      mfi_range:
        period: [14]
        min: [20]
        max: [85]
    exit:
      atr_stop: [2.0, 2.6]
      reward_r: [2.4]
      time_stop_bars: [360]
      reverse_signal_exit: true
