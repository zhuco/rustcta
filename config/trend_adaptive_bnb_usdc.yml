strategy:
  name: "trend_adaptive_bnb_perp"
  account_id: "binance_hcr"
  log_level: "INFO"

trading:
  symbol: "BNB/USDC"
  market_type: "futures"
  base_spread_bps: 0.0
  base_spread_abs: 0.2
  order_levels: 2
  level_spacing_bps: 0.0
  level_spacing_abs: 0.1
  level_size_scale: 1.0
  base_order_size: 0.01
  max_inventory: 1.5
  min_spread_abs: 0.1
  inventory_threshold_usd: 500.0
  inventory_adjust_abs: 0.1
  trend_weak_threshold_abs: 0.2
  trend_strong_threshold_abs: 0.4
  trend_weak_adjust_abs: 0.1
  trend_strong_adjust_abs: 0.2
  trend_smoothing: 0.25

execution:
  refresh_interval_ms: 4000
  inventory_sync_secs: 150
  maker_offset_ticks: 2
  post_only: true
  replace_threshold_bps: 5.0
