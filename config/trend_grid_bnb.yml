# BNB/USDC 趋势网格策略配置
# 参考 ENA 策略参数，设置价差 1.5 USDC

strategy:
  name: "BNB Trend Grid Strategy"
  version: "2.0.0"
  enabled: true
  strategy_type: "TrendGrid"
  market_type: "Futures"

trading_configs:
  - config_id: "bnb_usdc_trend_grid"
    enabled: true
    account:
      id: "binance_main"
      exchange: "binance"
      env_prefix: "BINANCE_0"
    symbol: "BNB/USDC"
    grid:
      spacing: 1.5                  # 网格间距 1.5 USDC
      spacing_type: "arithmetic"
      order_amount: 12              # 单笔名义 12 USDC
      orders_per_side: 2
      max_position: 1200.0
    trend_config:
      ma_fast: 12
      ma_slow: 26
      rsi_period: 14
      rsi_overbought: 75.0
      rsi_oversold: 25.0
      timeframe: "5m"
      show_trend_info: true

trend_adjustment:
  strong_bull_buy_multiplier: 1
  bull_buy_multiplier: 1
  bear_sell_multiplier: 1
  strong_bear_sell_multiplier: 1

batch_settings:
  binance_batch_size: 5
  okx_batch_size: 10
  hyperliquid_batch_size: 20
  default_batch_size: 5

grid_management:
  check_interval: 30
  rebalance_threshold: 0.015
  cancel_and_replace: true
  show_grid_status: true

websocket:
  subscribe_order_updates: true
  subscribe_trade_updates: true
  subscribe_ticker: true
  reconnect_on_disconnect: true
  heartbeat_interval: 30
  log_all_trades: true

risk_control:
  max_leverage: 2
  max_drawdown: 0.15
  daily_loss_limit: 50.0
  position_limit_per_symbol: 1200.0

execution:
  startup_cancel_all: true
  shutdown_cancel_all: true
  thread_per_config: true
  startup_delay: 3

logging:
  level: "info"
  file: "logs/trend_grid_bnb.log"
  console: true
  show_pnl: true
  show_position: true
  show_trend_changes: true
