# Derive gateway adapter example. Disabled by default; secrets must come from env.
enabled: false
adapter: derive
rest_base_url: https://api.derive.xyz
ws_url: wss://api.derive.xyz/ws
private_rest_enabled: false
private_streams_enabled: false
credentials:
  wallet_env: RUSTCTA_DERIVE_WALLET
  subaccount_id_env: RUSTCTA_DERIVE_SUBACCOUNT_ID
  session_key_env: RUSTCTA_DERIVE_SESSION_KEY
  session_secret_env: RUSTCTA_DERIVE_SESSION_SECRET
notes:
  - Do not put wallet keys, session secrets, or real subaccount ids in this file.
  - Private write routes are offline request-spec only until session signing is live-validated.
  - Options metadata remains adapter-specific and does not expand shared traits.
