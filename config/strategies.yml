# 策略启动配置
# 控制哪些策略在启动时运行
version: "1.0"

# 策略组定义
strategy_groups:
  # 泊松做市策略组
  poisson_mm:
    name: "泊松做市策略"
    enabled: false
    startup_delay_secs: 0  # 启动延迟（秒）
    strategies:
      - name: "SUI泊松做市"
        config_file: "config/poisson_mm_sui.yml"
        enabled: true
        account: "binance_main"
        
      - name: "ARB泊松做市"
        config_file: "config/poisson_mm_arb.yml"
        enabled: true
        account: "binance_hcr"
        
      - name: "DOGE泊松做市"
        config_file: "config/poisson_mm_doge.yml"
        enabled: true
        account: "binance_hcr"
        
  # 趋势网格策略组
  trend_grid:
    name: "趋势网格策略"
    enabled: false
    startup_delay_secs: 5  # 延迟5秒启动
    strategies:
      - name: "ENA趋势网格"
        config_file: "config/trend_grid_ena.yml"
        enabled: true
        account: "binance_main"
        
# 启动设置
startup_settings:
  # 策略间启动间隔（毫秒）
  strategy_interval_ms: 500
  
  # 最大并发启动数（0表示不限制）
  max_concurrent_startup: 3
  
  # 启动失败是否继续
  continue_on_failure: true
  
  # 启动前检查账户连接
  verify_accounts: false
  
# 启动优先级（数字越小优先级越高）
startup_priority:
  1: ["trend_grid", "poisson_mm"]
