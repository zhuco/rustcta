mode: live

universe:
  enabled_exchanges:
    - binance
  quote_asset: USDT
  contract_type: perpetual
  symbol_allowlist: []
  symbol_blocklist: []

selection:
  per_exchange_limit: 1
  min_funding_rate: -0.005
  require_next_funding_time: true
  max_funding_snapshot_age_ms: 5000
  min_seconds_to_settlement_at_scan: 2
  max_seconds_to_settlement_at_scan: 600

execution:
  scan_minute: 55
  notional_usdt: 10.0
  open_seconds_before_settlement: 180
  close_seconds_after_settlement: 180
  order_readback_delay_secs: 3
  close_limit_timeout_secs: 300
  close_limit_max_retries: 3
  max_slippage_pct: 0.003
  allow_existing_symbol_position: false
  position_side: long

exchanges:
  binance:
    enabled: true
    env_prefix: BINANCE_0
    demo_trading: false
    private_ws_enabled: false
    position_mode: hedge
  bitget:
    enabled: false
    env_prefix: BITGET
    demo_trading: false
    private_ws_enabled: false
    position_mode: hedge
  gate:
    enabled: false
    env_prefix: GATE
    account_id: '16076371'
    demo_trading: false
    private_ws_enabled: false
    position_mode: hedge

notifications:
  enabled: true
  wecom_webhook_env: FUNDING_ARB_WECOM_WEBHOOK_URL
  wecom_webhook_url: null
