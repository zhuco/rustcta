      maker_fee_rate: 0.001
      taker_fee_rate: 0.001
    rate_limit:
      max_requests_per_second: 1
      burst: 2
    websocket_heartbeat:
      ping_payload: ping
      pong_payload: pong
      ping_interval_ms: 15000
      stale_after_ms: 45000
    log_raw_messages: false

  bigone:
    enabled: false
    market_type: spot
    adapter: bigone
    api_key: ${BIGONE_API_KEY}
    api_secret: ${BIGONE_API_SECRET}
    spot_rest_base_url: https://api.big.one
    contract_rest_base_url: https://api.big.one
    spot_public_ws_url: wss://big.one/ws/v2
    spot_private_ws_url: wss://big.one/ws/v2
    contract_public_ws_url: wss://big.one/ws/contract/v2
    contract_private_ws_url: wss://big.one/ws/contract/v2
    dry_run: true
