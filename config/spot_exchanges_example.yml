# Unified Spot exchange adapter bundle.
# Live trading remains disabled by default.

trading_mode: paper
enable_live_trading: false

exchanges:
  mexc:
    enabled: true
    market_type: spot
    adapter: mexc_spot
    api_key: ${MEXC_API_KEY}
    api_secret: ${MEXC_API_SECRET}
    base_url: https://api.mexc.com
    websocket_url: wss://wbs-api.mexc.com/ws
    dry_run: true
    enable_private_stream: false
    stale_book_ms: 10000
    reconnect_interval_ms: 1000
    max_reconnect_attempts: 10
    order_timeout_ms: 10000
    request_timeout_ms: 10000
    recv_window: 5000
    orderbook_depth: 5
    enabled_symbols:
      - BTCUSDT
      - ETHUSDT
      - DKAUSDT
      - CUDISUSDT
    fee_override:
      maker_fee_rate: 0.001
      taker_fee_rate: 0.001
    rate_limit:
      max_requests_per_second: 8
      burst: 10
    log_raw_messages: false

  coinex:
    enabled: true
    market_type: spot
    adapter: coinex_spot
    api_key: ${COINEX_API_KEY}
    api_secret: ${COINEX_API_SECRET}
    base_url: https://api.coinex.com/v2
    websocket_url: wss://socket.coinex.com/v2/spot
    dry_run: true
    enable_private_stream: false
    stale_book_ms: 10000
    reconnect_interval_ms: 1000
    max_reconnect_attempts: 10
    order_timeout_ms: 10000
    request_timeout_ms: 10000
    orderbook_depth: 5
    enabled_symbols:
      - BTCUSDT
      - ETHUSDT
      - CUDISUSDT
      - GWEIUSDT
      - PIPEUSDT
      - TURBOSUSDT
      - SAROSUSDT
    symbol_mappings:
      BTCUSDT: BTCUSDT
      CUDISUSDT: CUDISUSDT
    fee_override:
      maker_fee_rate: 0.002
      taker_fee_rate: 0.002
    rate_limit:
      max_requests_per_second: 5
      burst: 8
    log_raw_messages: false

  coinbase:
    enabled: false
    market_type: spot
    adapter: coinbase
    bearer_token: ${COINBASE_API_BEARER_TOKEN}
    perpetual_portfolio_uuid: ${COINBASE_INTX_PORTFOLIO_UUID}
    spot_rest_base_url: https://api.coinbase.com/api/v3/brokerage
    international_rest_base_url: https://api.coinbase.com/api/v3/brokerage
    public_ws_url: wss://advanced-trade-ws.coinbase.com
    private_ws_url: wss://advanced-trade-ws-user.coinbase.com
    dry_run: true
    enable_private_stream: false
    stale_book_ms: 10000
    reconnect_interval_ms: 1000
    max_reconnect_attempts: 10
    order_timeout_ms: 10000
    request_timeout_ms: 10000
    orderbook_depth: 50
    enabled_symbols:
      - BTC-USD
      - ETH-USD
      - BTC-PERP-INTX
    symbol_mappings:
      BTCUSD: BTC-USD
      ETHUSD: ETH-USD
      BTCUSDC_PERP: BTC-PERP-INTX
    fee_override:
      maker_fee_rate: 0.006
      taker_fee_rate: 0.012
    rate_limit:
      max_requests_per_second: 5
      burst: 10
    log_raw_messages: false

  kraken:
    enabled: false
    market_type: spot
    adapter: kraken
    spot_api_key: ${KRAKEN_API_KEY}
    spot_api_secret: ${KRAKEN_API_SECRET}
    futures_api_key: ${KRAKEN_FUTURES_API_KEY}
    futures_api_secret: ${KRAKEN_FUTURES_API_SECRET}
    spot_rest_base_url: https://api.kraken.com/0
    futures_rest_base_url: https://futures.kraken.com/derivatives/api/v3
    spot_ws_url: wss://ws.kraken.com/v2
    spot_private_ws_url: wss://ws-auth.kraken.com/v2
    futures_ws_url: wss://futures.kraken.com/ws/v1
    dry_run: true
    enable_private_stream: false
    request_timeout_ms: 10000
    orderbook_depth: 100
    enabled_symbols:
      - XBTUSD
      - ETHUSD
      - PF_XBTUSDT
    symbol_mappings:
      BTCUSD: XBTUSD
      ETHUSD: ETHUSD
      BTCUSDT_PERP: PF_XBTUSDT
    fee_override:
      maker_fee_rate: 0.0025
      taker_fee_rate: 0.004
    rate_limit:
      max_requests_per_second: 3
      burst: 6
    log_raw_messages: false

  cryptocom:
    enabled: false
    market_type: spot
    adapter: cryptocom
    api_key: ${CRYPTOCOM_API_KEY}
    api_secret: ${CRYPTOCOM_API_SECRET}
    base_url: https://api.crypto.com/exchange/v1
    websocket_url: wss://stream.crypto.com/exchange/v1/market
    dry_run: true
    enable_private_stream: false
    stale_book_ms: 10000
    reconnect_interval_ms: 1000
    max_reconnect_attempts: 10
    order_timeout_ms: 10000
    request_timeout_ms: 10000
    orderbook_depth: 10
    enabled_symbols:
      - BTC_USDT
      - ETH_USDT
    symbol_mappings:
      BTCUSDT: BTC_USDT
      ETHUSDT: ETH_USDT
    fee_override:
      maker_fee_rate: 0.00065
      taker_fee_rate: 0.00069
    rate_limit:
      max_requests_per_second: 10
      burst: 20
    log_raw_messages: false

  bingx:
    enabled: false
    market_type: spot
    adapter: bingx
    api_key: ${BINGX_API_KEY}
    api_secret: ${BINGX_API_SECRET}
    base_url: https://open-api.bingx.com
    websocket_url: wss://open-api-ws.bingx.com/market
    dry_run: true
    enable_private_stream: false
    stale_book_ms: 10000
    reconnect_interval_ms: 1000
    max_reconnect_attempts: 10
    order_timeout_ms: 10000
    request_timeout_ms: 10000
    orderbook_depth: 100
    enabled_symbols:
      - BTC-USDT
      - ETH-USDT
    symbol_mappings:
      BTCUSDT: BTC-USDT
      ETHUSDT: ETH-USDT
    fee_override:
      maker_fee_rate: 0.001
      taker_fee_rate: 0.001
    rate_limit:
      max_requests_per_second: 10
      burst: 20
    log_raw_messages: false

  bitmex:
    enabled: false
    market_type: spot
    adapter: bitmex
    api_key: ${BITMEX_API_KEY}
    api_secret: ${BITMEX_API_SECRET}
    base_url: https://www.bitmex.com
    websocket_url: wss://ws.bitmex.com/realtime
    dry_run: true
    enable_private_stream: true
    request_timeout_ms: 10000
    orderbook_depth: 25
    enabled_symbols:
      - XBT_USDT
    fee_override:
      maker_fee_rate: 0.0001
      taker_fee_rate: 0.00075
    rate_limit:
      max_requests_per_second: 2
      burst: 4
    websocket_heartbeat:
      ping_interval_ms: 15000
      stale_after_ms: 45000
    log_raw_messages: false

  coinw:
    enabled: false
    market_type: spot
    adapter: coinw
    api_key: ${COINW_API_KEY}
    api_secret: ${COINW_API_SECRET}
    base_url: https://api.coinw.com
    spot_public_ws_url: wss://ws.futurescw.info?token={public_token}
    spot_private_ws_url: wss://ws.futurescw.com
    futures_public_ws_url: wss://ws.futurescw.com/perpum
    futures_private_ws_url: wss://ws.futurescw.com/perpum
    dry_run: true
    enable_private_stream: false
    request_timeout_ms: 10000
    orderbook_depth: 20
    enabled_symbols:
      - BTC_USDT
      - ETH_USDT
    symbol_mappings:
      BTCUSDT: BTC_USDT
      ETHUSDT: ETH_USDT
    fee_override:
      maker_fee_rate: 0.001
      taker_fee_rate: 0.001
    rate_limit:
      max_requests_per_second: 5
      burst: 10
    log_raw_messages: false

  bitrue:
    enabled: false
    market_type: spot
    adapter: bitrue
    api_key: ${BITRUE_API_KEY}
    api_secret: ${BITRUE_API_SECRET}
    spot_rest_base_url: https://openapi.bitrue.com
