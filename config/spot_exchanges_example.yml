    dry_run: true
    enable_private_stream: false
    request_timeout_ms: 10000
    recv_window: 5000
    orderbook_depth: 50
    enabled_symbols:
      - BTCUSDT
      - ETHUSDT
      - E-BTC-USDT
    symbol_mappings:
      BTCUSDT: BTCUSDT
      ETHUSDT: ETHUSDT
      BTCUSDT_PERP: E-BTC-USDT
    fee_override:
      maker_fee_rate: 0.001
      taker_fee_rate: 0.001
    rate_limit:
      max_requests_per_second: 5
      burst: 10
    log_raw_messages: false

  bitunix:
    enabled: false
    market_type: spot
    adapter: bitunix
    api_key: ${BITUNIX_API_KEY}
    api_secret: ${BITUNIX_API_SECRET}
    spot_rest_base_url: https://openapi.bitunix.com
    futures_rest_base_url: https://fapi.bitunix.com
    spot_ws_base_url: wss://openapi.bitunix.com:443/ws-api/v1
    futures_public_ws_url: wss://fapi.bitunix.com/public/
    futures_private_ws_url: wss://fapi.bitunix.com/private/
    dry_run: true
    enabled_private_rest: false
    enabled_public_streams: false
    enabled_private_streams: false
    request_timeout_ms: 10000
    orderbook_depth: 100
    enabled_symbols:
      - BTCUSDT
      - ETHUSDT
    symbol_mappings:
      BTCUSDT: BTCUSDT
      ETHUSDT: ETHUSDT
      BTCUSDT_PERP: BTCUSDT
    fee_override:
      maker_fee_rate: 0.001
      taker_fee_rate: 0.001
    rate_limit:
      max_requests_per_second: 1
      burst: 2
    websocket_heartbeat:
      ping_interval_ms: 15000
      stale_after_ms: 45000
