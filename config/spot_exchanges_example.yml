      burst: 10
    log_raw_messages: false

  tapbit:
    enabled: false
    market_type: spot
    adapter: tapbit
    api_key: ${TAPBIT_API_KEY}
    api_secret: ${TAPBIT_API_SECRET}
    spot_rest_base_url: https://openapi.tapbit.com/spot
    swap_rest_base_url: https://openapi.tapbit.com/swap
    public_ws_url: wss://ws-openapi.tapbit.com/stream/ws
    dry_run: true
    enable_private_stream: false
    request_timeout_ms: 10000
    orderbook_depth: 10
    enabled_symbols:
      - BTC/USDT
      - ETH/USDT
      - BTC-SWAP
    symbol_mappings:
      BTCUSDT: BTC/USDT
      ETHUSDT: ETH/USDT
      BTCUSDT_PERP: BTC-SWAP
    fee_override:
      maker_fee_rate: 0.001
      taker_fee_rate: 0.001
    rate_limit:
      max_requests_per_second: 5
      burst: 10
    log_raw_messages: false

  weex:
    enabled: false
    market_type: spot
    adapter: weex
    api_key: ${WEEX_API_KEY}
    api_secret: ${WEEX_API_SECRET}
    passphrase: ${WEEX_API_PASSPHRASE}
