mode: live_small

strategy:
  name: cross_exchange_arbitrage_usdt_perp
  mode: live_small
  log_level: INFO

market:
  quote_asset: USDT
  market_type: futures
  depth_levels: 5
  stale_quote_ms: 5000
  min_common_exchanges: 1
  public_book_speed: fastest
  public_book_trigger_profile: fastest_l1
  public_book_validation_profile: fastest_depth
  public_book_depth: 5
  allow_top_of_book_only: true
  top_of_book_capacity_ratio: 0.8

thresholds:
  min_display_raw_spread: 0.001
  min_open_maker_taker_net_edge: 0.005
  max_open_raw_spread: 0.10
  lock_profit_dual_taker_pct: 0.003
  strong_lock_profit_dual_taker_pct: 0.005
  max_close_spread_pct: 0.001

sizing:
  min_notional_usdt: 5.5
  target_notional_usdt: 5.5
  max_notional_usdt: 5.5
  exchange_equity_usdt: 50.0
  leverage: 10.0
  max_positions_per_exchange: 3
  capital_fraction_of_smaller_equity: 0.10
  max_symbol_notional_usdt: 5.5
  max_exchange_usage_pct: 0.35

fees:
  default_maker_fee_rate: 0.0002
  default_taker_fee_rate: 0.0006
  use_account_fee_api: true
  per_exchange:
    bitget:
      maker: 0.0002
      taker: 0.0006

funding:
  enabled: true
  mode: settlement
  refresh_secs: 30
  expected_holding_hours: 8.0
  no_open_before_funding_mins: 5
  block_if_expected_funding_negative_pct: 0.001
  max_adverse_funding_rate: 0.001

exchanges:
  bitget:
    enabled: true
    position_mode: hedge
    ws_batch_size: 50
    env_prefix: BITGET
    demo_trading: false
    private_rest_enabled: true
    private_ws_enabled: true
    private_ws_run:
      connect_timeout_ms: 10000
      reconnect_delay_ms: 2000
      heartbeat_interval_ms: 15000
      subscribe_interval_ms: 50
    routes:
      market_ws:
        - wss://ws.bitget.com/v2/ws/public
      private_ws:
        - wss://ws.bitget.com/v2/ws/private
      rest_public:
        - https://api.bitget.com
      rest_private:
        - https://api.bitget.com

routing:
  ws_stale_limit_ms: 30000
  order_latency_p95_degrade_ms: 1200
  order_error_rate_degrade: 0.05
  auto_failover: true
  degraded_mode_blocks_new_entries: true

execution:
  dry_run: true
  open_execution_style: dual_taker
  close_execution_style: dual_taker
  max_hedge_retries: 1
  maker_order_ttl_ms: 5000
  taker_ioc_slippage_limit_pct: 0.003

reconciliation:
  open_orders_interval_secs: 5
  positions_interval_secs: 10
  full_audit_interval_secs: 60
  quantity_tolerance: 0.00000001
  orphan_tolerance: 0.000001

risk:
  stale_quote_ms: 5000
  max_book_age_ms: 5000
  taker_slippage_buffer: 0.0005
  max_taker_slippage_pct: 0.003
  maker_non_fill_penalty: 0.001
  safety_buffer: 0.001
  max_notional_per_symbol_usdt: 5.5
  max_single_leg_exposure_usdt: 5.5
  max_open_bundles: 3
  symbol_whitelist_required_live: true

persistence:
  enabled: true
  jsonl_dir: logs/cross_exchange_arbitrage/bitget-50u-live-small
  clickhouse_enabled: false

dashboard:
  enabled: true
  bind_host: 0.0.0.0
  port: 8091

alerts:
  enabled: true
  orphan_alert: true
  route_offline_alert: true
  reconcile_critical_alert: true

universe:
  enabled_exchanges:
    - bitget
  symbols:
    - BTC/USDT
    - ETH/USDT
  mode: static
  target_symbol_count: 2
  max_symbol_count: 2
  include_symbols:
    - BTC/USDT
    - ETH/USDT
  exclude_symbols: []
  min_24h_quote_volume: 10000000.0
