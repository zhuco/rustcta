gateway:
  bind_addr: "127.0.0.1:18081"
  adapters:
    - blofin

blofin:
  enabled: false
  rest_base_url: "https://openapi.blofin.com"
  demo_rest_base_url: "https://demo-trading-openapi.blofin.com"
  public_ws_url: "wss://openapi.blofin.com/ws/public"
  private_ws_url: "wss://openapi.blofin.com/ws/private"
  market_types:
    spot: unsupported
    perpetual: enabled
  env:
    rest_base_url: "RUSTCTA_BLOFIN_REST_BASE_URL"
    api_key: "RUSTCTA_BLOFIN_API_KEY"
    api_secret: "RUSTCTA_BLOFIN_API_SECRET"
    passphrase: "RUSTCTA_BLOFIN_API_PASSPHRASE"
  defaults:
    margin_mode: "cross"
    public_streams: true
    private_streams: true
