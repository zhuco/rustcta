# Paper trading execution adapter for unified ExchangeClient.
# Uses live or replayed OrderBookSnapshot updates supplied by the runtime.

exchange_name: paper
market_type: Spot
quote_asset: USDT

# Fees are decimal rates, not basis points.
maker_fee_rate: 0.0002
taker_fee_rate: 0.0006

# Adverse slippage applied to taker fills. 1.0 means 1 bp.
slippage_bps: 0.0

# Reject new simulated orders when the latest book is older than this.
stale_book_after_ms: 10000

initial_balances:
  - asset: USDT
    total: 10000.0
    available: 10000.0
    locked: 0.0
  - asset: BTC
    total: 0.0
    available: 0.0
    locked: 0.0
  - asset: ETH
    total: 0.0
    available: 0.0
    locked: 0.0
