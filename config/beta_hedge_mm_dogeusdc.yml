strategy:
  name: "beta_hedge_mm_dogeusdc"
  log_level: "INFO"

account:
  account_id: "binance_hcr"
  market_type: "Futures"

hedge:
  hedge_symbol: "DOGE/USDC"
  hedge_ratio: 0.40
  target_inventory_notional_cap: 650.0
  soft_inventory_notional: 400.0
  hard_inventory_notional: 650.0
  emergency_inventory_notional: 850.0
  max_portfolio_exposure_multiple: 10.0

quoting:
  base_order_notional: 8.0
  levels_per_side: 2
  refresh_interval_ms: 500
  order_ttl_ms: 15000
  min_requote_interval_ms: 8000
  reprice_threshold_ticks: 4
  post_only: true
  time_in_force: "GTX"
  reduce_risk_taker_enabled: false
  base_spread_bps: 6.0
  level_spacing_bps: 4.0
  min_spread_bps: 2.0
  max_inventory_bias_bps: 4.0
  level_size_decay: 0.8

dry_run: false
