schema_version: 1
exchange: p2b
adapter: P2bGatewayAdapter
status_date: "2026-06-08"
metadata:
  status: validated
  source: docs/p2b_adapter.md
  last_reviewed: "2026-06-08"
  notes: A-32 scan-only spot adapter. Public REST is implemented for market rules and two-sided order book snapshots; private REST is request-spec-only and disabled by capabilities.
market_types: [spot]
products: [spot]
base_urls:
  rest: https://api.p2pb2b.com
  websocket: wss://apiws.p2pb2b.com/
auth:
  private_rest: JSON body with request and nonce, base64 encoded as X-TXC-PAYLOAD, HMAC-SHA512 hex X-TXC-SIGNATURE, X-TXC-APIKEY header; request-spec-only until read-only/live-dry-run validation
rate_limits:
  p2b_public: { scope: ip, interval_ms: 60000, limit: 60 }
  p2b_private: { scope: key, interval_ms: 60000, limit: 60 }
pagination:
  order_book: { mode: offset_limit_by_side, max_limit: 100 }
  open_orders: { mode: offset_limit, max_limit: 100, request_spec_only: true }
  fills: { mode: offset_limit, max_limit: 100, request_spec_only: true }
reconciliation:
  private_state: rest_request_spec_only
  readbacks: [get_open_orders, get_recent_fills]
  notes: Private REST is not enabled by capabilities; after promotion use /api/v2/orders and /api/v2/account/market_deals as REST reconciliation fallback.
batch:
  place: { support: unsupported, reason: p2b.batch_place_orders_unverified }
  cancel: { support: unsupported, reason: p2b.batch_cancel_orders_unverified }
websocket:
  public:
    support: unsupported
    reason: p2b.public_streams_unverified
    endpoint: wss://apiws.p2pb2b.com/
    heartbeat: { mode: server_ping_available_unimplemented, request: '{"method":"server.ping","params":[],"id":1}' }
  private:
    support: unsupported
    reason: p2b.private_streams_unverified
    auth_renewal: { mode: unsupported }
endpoints:
  - operation: get_symbol_rules
    product: spot
    market_types: [spot]
    transport: rest
    method: GET
    path: /api/v2/public/markets
    auth: none
    rate_limit_bucket: p2b_public
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
    official_doc: https://github.com/P2B-team/p2b-api-docs/blob/master/api-doc.md#markets
  - operation: get_order_book
    product: spot
    market_types: [spot]
    transport: rest
    method: GET
    path: /api/v2/public/book
    auth: none
    rate_limit_bucket: p2b_public
    weight: 2
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
    notes: Adapter requests both side=buy and side=sell with market, offset=0, and limit=1..100, then merges both sides.
    official_doc: https://github.com/P2B-team/p2b-api-docs/blob/master/api-doc.md#order-book
  - operation: get_balances
    product: spot
    market_types: [spot]
    transport: rest
    method: POST
    path: /api/v2/account/balances
    auth: api_key
    credential_scopes: [read_only]
    rate_limit_bucket: p2b_private
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: unsupported
    reason: p2b.balances_request_spec_only
    request_spec:
      fixture: tests/fixtures/exchanges/p2b/request_specs/get_balances.json
    official_doc: https://github.com/P2B-team/p2b-api-docs/blob/master/api-doc.md#all-balances
  - operation: place_order
    product: spot
    market_types: [spot]
    transport: rest
    method: POST
    path: /api/v2/order/new
    auth: api_key
    credential_scopes: [trade]
    rate_limit_bucket: p2b_private
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: unsupported
    reason: p2b.place_order_request_spec_only
    request_spec:
      fixture: tests/fixtures/exchanges/p2b/request_specs/place_order_limit_buy.json
    official_doc: https://github.com/P2B-team/p2b-api-docs/blob/master/api-doc.md#create-order
  - operation: cancel_order
    product: spot
    market_types: [spot]
    transport: rest
    method: POST
    path: /api/v2/order/cancel
    auth: api_key
    credential_scopes: [trade]
    rate_limit_bucket: p2b_private
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: unsupported
    reason: p2b.cancel_order_request_spec_only
    request_spec:
      fixture: tests/fixtures/exchanges/p2b/request_specs/cancel_order.json
    official_doc: https://github.com/P2B-team/p2b-api-docs/blob/master/api-doc.md#cancel-order
  - operation: get_open_orders
    product: spot
    market_types: [spot]
    transport: rest
    method: POST
    path: /api/v2/orders
    auth: api_key
    credential_scopes: [read_only]
    rate_limit_bucket: p2b_private
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: unsupported
    reason: p2b.open_orders_request_spec_only
    request_spec:
      fixture: tests/fixtures/exchanges/p2b/request_specs/get_open_orders.json
    official_doc: https://github.com/P2B-team/p2b-api-docs/blob/master/api-doc.md#open-orders
  - operation: get_recent_fills
    product: spot
    market_types: [spot]
    transport: rest
    method: POST
    path: /api/v2/account/market_deals
    auth: api_key
    credential_scopes: [read_only]
    rate_limit_bucket: p2b_private
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: unsupported
    reason: p2b.recent_fills_request_spec_only
    request_spec:
      fixture: tests/fixtures/exchanges/p2b/request_specs/get_recent_fills.json
    official_doc: https://github.com/P2B-team/p2b-api-docs/blob/master/api-doc.md#deals-history-by-market
