    notes: Perp amend is native; Spot amend remains unsupported in the shared model.
  - operation: place_order_list
    product: perpetual
    market_types: [spot, perpetual]
    transport: rest
    method: POST
    path: /unsupported/bitunix/order_list
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: bitunix_private_rest
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    testnet: false
    support: unsupported
