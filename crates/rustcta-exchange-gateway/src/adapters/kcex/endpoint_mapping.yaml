  - operation: get_balances
    product: mixed
    market_types: [spot, perpetual]
    transport: rest
    method: SOURCE_READ
    path: source://kcex/account-balance-openapi-unverified
    auth: none
    rate_limit_bucket: kcex_account_source
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: spec_only
    reason: "Account/balance readback boundary only; shared get_balances runtime remains project-unimplemented pending official KCEX OpenAPI verification, signing rules, parser, and read-only reconciliation."
    request_spec: { status: fixture_only, fixture: tests/fixtures/exchanges/kcex/request_specs/get_balances_account_source.json }
    response_parser: { status: planned, fixture: tests/fixtures/exchanges/kcex/request_specs/get_balances_account_source.json }
