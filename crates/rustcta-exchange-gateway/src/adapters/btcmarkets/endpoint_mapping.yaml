schema_version: 1
exchange: btcmarkets
adapter: rustcta_exchange_gateway::adapters::btcmarkets
metadata:
  status: validated
  source: https://docs.btcmarkets.net/
  notes: "Australian AUD spot adapter. Private REST is credential-gated; fiat funding and tax/reporting APIs remain outside the gateway boundary."
market_types: [spot]
products: [spot]
base_urls:
  rest: https://api.btcmarkets.net
  websocket: wss://socket.btcmarkets.net/v2
rest:
  base_url: https://api.btcmarkets.net
auth:
  rest:
    scheme: hmac_sha512
    headers: [BM-AUTH-APIKEY, BM-AUTH-TIMESTAMP, BM-AUTH-SIGNATURE]
    signing_payload: "UPPER_METHOD + path_with_query + timestamp_ms + json_body"
rate_limits:
  buckets:
    public_rest:
      scope: rest
      interval: 1s
      limit: 10
    private_rest:
      scope: account
      interval: 1s
      limit: 5
    orders:
      scope: orders
      interval: 1s
      limit: 5
reconciliation:
  private_stream_fallback: rest
  readbacks: [query_order, get_open_orders, get_recent_fills]
  after_unknown_place: query_order
  after_unknown_cancel: query_order
websocket:
  public:
    support: spec_only
    url: wss://socket.btcmarkets.net/v2
    channels: [orderbook, trade]
    order_book:
      channel: orderbook
      subscribe_payload:
        messageType: subscribe
        channels: [orderbook]
        marketIds: ["{marketId}"]
      update_semantics: latest_book_state
      interval_ms: null
      interval_source: "official WebSocket v2 docs do not publish a fixed orderbook update interval"
      depth: 50
      depth_source: "orderbook message carries up to 50 bids and 50 asks"
      sequence:
        field: null
        contiguous: false
        gap_detection: unsupported_no_official_sequence
        risk: "No sequence/update id is documented for BTC Markets public orderbook WS."
      checksum:
        supported: false
        mode: none_documented
        risk: "No checksum is documented for BTC Markets public orderbook WS."
      heartbeat:
        message_type: heartbeat
        interval_ms: 5000
      resync:
        mode: rest_snapshot_rebuild
        rest_endpoint_operation: get_order_book
        triggers: [connect, reconnect, stale_stream, parse_error, suspected_message_loss]
    resync: rest_order_book_snapshot
  private:
    support: spec_only
    channels: [order_change, fund_change]
    fallback: rest_reconciliation
unsupported:
  - operation: contract_product
    reason: "Current official/API profile is Spot-only and exposes no standard futures/perpetual/options product line."
  - positions
  - amend_order
  - order_list
  - fiat_deposit_withdrawal_runtime
  - bank_payment_rails
  - tax_reporting
endpoints:
  - operation: get_symbol_rules
    product: spot
    transport: rest
    method: GET
    path: /v3/markets
    auth: none
    rate_limit_bucket: public_rest
    weight: 1
    request_spec_required: false
  - operation: get_order_book
    product: spot
    transport: rest
    method: GET
    path: /v3/markets/{marketId}/orderbook
    auth: none
    rate_limit_bucket: public_rest
    weight: 1
    request_spec_required: false
  - operation: get_balances
    product: spot
    transport: rest
    method: GET
    path: /v3/accounts/me/balances
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
  - operation: get_fees
    product: spot
    transport: rest
    method: GET
    path: /v3/accounts/me/trading-fees
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
  - operation: place_order
    product: spot
    transport: rest
    method: POST
    path: /v3/orders
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: orders
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/btcmarkets/request_specs/place_order.json
  - operation: place_quote_market_order
    product: spot
    transport: rest
    method: POST
    path: /v3/orders
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: orders
    weight: 1
    request_spec_required: true
  - operation: cancel_order
    product: spot
    transport: rest
    method: DELETE
    path: /v3/orders/{orderId}
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: orders
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/btcmarkets/request_specs/cancel_order.json
  - operation: batch_place_orders
    product: spot
    transport: rest
    method: POST
    path: /v3/batchorders
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: orders
    weight: 1
    request_spec_required: true
    native_batch: true
    atomicity: non_atomic
    request_spec:
      fixture: tests/fixtures/exchanges/btcmarkets/request_specs/batch_place_orders.json
  - operation: batch_cancel_orders
    product: spot
    transport: rest
    method: POST
    path: /v3/batchorders
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: orders
    weight: 1
    request_spec_required: true
    native_batch: true
    atomicity: non_atomic
  - operation: amend_order
    product: spot
    transport: rest
    method: PATCH
    path: /unsupported/btcmarkets/amend_order
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: orders
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    support: unsupported
    reason: btcmarkets.amend_order_unsupported
  - operation: place_order_list
    product: spot
    transport: rest
    method: POST
    path: /unsupported/btcmarkets/order_list
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: orders
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    support: unsupported
    reason: btcmarkets.order_list_unsupported
  - operation: cancel_all_orders
    product: spot
    transport: rest
    method: DELETE
    path: /v3/orders
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: orders
    weight: 1
    request_spec_required: true
  - operation: query_order
    product: spot
    transport: rest
    method: GET
    path: /v3/orders/{orderId}
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
  - operation: get_open_orders
    product: spot
    transport: rest
    method: GET
    path: /v3/orders
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
  - operation: get_recent_fills
    product: spot
    transport: rest
    method: GET
    path: /v3/trades
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/btcmarkets/request_specs/get_recent_fills.json
streams:
  - operation: subscribe_public_order_book
    product: spot
    market_types: [spot]
    transport: websocket
    protocol: json
    url: wss://socket.btcmarkets.net/v2
    channel: orderbook
    support: spec_only
    subscribe:
      messageType: subscribe
      channels: [orderbook]
      marketIds: ["{marketId}"]
      helper: public_ws_session
    message:
      parser: parse_public_stream_message
      fixture: tests/fixtures/exchanges/btcmarkets/ws_orderbook.json
      messageType: orderbook
      bids_field: bids
      asks_field: asks
      update_semantics: latest_book_state
    interval_ms: null
    depth: 50
    sequence_fields: []
    checksum: none_documented
    heartbeat:
      messageType: heartbeat
      interval_ms: 5000
    resync:
      mode: rest_snapshot_rebuild
      endpoint_operation: get_order_book
      triggers: [connect, reconnect, stale_stream, parse_error, suspected_message_loss]
