    rate_limit_bucket: grvt_account_pair
    weight: 0
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: native
    reason: "GRVT recent-fills session-cookie readback runtime is guarded by GRVT_PRIVATE_REST_ENABLED/RUSTCTA_GRVT_PRIVATE_REST_ENABLED plus session cookie and account id; account/fee/position runtime remains disabled."
    request_spec_fixture: tests/fixtures/exchanges/grvt/request_specs/recent_fills_session_spec_only.json
    response_parser: { status: implemented, parser: parse_grvt_fills, fixture: tests/fixtures/exchanges/grvt/recent_fills_success.json }
  - operation: place_order
    product: perpetual
    market_types: [perpetual]
    transport: rest
