    reason: grvt.cancel_order_session_spec_only
  - operation: cancel_all_orders
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: POST
    path: /v1/cancel_all_orders
    auth: signed
    rate_limit_bucket: grvt_account_pair
    weight: 0
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
