    reason: grvt.bulk_orders_requires_session_renewal_eip712_signer_partial_parser_and_dry_run_guard
    request_spec_fixture: tests/fixtures/exchanges/grvt/request_specs/bulk_orders_session_spec_only.json
    notes: "Offline boundary only: create entries and partial-failure parser fixture are covered; shared batch_place_orders runtime remains disabled until session renewal, EIP-712/external signer, partial parser/report, write/readback reconciliation, and dry-run guard are wired."
