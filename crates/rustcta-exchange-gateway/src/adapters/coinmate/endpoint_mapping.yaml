schema_version: 1
exchange: coinmate
adapter: CoinmateGatewayAdapter
status_date: "2026-06-08"
metadata:
  status: draft
  source: docs/coinmate_adapter.md
  last_reviewed: "2026-06-08"
  notes: European spot scan-only adapter. Private REST is offline request-spec only.
market_types: [spot]
products: [spot]
base_urls:
  rest: https://coinmate.io/api
  public_ws_v2: wss://coinmate.io/api/websocket
  public_ws_v1_prefix: wss://coinmate.io/api/websocket/channel
auth:
  private_rest: form params clientId/publicKey/nonce/signature, HMAC-SHA256 uppercase hex over nonce + clientId + publicKey
  private_ws: same auth fields in v2 subscribe payload data
rate_limits:
  rest: { scope: ip, interval_ms: 60000, limit: 100 }
pagination:
  private_history: { mode: limit, max_limit: 1000, notes: tradeHistory and history endpoints document 1000-row max/default limits }
reconciliation:
  private_state: rest_fallback
  notes: WebSocket order book sequence/checksum is not documented; use REST orderBook snapshot for resync.
batch:
  place: { support: unsupported, reason: coinmate.native_batch_place_unsupported }
  cancel: { support: cancel_all_only, reason: coinmate.cancelAllOpenOrders is native cancel-all, not list batch cancel }
websocket:
  public:
    support: payload_helper
    url: wss://coinmate.io/api/websocket
    channels:
      - "trades-{PAIR}"
      - "order_book-{PAIR}"
      - "statistics-{PAIR}"
    heartbeat: { mode: ping_pong_event, interval_ms: 30000, timeout_ms: 45000, stale_message_ms: 60000 }
    order_book:
      product: spot
      market_types: [spot]
      url: wss://coinmate.io/api/websocket
      protocol: websocket_json
      subscribe:
        payload:
          event: subscribe
          data:
            channel: order_book-{PAIR}
        unsubscribe_payload:
          event: unsubscribe
          data:
            channel: order_book-{PAIR}
        symbol_format: BASE_QUOTE
      channel: order_book-{PAIR}
      interval_ms: null
      interval_source: "Official public WebSocket demo/docs do not publish a fixed order-book cadence."
      depth: null
      depth_source: "Official docs do not publish a depth selector or fixed depth for order_book-{PAIR}."
      sequence:
        fields: []
        continuity: unsupported_no_official_sequence
        gap_detection: reconnect_or_stale_stream_only
      checksum:
        supported: false
        field: null
        risk: "No official checksum field; book continuity cannot be sequence/checksum-validated."
      resync:
        mode: rest_snapshot_rebuild
        rest_endpoint_operation: order_book
        rest_endpoint: /orderBook
        triggers: [connect, reconnect, stale_stream, parse_error, suspected_message_loss]
      fixtures:
        parser: tests/fixtures/exchanges/coinmate/ws/public_order_book.json
  private:
    support: payload_helper_only
    channels:
      - "private-open_orders-{ACCOUNT_ID}[-{PAIR}]"
      - "private-user_balances-{ACCOUNT_ID}"
      - "private-user-trades-{ACCOUNT_ID}[-{PAIR}]"
    reconciliation: rest_fallback
unsupported:
  - operation: contract_product
    reason: "Current official/API profile does not expose standard futures/perpetual/options products."
  - perpetuals
  - futures
  - margin
  - leverage
  - positions
  - funding
  - mark_price
  - open_interest
  - risk_tiers
  - withdrawals
  - transfers
  - bank_wire_withdrawal
  - stop_loss_orders
  - hidden_orders
  - native_batch_place
  - native_batch_cancel_list
endpoints:
  - operation: symbol_rules
    product: spot
    market_types: [spot]
    transport: rest
    method: GET
    path: /tradingPairs
    auth: none
    rate_limit_bucket: coinmate_public
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: false
    official_doc: https://coinmate.docs.apiary.io/
    support: native
    response_parser: { status: implemented, fixture: tests/fixtures/exchanges/coinmate/trading_pairs.json }
  - operation: products
    product: spot
    market_types: [spot]
    transport: rest
    method: GET
    path: /products
    auth: none
    rate_limit_bucket: coinmate_public
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: false
    official_doc: https://coinmate.docs.apiary.io/
    support: spec_only
  - operation: order_book
    product: spot
    market_types: [spot]
    transport: rest
    method: GET
    path: /orderBook
    auth: none
    rate_limit_bucket: coinmate_public
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: false
    official_doc: https://coinmate.docs.apiary.io/
    support: native
    response_parser: { status: implemented, fixture: tests/fixtures/exchanges/coinmate/orderbook_btc_eur.json }
  - operation: ticker
    product: spot
    market_types: [spot]
    transport: rest
    method: GET
    path: /ticker
    auth: none
    rate_limit_bucket: coinmate_public
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: false
    official_doc: https://coinmate.docs.apiary.io/
    support: spec_only
  - operation: public_trades
    product: spot
    market_types: [spot]
    transport: rest
    method: GET
    path: /transactions
    auth: none
    rate_limit_bucket: coinmate_public
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: false
    official_doc: https://coinmate.docs.apiary.io/
    support: spec_only
  - operation: balances
    product: spot
    market_types: [spot]
    transport: rest
    method: POST
    path: /balances
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: coinmate_private
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    official_doc: https://coinmate.docs.apiary.io/
    support: spec_only
    reason: "Coinmate balance readback is fixture-backed, but shared get_balances runtime remains disabled pending nonce/signature runtime guard, balance parser normalization, account scope policy, and reconciliation."
    request_spec: { status: implemented, fixture: tests/fixtures/exchanges/coinmate/request_specs/get_balances.json }
    response_parser: { status: fixture_only, fixture: tests/fixtures/exchanges/coinmate/balances.json }
  - operation: fees
    product: spot
    market_types: [spot]
    transport: rest
    method: POST
    path: /traderFees
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: coinmate_private
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    official_doc: https://coinmate.docs.apiary.io/
    support: spec_only
    request_spec: { status: implemented, fixture: tests/fixtures/exchanges/coinmate/request_specs/get_fees.json }
  - operation: open_orders
    product: spot
    market_types: [spot]
    transport: rest
