    product: spot
    market_types: [spot]
    transport: rest
    method: GET
    path: /tradingPairs
    auth: none
    rate_limit_bucket: coinmate_public
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: false
    official_doc: https://coinmate.docs.apiary.io/
    support: native
    response_parser: { status: implemented, fixture: tests/fixtures/exchanges/coinmate/trading_pairs.json }
