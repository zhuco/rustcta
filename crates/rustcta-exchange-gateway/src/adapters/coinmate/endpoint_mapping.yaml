    support: native
    request_spec: { status: implemented, fixture: tests/fixtures/exchanges/coinmate/request_specs/query_order.json }
    response_parser: { status: implemented, fixture: tests/fixtures/exchanges/coinmate/open_orders.json }
    notes: "Runtime is fail-closed unless COINMATE_PRIVATE_REST_ENABLED and clientId/publicKey/privateKey credentials are configured."
  - operation: recent_fills
