    path: /replaceByBuyLimit
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: coinmate_private
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: non_atomic
    testnet: false
    official_doc: https://coinmate.docs.apiary.io/
    support: spec_only
    request_spec:
      status: implemented
      fixture: tests/fixtures/exchanges/coinmate/request_specs/amend_order_replace_buy.json
      additional_fixtures:
        - tests/fixtures/exchanges/coinmate/request_specs/amend_order_replace_sell.json
    response_parser: { status: implemented, fixture: tests/fixtures/exchanges/coinmate/parser/amend_order_ack.json }
    reason: coinmate.replace_order_offline_requires_side_price_nonce_and_reconciliation_guard
    notes: "Coinmate replaceByBuyLimit/replaceBySellLimit is fixture-backed offline. Shared AmendOrderRequest does not carry side or replacement price, and live private writes still need serialized nonce, dry-run guard, and REST/WS reconciliation, so runtime intentionally returns Unsupported."
  - operation: batch_place_orders
    product: spot
