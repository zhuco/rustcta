    path: /openOrders
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: coinmate_private
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    official_doc: https://coinmate.docs.apiary.io/
    support: native
    request_spec: { status: implemented, fixture: tests/fixtures/exchanges/coinmate/request_specs/get_open_orders.json }
    response_parser: { status: implemented, fixture: tests/fixtures/exchanges/coinmate/open_orders.json }
    notes: "Runtime is fail-closed unless COINMATE_PRIVATE_REST_ENABLED and clientId/publicKey/privateKey credentials are configured."
  - operation: query_order
    product: spot
    market_types: [spot]
    transport: rest
    method: POST
    path: /orderById
    auth: hmac
    credential_scopes: [read_only]
