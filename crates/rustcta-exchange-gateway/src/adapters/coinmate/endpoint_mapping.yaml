schema_version: 1
exchange: coinmate
adapter: CoinmateGatewayAdapter
status_date: "2026-06-08"
metadata:
  status: draft
  source: docs/coinmate_adapter.md
  last_reviewed: "2026-06-08"
  notes: European spot scan-only adapter. Private REST is offline request-spec only.
market_types: [spot]
products: [spot]
base_urls:
  rest: https://coinmate.io/api
  public_ws_v2: wss://coinmate.io/api/websocket
  public_ws_v1_prefix: wss://coinmate.io/api/websocket/channel
auth:
  private_rest: form params clientId/publicKey/nonce/signature, HMAC-SHA256 uppercase hex over nonce + clientId + publicKey
  private_ws: same auth fields in v2 subscribe payload data
rate_limits:
  rest: { scope: ip, interval_ms: 60000, limit: 100 }
pagination:
  private_history: { mode: limit, max_limit: 1000, notes: tradeHistory and history endpoints document 1000-row max/default limits }
reconciliation:
  private_state: rest_fallback
  notes: WebSocket order book sequence/checksum is not documented; use REST orderBook snapshot for resync.
batch:
  place: { support: unsupported, reason: coinmate.native_batch_place_unsupported }
  cancel: { support: cancel_all_only, reason: coinmate.cancelAllOpenOrders is native cancel-all, not list batch cancel }
websocket:
  public:
    support: payload_helper
    url: wss://coinmate.io/api/websocket
    channels:
      - "trades-{PAIR}"
      - "order_book-{PAIR}"
      - "statistics-{PAIR}"
    heartbeat: { mode: ping_pong_event, interval_ms: 30000, timeout_ms: 45000, stale_message_ms: 60000 }
  private:
    support: payload_helper_only
    channels:
      - "private-open_orders-{ACCOUNT_ID}[-{PAIR}]"
      - "private-user_balances-{ACCOUNT_ID}"
      - "private-user-trades-{ACCOUNT_ID}[-{PAIR}]"
    reconciliation: rest_fallback
unsupported:
  - perpetuals
  - futures
  - margin
  - leverage
  - positions
  - funding
  - mark_price
  - open_interest
  - risk_tiers
  - withdrawals
  - transfers
  - bank_wire_withdrawal
  - stop_loss_orders
  - hidden_orders
  - native_batch_place
  - native_batch_cancel_list
endpoints:
