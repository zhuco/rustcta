    support: parser_only
    interval_ms: null
    depth: null
    sequence_fields: []
    checksum: none_documented
    resync: { mode: rest_snapshot_rebuild, endpoint_operation: order_book, endpoint: /orderBook }
  - operation: public_ws_trades
    product: spot
    channel: trades-{PAIR}
    support: payload_helper
  - operation: public_ws_statistics
    product: spot
    channel: statistics-{PAIR}
    support: payload_helper
  - operation: private_ws_open_orders
    product: spot
    channel: private-open_orders-{ACCOUNT_ID}[-{PAIR}]
    support: parser_only
    resync: { endpoint_operation: open_orders }
  - operation: private_ws_balances
    product: spot
    channel: private-user_balances-{ACCOUNT_ID}
