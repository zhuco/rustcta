    support: native
    request_spec: { status: implemented, fixture: tests/fixtures/exchanges/coinmate/request_specs/get_recent_fills.json }
    response_parser: { status: implemented, fixture: tests/fixtures/exchanges/coinmate/fills.json }
    notes: "Runtime is fail-closed unless COINMATE_PRIVATE_REST_ENABLED and clientId/publicKey/privateKey credentials are configured."
  - operation: place_order
