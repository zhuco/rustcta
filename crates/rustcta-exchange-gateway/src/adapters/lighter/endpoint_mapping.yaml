    atomicity: partial
    testnet: true
    support: spec_only
    reason: lighter.batch_place_requires_signed_tx_batch_builder_nonce_partial_parser_and_dry_run_guard
    request_spec_fixture: tests/fixtures/exchanges/lighter/request_specs/send_tx_batch_request_spec_only.json
    response_parser: { status: fixture_only, parser: parse_lighter_batch_place_orders_ack, fixture: tests/fixtures/exchanges/lighter/parser/batch_place_orders_ack.json }
    notes: "Offline boundary only: sendTxBatch request shape and partial ack fixture are pinned; SDK-compatible signed tx batch builder, API-key private key/index, nonce handling, partial parser/report, reconciliation and broadcast dry-run guard are disabled."
