schema_version: 1
exchange: binancecoinm
adapter: rustcta_exchange_gateway::adapters::binancecoinm
market_types:
  - futures
  - perpetual
rest:
  base_url: https://dapi.binance.com
  testnet_base_url: https://testnet.binancefuture.com
rate_limits:
  buckets:
    public_ip:
      scope: ip
      interval: 1m
      limit: 1200
    signed_uid:
      scope: uid
      interval: 1m
      limit: 1200
    order_count:
      scope: account
      interval: 10s
      limit: 50
pagination:
  get_recent_fills:
    style: from_id_or_time_window
    since_param: startTime
    until_param: endTime
    cursor_param: fromId
    limit_param: limit
    max_limit: 1000
reconciliation:
  private_stream_fallback: rest
  readbacks:
    - get_balances
    - get_positions
    - query_order
    - get_open_orders
    - get_recent_fills
  unknown_order_policy: query_order_then_open_orders
  retry_policy: retry_rate_limited_and_transient
batch:
  place_orders:
    support: unsupported
    reason: batch place order is not implemented
  cancel_orders:
    support: unsupported
    reason: batch cancel order is not implemented
  cancel_all_orders:
    support: native
    atomicity: partial
    max_items: null
    partial_failure: true
websocket:
  public:
    support: unsupported
    heartbeat:
      required: true
      direction: server_ping
      interval_ms: 180000
      timeout_ms: 600000
    resync: rest_order_book_snapshot
  private:
    support: unsupported
    auth: listen_key
    renewal_ms: 1800000
    fallback: rest_reconciliation
endpoints:
  - operation: get_symbol_rules
    transport: rest
    product: perpetual
    method: GET
    path: /dapi/v1/exchangeInfo
    auth: none
    rate_limit_bucket: public_ip
    weight: 10
    request_spec_required: false
  - operation: get_order_book
    transport: rest
    product: perpetual
    method: GET
    path: /dapi/v1/depth
    auth: none
    rate_limit_bucket: public_ip
    weight: 5
    request_spec_required: false
  - operation: funding_history
    transport: rest
    product: perpetual
    method: GET
    path: /dapi/v1/fundingRate
    auth: none
    rate_limit_bucket: public_ip
    weight: 1
    request_spec_required: false
    support: spec_only
    response_parser: { status: fixture_only, fixture: tests/fixtures/exchanges/binancecoinm/funding.json }
  - operation: open_interest
    transport: rest
    product: perpetual
    method: GET
    path: /dapi/v1/openInterest
    auth: none
    rate_limit_bucket: public_ip
    weight: 1
    request_spec_required: false
    support: spec_only
    response_parser: { status: fixture_only, fixture: tests/fixtures/exchanges/binancecoinm/open_interest.json }
  - operation: get_balances
    transport: rest
    product: futures
    method: GET
    path: /dapi/v1/balance
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: signed_uid
    weight: 20
    request_spec_required: true
  - operation: get_positions
    transport: rest
    product: futures
    method: GET
    path: /dapi/v1/positionRisk
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: signed_uid
    weight: 1
    request_spec_required: true
  - operation: get_fees
    transport: rest
    product: futures
    method: GET
    path: /dapi/v1/account/commission
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: signed_uid
    weight: 20
    request_spec_required: true
  - operation: place_order
    transport: rest
    product: futures
    method: POST
    path: /dapi/v1/order
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: order_count
    weight: 1
    request_spec_required: true
  - operation: cancel_order
    transport: rest
    product: futures
    method: DELETE
    path: /dapi/v1/order
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: order_count
    weight: 1
    request_spec_required: true
  - operation: cancel_all_orders
    transport: rest
    product: futures
    method: DELETE
    path: /dapi/v1/allOpenOrders
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: order_count
    weight: 1
    request_spec_required: true
  - operation: amend_order
    transport: rest
    product: futures
    method: PUT
    path: /dapi/v1/order
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: order_count
    weight: 4
    request_spec_required: true
  - operation: query_order
    transport: rest
    product: futures
    method: GET
    path: /dapi/v1/order
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: signed_uid
    weight: 4
    request_spec_required: true
  - operation: get_open_orders
    transport: rest
    product: futures
    method: GET
    path: /dapi/v1/openOrders
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: signed_uid
    weight: 6
    request_spec_required: true
  - operation: get_recent_fills
    transport: rest
    product: futures
    method: GET
    path: /dapi/v1/myTrades
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: signed_uid
    weight: 20
    request_spec_required: true
