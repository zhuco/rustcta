exchange: kucoinfutures
schema_version: 2
market_types: [perpetual]
public_rest:
  mode: native
  endpoints:
    - GET /api/v1/contracts/active
    - GET /api/v1/level2/snapshot
private_rest:
  mode: native_when_credentials_present
  endpoints:
    - GET /api/v1/account-overview
    - GET /api/v1/positions
    - GET /api/v1/trade-fees
    - POST /api/v1/orders
    - DELETE /api/v1/orders/{orderId}
    - DELETE /api/v1/orders
    - GET /api/v1/orders/{orderId}
    - GET /api/v1/orders
    - GET /api/v1/fills
    - GET /api/v1/funding-history
credential_scopes:
  - read_only
  - trade
public_streams:
  mode: native
  policy: futures bullet websocket topics with REST orderbook resync
private_streams:
  mode: native_when_credentials_present
  auth: POST /api/v1/bullet-private
  topics:
    orders: /contractMarket/tradeOrders
    balances: /contractAccount/wallet
    positions: /contract/position
  token_renewal:
    kind: token_refresh
    renew_before_expiry_ms: 3600000
    renewal_interval_ms: 72000000
    reconnect_on_failure: true
    resubscribe_after_renewal: true
stream_runtime:
  separate_public_private_connections: true
  heartbeat:
    direction: server_ping_application_pong
    interval_ms: 20000
    timeout_ms: 10000
    stale_message_ms: 30000
  reconnect:
    supported: true
    requires_new_private_token: true
    requires_resubscribe: true
  resync:
    order_book: REST level2 snapshot after reconnect or sequence gap
    orders: REST open-orders/query-order sweep
    balances: REST account-overview sweep
    positions: REST positions sweep
history:
  orders:
    support: native
    endpoint: /api/v1/orders
  fills:
    support: native
    endpoint: /api/v1/fills
    pagination:
      style: page_number
      limit_param: pageSize
      cursor_param: currentPage
      max_limit: 500
  funding:
    support: mapped_for_audit
    endpoint: /api/v1/funding-history
batch:
  place:
    support: composed
    mode: composed_sequential
    atomicity: non_atomic
    max_items: 20
    same_market_type_required: true
    supports_client_order_id: true
    supports_partial_failure: false
  cancel:
    support: composed
    mode: composed_sequential
    atomicity: non_atomic
    max_items: 20
    same_market_type_required: true
    supports_client_order_id: true
    supports_partial_failure: false
unsupported:
  - quote_sized_futures_market_order
  - amend_order
  - stop_order
  - fiat_funding
  - transfer
  - margin_mode_mutation
  - position_mode_mutation
