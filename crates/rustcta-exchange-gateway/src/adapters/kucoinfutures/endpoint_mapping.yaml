schema_version: 1
exchange: kucoinfutures
adapter: rustcta_exchange_gateway::adapters::kucoinfutures
metadata:
  status: validated
  notes: "Task 6 KuCoin Futures split adapter. Spot remains in the kucoin adapter; this mapping covers USDT/USD futures-perpetual contracts."
market_types:
  - perpetual
products:
  - perpetual
rest:
  base_url: https://api-futures.kucoin.com
rate_limits:
  buckets:
    futures_public:
      scope: rest
      interval: 3s
      limit: 30
    futures_private:
      scope: account
      interval: 3s
      limit: 45
    futures_orders:
      scope: orders
      interval: 3s
      limit: 45
    websocket:
      scope: websocket
      interval: 1m
      limit: 100
pagination:
  open_orders:
    style: currentPage_pageSize
    cursor: offset_or_page_number_token
    limit_param: pageSize
    page_param: currentPage
    max_limit: 500
  recent_fills:
    style: currentPage_pageSize_with_time_window
    cursor: offset_or_page_number_token
    since_param: startAt
    until_param: endAt
    limit_param: pageSize
    page_param: currentPage
    max_limit: 500
reconciliation:
  private_stream_fallback: rest
  readbacks:
    - query_order
    - get_open_orders
    - get_recent_fills
    - get_positions
  after_unknown_place: query_order
  after_unknown_cancel: query_order
  after_ws_gap: rest_order_book_snapshot
batch:
  place_orders:
    support: composed
    mode: composed_sequential
    atomicity: non_atomic
    max_items: 20
    partial_failure: false
  cancel_orders:
    support: composed
    mode: composed_sequential
    atomicity: non_atomic
    max_items: 20
    partial_failure: false
websocket:
  public:
    support: native
    url: wss://ws-api-futures.kucoin.com/endpoint
    heartbeat:
      direction: client_ping
      interval_ms: 20000
      timeout_ms: 10000
    resync: rest_order_book_snapshot
    public_channels:
      - /contractMarket/level2:{symbol}
      - /contractMarket/level2Depth5:{symbol}.100ms
      - /contractMarket/level2Depth50:{symbol}.100ms
      - obu.depth1.real-time
      - obu.depth5.100ms
      - obu.depth50.100ms
    order_book:
      classic_channels:
        level2_increment:
          channel: /contractMarket/level2:{symbol}
          interval_ms: real_time
          depth_per_side: incremental
        level2_depth_5:
          channel: /contractMarket/level2Depth5:{symbol}
          interval_ms: 100
          depth_per_side: 5
        level2_depth_50:
          channel: /contractMarket/level2Depth50:{symbol}
          interval_ms: 100
          depth_per_side: 50
      uta_obu_channels:
        bbo:
          channel: obu
          interval_ms: real_time
          depth_per_side: 1
        depth_5:
          channel: obu.depth5
          interval_ms: 100
          depth_per_side: 5
        depth_50:
          channel: obu.depth50
          interval_ms: 100
          depth_per_side: 50
      sequence:
        fields: [sequence, sequenceStart, sequenceEnd]
        continuity: sequenceEnd_links_to_next_sequenceStart
        gap_policy: rest_snapshot_resync
      checksum: none
      resync:
        mode: rest_snapshot_rebuild_and_buffered_delta_replay
        endpoint_operation: get_order_book
        path: /api/v1/level2/snapshot
  private:
    support: spec_only
    token_endpoint: /api/v1/bullet-private
    auth: rest_bullet_token
    renewal: refresh_before_expiry
    renew_before_expiry_ms: 3600000
    topics:
      - /contractMarket/tradeOrders
      - /contractAccount/wallet
      - /contract/position
    reconnect:
      resubscribe: true
      rest_resync_operations: [get_balances, get_positions, get_open_orders, get_recent_fills, query_order]
    fallback: rest_reconciliation
unsupported:
  - operation: spot_product
    reason: KuCoin Futures adapter/profile only maps the KuCoin futures API; spot remains in the kucoin adapter.
endpoints:
  - operation: get_symbol_rules
    product: perpetual
    transport: rest
    method: GET
    path: /api/v1/contracts/active
    auth: none
    rate_limit_bucket: futures_public
    weight: 1
    request_spec_required: false
  - operation: get_order_book
    product: perpetual
    transport: rest
    method: GET
    path: /api/v1/level2/snapshot
    auth: none
    rate_limit_bucket: futures_public
    weight: 1
    request_spec_required: false
  - operation: get_balances
    product: perpetual
    transport: rest
    method: GET
    path: /api/v1/account-overview
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: futures_private
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/kucoinfutures/request_specs/account_overview.json
  - operation: get_positions
    product: perpetual
    transport: rest
    method: GET
    path: /api/v1/positions
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: futures_private
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/kucoinfutures/request_specs/positions.json
  - operation: get_fees
    product: perpetual
    transport: rest
    method: GET
    path: /api/v1/trade-fees
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: futures_private
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/kucoinfutures/request_specs/trade_fees.json
  - operation: get_funding_rates
    product: perpetual
    transport: rest
    method: GET
    path: /api/v1/contracts/active
    auth: none
    credential_scopes: []
    rate_limit_bucket: futures_public
    weight: 1
    request_spec_required: false
    request_spec:
      fixture: tests/fixtures/exchanges/kucoinfutures/request_specs/funding_history.json
    support: native
    response_parser:
      status: implemented
      fixture: tests/fixtures/exchanges/kucoinfutures/funding_history_success.json
      test: crates/rustcta-exchange-gateway/src/adapters/kucoinfutures/public_tests.rs
    notes: "Runtime fetches contracts/active for current funding and scanner enrichment fields mark_price/index_price/open_interest/turnover_24h/volume_24h/predicted_funding_rate/next_funding_time before reading /api/v1/funding-history for latest historical funding time."
  - operation: place_order
    product: perpetual
    transport: rest
    method: POST
    path: /api/v1/orders
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: futures_orders
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/kucoinfutures/request_specs/place_order_limit.json
  - operation: cancel_order
    product: perpetual
    transport: rest
    method: DELETE
    path: /api/v1/orders/{orderId}
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: futures_orders
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/kucoinfutures/request_specs/cancel_order.json
  - operation: cancel_all_orders
    product: perpetual
    transport: rest
    method: DELETE
    path: /api/v1/orders
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: futures_orders
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/kucoinfutures/request_specs/cancel_all_orders.json
  - operation: query_order
    product: perpetual
    transport: rest
    method: GET
    path: /api/v1/orders/{orderId}
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: futures_private
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/kucoinfutures/request_specs/query_order.json
  - operation: get_open_orders
    product: perpetual
    transport: rest
    method: GET
    path: /api/v1/orders
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: futures_private
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/kucoinfutures/request_specs/open_orders.json
  - operation: get_recent_fills
    product: perpetual
    transport: rest
    method: GET
    path: /api/v1/fills
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: futures_private
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/kucoinfutures/request_specs/recent_fills.json
  - operation: get_private_bullet_token
    product: perpetual
    transport: rest
    method: POST
    path: /api/v1/bullet-private
    auth: hmac
    credential_scopes: [read_only, trade]
    rate_limit_bucket: futures_private
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/kucoinfutures/request_specs/bullet_private.json
