schema_version: 1
exchange: aster
adapter: rustcta_exchange_gateway::adapters::aster
status_date: "2026-06-12"
metadata:
  status: draft
  source: Aster Futures V3 API docs and Task 11 local implementation
  last_reviewed: "2026-06-12"
  notes: Perpetual-only Aster adapter. Private REST uses EIP-712 AsterSignTransaction signing but is classified as signed auth for the shared mapping schema.
market_types: [perpetual]
products: [perpetual]
rest:
  base_url: https://fapi.asterdex.com
auth:
  private_rest: EIP-712 AsterSignTransaction with user, signer, nonce, and signature fields
  domain:
    name: AsterSignTransaction
    version: "1"
    chain_id: 1666
    verifying_contract: "0x0000000000000000000000000000000000000000"
rate_limits:
  public_ip: { scope: ip, default_weight: 1 }
  signed_uid: { scope: account, default_weight: 1 }
websocket:
  public:
    url: wss://fstream.asterdex.com/ws
    channels: [bookTicker, depth5@100ms, depth10@100ms, depth20@100ms, depth@100ms, depth@250ms, depth@500ms, aggTrade, ticker, kline]
    order_book:
      channels: [bookTicker, depth5@100ms, depth10@100ms, depth20@100ms, depth@100ms, depth@250ms, depth@500ms]
      bbo_channel: bookTicker
      partial_depth_channels: [depth5@100ms, depth10@100ms, depth20@100ms]
      diff_depth_channels: [depth@100ms, depth@250ms, depth@500ms]
      supported_depths: [5, 10, 20]
      push_intervals: [100ms, 250ms, 500ms]
      sequence_fields: [U, u, pu, lastUpdateId]
      sequence_policy: Binance-style REST snapshot replay; rebuild when pu does not equal previous u.
      checksum: unsupported
      snapshot: GET /fapi/v3/depth
      resync_policy: Use REST snapshot lastUpdateId replay after sequence gap or reconnect.
  private:
    url: wss://fstream.asterdex.com/ws/{listen_key}
    channels: [ACCOUNT_UPDATE, ORDER_TRADE_UPDATE, listenKeyExpired]
    listen_key:
      create: POST /fapi/v3/listenKey
      renew: PUT /fapi/v3/listenKey
      delete: DELETE /fapi/v3/listenKey
      support: parser_and_lifecycle_helpers
endpoints:
  - operation: get_symbol_rules
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /fapi/v3/exchangeInfo
    auth: none
    rate_limit_bucket: public_ip
    weight: 10
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
  - operation: get_order_book
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /fapi/v3/depth
    auth: none
    rate_limit_bucket: public_ip
    weight: 5
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
  - operation: create_listen_key
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: POST
    path: /fapi/v3/listenKey
    auth: signed
    rate_limit_bucket: signed_uid
    weight: 1
    request_spec_required: true
    support: native
  - operation: renew_listen_key
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: PUT
    path: /fapi/v3/listenKey
    auth: signed
    rate_limit_bucket: signed_uid
    weight: 1
    request_spec_required: true
    support: native
  - operation: delete_listen_key
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: DELETE
    path: /fapi/v3/listenKey
    auth: signed
    rate_limit_bucket: signed_uid
    weight: 1
    request_spec_required: true
    support: native
  - operation: funding_mark_price
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /fapi/v3/premiumIndex
    auth: none
    rate_limit_bucket: public_ip
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
    response_parser:
      status: implemented
      fixture: tests/fixtures/exchanges/aster/premium_index_single.json
      test: crates/rustcta-exchange-gateway/src/adapters/aster/v3_tests.rs
    notes: Runtime maps mark_price, index_price, and next_funding_time into FundingRateSnapshot when present.
  - operation: funding_history
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /fapi/v3/fundingRate
    auth: none
    rate_limit_bucket: public_ip
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
    response_parser:
      status: implemented
      fixture: tests/fixtures/exchanges/aster/funding_rate_history.json
      test: crates/rustcta-exchange-gateway/src/adapters/aster/v3_tests.rs
  - operation: get_balances
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /fapi/v3/balance
    auth: signed
    credential_scopes: [read_only]
    rate_limit_bucket: signed_uid
    weight: 20
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
    sign_path: eip712_v3_query
  - operation: get_positions
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /fapi/v3/positionRisk
    auth: signed
    credential_scopes: [read_only]
    rate_limit_bucket: signed_uid
    weight: 20
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
    sign_path: eip712_v3_query
  - operation: get_fees
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /fapi/v3/commissionRate
    auth: signed
    credential_scopes: [read_only]
    rate_limit_bucket: signed_uid
    weight: 20
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
    sign_path: eip712_v3_query
  - operation: place_order
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: POST
    path: /fapi/v3/order
    auth: signed
    credential_scopes: [trade]
    rate_limit_bucket: signed_uid
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: non_atomic
    testnet: false
    support: native
    sign_path: eip712_v3_form
  - operation: cancel_order
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: DELETE
    path: /fapi/v3/order
    auth: signed
    credential_scopes: [trade]
    rate_limit_bucket: signed_uid
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: non_atomic
    testnet: false
    support: native
    sign_path: eip712_v3_form
  - operation: cancel_all_orders
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: DELETE
    path: /fapi/v3/allOpenOrders
    auth: signed
    credential_scopes: [trade]
    rate_limit_bucket: signed_uid
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: partial
    testnet: false
    support: native
    sign_path: eip712_v3_form
  - operation: query_order
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /fapi/v3/order
    auth: signed
    credential_scopes: [read_only]
    rate_limit_bucket: signed_uid
    weight: 4
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
    sign_path: eip712_v3_query
  - operation: get_open_orders
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /fapi/v3/openOrders
    auth: signed
    credential_scopes: [read_only]
    rate_limit_bucket: signed_uid
    weight: 6
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
    sign_path: eip712_v3_query
  - operation: get_recent_fills
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /fapi/v3/userTrades
    auth: signed
    credential_scopes: [read_only]
    rate_limit_bucket: signed_uid
    weight: 20
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
    max_items: 1000
    sign_path: eip712_v3_query
  - operation: amend_order
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: PUT
    path: /fapi/v3/order
    auth: signed
    credential_scopes: [trade]
    rate_limit_bucket: signed_uid
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/aster/request_specs/amend_order.json
    native_batch: false
    atomicity: atomic
    testnet: false
    support: native
    sign_path: eip712_v3_query
  - operation: place_order_list
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: UNSUPPORTED
    path: /unsupported/aster/order-list
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: signed_uid
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    testnet: false
    support: unsupported
    reason: aster.order_list_unsupported
  - operation: batch_place_orders
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: POST
    path: /fapi/v3/batchOrders
    auth: signed
    credential_scopes: [trade]
    rate_limit_bucket: signed_uid
    weight: 5
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/aster/request_specs/batch_place_orders.json
    native_batch: true
    atomicity: partial
    testnet: false
    support: native
    max_items: 5
    sign_path: eip712_v3_query
    notes: Runtime parses per-item partial failures from batch response code/msg rows.
  - operation: batch_cancel_orders
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: DELETE
    path: /fapi/v3/batchOrders
    auth: signed
    credential_scopes: [trade]
    rate_limit_bucket: signed_uid
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/aster/request_specs/batch_cancel_orders.json
    native_batch: true
    atomicity: partial
    testnet: false
    support: native
    max_items: 10
    sign_path: eip712_v3_query
    notes: Runtime supports one symbol per call and does not mix orderIdList with origClientOrderIdList.
unsupported:
  - operation: spot_product
    status: project_unimplemented
    reason: "Official Aster Spot API exists as a separate surface, but this adapter scope is Aster Futures V3 USDT perpetual REST/WS only; remaining Spot runtime work is spot REST/WS host audit, exchangeInfo/depth/ticker/trades public specs, signed account private specs, spot order lifecycle/open-order/fill private specs, listen-key/private stream handling, and product-scope reconciliation guards."
    official_gap: spot_product
    source_boundary_fixture: tests/fixtures/exchanges/aster/request_specs/product_line_source_boundary.json
    current_scope: "Aster Futures V3 USDT perpetual REST/WS profile."
    runtime_gap: "Spot REST/WS host, symbol metadata, depth/ticker/trades, signed account/order endpoints, and listen-key/private stream handling are not wired."
    required_endpoints: [spot_exchange_info, spot_depth, spot_ticker, spot_trades, spot_account, spot_order, spot_open_orders, spot_user_stream]
  - futures_coin_m
  - quote_sized_market_order
  - order_list
  - amend_order
  - transfers
