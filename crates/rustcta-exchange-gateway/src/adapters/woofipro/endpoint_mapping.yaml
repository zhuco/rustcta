  - operation: batch_cancel_orders
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: DELETE
    path: /v1/batch-order
    auth: signed
    credential_scopes: [trade]
    rate_limit_bucket: woofipro_orderly_batch
    weight: 1
    request_spec_required: true
    native_batch: true
    atomicity: partial
    testnet: true
    support: native
    official_doc: https://orderly.network/docs/build-on-omnichain/evm-api/restful-api/private
