    support: native
    official_doc: https://orderly.network/docs/build-on-omnichain/evm-api/restful-api/private
    request_spec_fixture: tests/fixtures/exchanges/woofipro/request_specs/cancel_all_orders.json
  - operation: query_order
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /v1/order/{order_id}
    auth: signed
    credential_scopes: [read_only]
    rate_limit_bucket: woofipro_orderly_private
    weight: 1
    request_spec_required: true
