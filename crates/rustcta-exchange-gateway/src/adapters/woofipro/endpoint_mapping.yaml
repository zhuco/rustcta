schema_version: 1
exchange: woofipro
adapter: WoofiproGatewayAdapter
status_date: "2026-06-08"
metadata:
  status: draft
  source: docs/woofipro_adapter.md
  last_reviewed: "2026-06-08"
  notes: Task A-36 WOOFi Pro profile over Orderly API. Public info and signed REST trading/read endpoints are mapped; WS runtime remains helper/spec-only.
market_types: [perpetual]
products: [perpetual]
base_urls:
  rest: https://api.orderly.org
  legacy_evm_rest: https://api-evm.orderly.org
  testnet_rest: https://testnet-api.orderly.org
  public_ws: wss://ws-evm.orderly.org/ws/stream
  private_ws: wss://ws-private-evm.orderly.org/v2/ws/private/stream
auth:
  public_rest: none
  private_rest: Orderly account headers orderly-account-id/orderly-key/orderly-signature/orderly-timestamp
  signing: Ed25519 over timestamp + method + path_with_query + body, signature encoded base64url without padding
rate_limits:
  woofipro_public: { scope: ip, interval_ms: 1000, limit: 10 }
  woofipro_orderly_signed_read: { scope: account, interval_ms: 1000, limit: 5 }
  woofipro_orderly_private: { scope: account, interval_ms: 1000, limit: 10 }
  woofipro_orderly_orders: { scope: account, interval_ms: 1000, limit: 10 }
  woofipro_orderly_batch: { scope: account, interval_ms: 1000, limit: 2 }
  woofipro_unsupported: { scope: exchange, interval_ms: 1000, limit: 0 }
pagination:
  public_info: { mode: none }
  private_history: { mode: page_or_size }
reconciliation:
  private_state: signed_rest
  notes: Cancel acknowledgements may require query/open-orders reconciliation for final terminal state.
batch:
  place: { support: native, max_items: 10, atomicity: partial }
  cancel: { support: native, max_items: 10, atomicity: partial }
websocket:
  public:
    support: spec_only
    helper_only: true
    heartbeat: { mode: ping_payload, interval_ms: 30000, timeout_ms: 45000, stale_message_ms: 60000 }
    order_book:
      product: perpetual
      market_types: [perpetual]
      url: wss://ws-evm.orderly.org/ws/stream/{account_id}
      protocol: websocket_json
      channel: "{symbol}@orderbookupdate"
      subscribe:
        payload:
          id: "woofipro-{symbol}@orderbookupdate"
          event: subscribe
          topic: "{symbol}@orderbookupdate"
        symbol_format: PERP_BASE_QUOTE
        account_id_required_for_path: true
      interval_ms: 200
      update_semantics: changed_price_levels
      zero_quantity_deletes: true
      depth: unspecified
      depth_boundary: "depth: unspecified; official Orderly orderbookupdate docs do not publish a fixed depth selector for this profile."
      sequence:
        fields: [ts, prevTs]
        continuity: "message.prevTs must equal previous message ts"
        gap_detection: prevTs_mismatch_or_regression
      checksum:
        supported: false
        field: null
        risk: "Orderly orderbookupdate docs do not publish checksum for this profile."
      resync:
        mode: request_orderbook_snapshot_then_resubscribe
        rest_endpoint_operation: get_order_book
        rest_endpoint: /v1/orderbook/{symbol}
        rest_auth: orderly_account_signed_read
        triggers: [connect, reconnect, prevTs_gap, stale_stream, parse_error, suspected_message_loss]
  private:
    support: unsupported
    auth_renewal: { mode: unsupported }
unsupported:
  - operation: spot_product
    reason: WOOFi Pro profile maps Orderly perpetual trading; WOOFi Swap is not a shared spot order book for this adapter.
  - operation: get_fees
    reason: "交易所不支持当前费率接口 runtime：builder/admin fee routes 不进入普通账户 runtime。"
endpoints:
  - operation: get_symbol_rules
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /v1/public/info
    auth: none
    rate_limit_bucket: woofipro_public
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: native
    official_doc: https://orderly.network/docs/build-on-omnichain/evm-api/restful-api/public/get-available-symbols
    request_spec_fixture: tests/fixtures/exchanges/woofipro/request_specs/public_info.json
  - operation: get_order_book
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /v1/orderbook/{symbol}
    auth: signed
    credential_scopes: [read_only]
    rate_limit_bucket: woofipro_orderly_signed_read
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: native
    official_doc: https://orderly.network/docs/build-on-omnichain/restful-api/private/orderbook-snapshot
