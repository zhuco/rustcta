  - operation: get_fees
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /unsupported/woofipro/fees
    auth: unsupported
    rate_limit_bucket: woofipro_unsupported
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    testnet: false
    support: unsupported
    reason: woofipro.fees_require_orderly_account_audit
streams:
  - operation: public_orderbook_delta
    product: perpetual
    transport: websocket
    channel: "{symbol}@orderbookupdate"
    auth: none
    support: spec_only
    resync:
      endpoint_operation: get_order_book
      mode: signed_rest_required
  - operation: public_builder_ticker
    product: perpetual
    transport: websocket
    channel: "woofi_pro${symbol}@ticker"
    auth: none
    support: spec_only
  - operation: private_user_events
    product: perpetual
    transport: websocket
    channel: executionreport/account
    auth: signed
    support: unsupported
    reason: woofipro.private_streams_require_orderly_account_auth
