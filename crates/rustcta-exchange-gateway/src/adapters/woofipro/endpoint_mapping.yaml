streams:
  - operation: public_orderbook_delta
    product: perpetual
    transport: websocket
    channel: "{symbol}@orderbookupdate"
    auth: none
    support: spec_only
    interval_ms: 200
    depth: unspecified
    depth_boundary: "depth: unspecified; no fixed depth is documented for this Orderly profile."
    sequence_fields: [ts, prevTs]
    checksum: none_documented
    resync:
      endpoint_operation: get_order_book
      mode: signed_rest_required
      trigger: prevTs_gap_or_reconnect
  - operation: public_builder_ticker
    product: perpetual
    transport: websocket
    channel: "woofi_pro${symbol}@ticker"
    auth: none
    support: spec_only
  - operation: private_user_events
    product: perpetual
    transport: websocket
    channel: executionreport/account
    auth: signed
    support: unsupported
    reason: woofipro.private_streams_require_orderly_account_auth
