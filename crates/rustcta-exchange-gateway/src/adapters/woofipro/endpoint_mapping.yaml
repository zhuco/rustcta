  - operation: batch_place_orders
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: POST
    path: /v1/batch-order
    auth: signed
    credential_scopes: [trade]
    rate_limit_bucket: woofipro_orderly_batch
    weight: 1
    request_spec_required: true
