schema_version: 1
exchange: weex
metadata:
  status: validated
  source: rustcta-exchange-gateway WEEX adapter implementation
  last_reviewed: "2026-06-08"
  notes: Spot and USDT-M perpetual REST plus WebSocket request-spec mapping for declared WEEX capabilities.
market_types: [spot, perpetual]
base_urls:
  spot_rest: https://api-spot.weex.com
  contract_rest: https://api-contract.weex.com
  spot_public_ws: wss://ws-spot.weex.com/v3/ws/public
  spot_private_ws: wss://ws-spot.weex.com/v3/ws/private
  contract_public_ws: wss://ws-contract.weex.com/v3/ws/public
  contract_private_ws: wss://ws-contract.weex.com/v3/ws/private
auth:
  rest:
    mode: hmac
    algorithm: hmac_sha256_base64
    headers: [ACCESS-KEY, ACCESS-SIGN, ACCESS-PASSPHRASE, ACCESS-TIMESTAMP]
    prehash: timestamp + METHOD_UPPER + requestPath + optional("?"+queryString) + body
  websocket_private:
    mode: hmac
    algorithm: hmac_sha256_base64
    headers: [ACCESS-KEY, ACCESS-SIGN, ACCESS-PASSPHRASE, ACCESS-TIMESTAMP]
    prehash: timestamp + /v3/ws/private
rate_limits:
  plan: conservative_until_live_verified
  buckets:
    weex_public_rest:
      scope: ip
      capacity_per_minute: 1200
      notes: Conservative adapter-local planning bucket; live headers are not consumed yet.
    weex_private_rest:
      scope: account
      capacity_per_minute: 600
      notes: Private order/read routes use account-scoped throttling in callers until official route weights are confirmed.
    weex_order_write:
      scope: account
      capacity_per_minute: 120
      notes: Order mutations and native batch operations should be guarded by a stricter bucket.
pagination:
  order_book:
    mode: limit
    max_limit: 200
  recent_fills:
    mode: time_window_limit
    parameters: [startTime, endTime, limit]
    max_limit: 100
  open_orders:
    mode: symbol_optional_full_list
  order_history:
    mode: order_id_or_client_order_id
reconciliation:
  after_place: query_order_by_exchange_or_client_id
  after_cancel: query_order_then_open_orders_if_not_found
  after_batch_place: query_each_acknowledged_order
  after_batch_cancel: query_each_cancelled_order_or_open_orders
  websocket_gap: resync_order_book_from_rest_snapshot_and_private_state_from_rest
  live_dry_run_prerequisites:
    - kill_switch
    - disabled_symbol_filter
    - max_notional_guard
    - rest_reconciliation_after_unknown_order_state
batch:
  place:
    mode: native
    atomicity: partial
    max_items: 20
    same_market_type_required: true
    same_symbol_required: false
  cancel:
    mode: native
    atomicity: partial
    max_items: 20
    same_market_type_required: true
    same_symbol_required: true
websocket:
  public:
    support: native
    subscribe: '{"method":"SUBSCRIBE","params":["BTCUSDT@depth15"],"id":1}'
    heartbeat: server ping or pong message, adapter replies with PONG helper
    resync: REST order book snapshot on sequence gap or reconnect
  private:
    support: native_when_credentials_configured
    auth: ACCESS headers during private connection setup
    renewal: no listen key; reconnect and re-auth on stale session or disconnect
unsupported:
  - operation: spot_positions
    reason: spot has no position concept
  - operation: quote_market_order
    reason: not exposed through the current gateway WEEX order builder
  - operation: amend_order
    reason: no typed amend route in this adapter pass
  - operation: order_list
    reason: no OCO/order-list support in this adapter pass
  - operation: post_only_order_placement
    reason: not normalized by the current typed order request mapping
  - operation: reduce_only_order_placement
    reason: not normalized by the current typed order request mapping
  - operation: leverage_margin_position_mode_mutations
    reason: omitted from task-15 trading surface
endpoints:
