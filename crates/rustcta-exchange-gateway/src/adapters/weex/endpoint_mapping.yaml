    product: spot
    transport: rest
    method: GET
    path: /api/v3/exchangeInfo
    auth: none
    rate_limit_bucket: weex_public_rest
    weight: 1
    request_spec_required: false
    support: native
    request_spec:
      status: not_required
    response_parser:
      status: implemented
      test: crates/rustcta-exchange-gateway/src/adapters/weex/public_tests.rs
