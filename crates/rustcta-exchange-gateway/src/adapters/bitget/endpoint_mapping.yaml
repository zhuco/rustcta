schema_version: 1
exchange: bitget
adapter: rustcta_exchange_gateway::adapters::bitget
market_types:
  - spot
rest:
  base_url: https://api.bitget.com
  testnet_base_url: ""
rate_limits:
  buckets:
    public_ip:
      scope: ip
      interval: 1m
      limit: null
    private_uid:
      scope: uid
      interval: 1m
      limit: null
    order_count:
      scope: account
      interval: 1m
      limit: null
pagination:
  get_recent_fills:
    style: id_or_time_window
    since_param: startTime
    until_param: endTime
    cursor_param: idLessThan
    limit_param: limit
    max_limit: 100
reconciliation:
  private_stream_fallback: rest
  readbacks:
    - get_balances
    - query_order
    - get_open_orders
    - get_recent_fills
  unknown_order_policy: query_order_then_open_orders_then_fills
  retry_policy: retry_rate_limited_and_transient
batch:
  place_orders:
    support: composed
    composed_from:
      - place_order
    atomicity: non_atomic
    max_items: 20
    partial_failure: true
  cancel_orders:
    support: composed
    composed_from:
      - cancel_order
    atomicity: non_atomic
    max_items: 20
    partial_failure: true
  cancel_all_orders:
    support: native
    atomicity: partial
    max_items: null
    partial_failure: true
websocket:
  public:
    support: unsupported
    heartbeat:
      required: false
      direction: none
      interval_ms: null
      timeout_ms: null
    resync: rest_order_book_snapshot
  private:
    support: unsupported
    auth: hmac_login
    renewal_ms: null
    relogin_on_reconnect: true
    fallback: rest_reconciliation
endpoints:
  - operation: get_symbol_rules
    transport: rest
    product: spot
    method: GET
    path: /api/v2/spot/public/symbols
    auth: none
    rate_limit_bucket: public_ip
    weight: 1
    request_spec_required: false
  - operation: get_order_book
    transport: rest
    product: spot
    method: GET
    path: /api/v2/spot/market/orderbook
    auth: none
    rate_limit_bucket: public_ip
    weight: 1
    request_spec_required: false
  - operation: get_balances
    transport: rest
    product: spot
    method: GET
    path: /api/v2/spot/account/assets
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_uid
    weight: 1
    request_spec_required: true
  - operation: get_fees
    transport: rest
    product: spot
    method: GET
    path: /api/v3/account/fee-rate
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_uid
    weight: 1
    request_spec_required: true
  - operation: place_order
    transport: rest
    product: spot
    method: POST
    path: /api/v2/spot/trade/place-order
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: order_count
    weight: 1
    request_spec_required: true
  - operation: place_quote_market_order
    transport: rest
    product: spot
    method: POST
    path: /api/v2/spot/trade/place-order
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: order_count
    weight: 1
    request_spec_required: true
  - operation: cancel_order
    transport: rest
    product: spot
    method: POST
    path: /api/v2/spot/trade/cancel-order
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: order_count
    weight: 1
    request_spec_required: true
  - operation: cancel_all_orders
    transport: rest
    product: spot
    method: POST
    path: /api/v2/spot/trade/cancel-symbol-order
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: order_count
    weight: 1
    request_spec_required: true
  - operation: amend_order
    transport: rest
    product: spot
    method: POST
    path: /api/v3/trade/modify-order
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: order_count
    weight: 1
    request_spec_required: true
  - operation: query_order
    transport: rest
    product: spot
    method: GET
    path: /api/v2/spot/trade/orderInfo
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_uid
    weight: 1
    request_spec_required: true
  - operation: get_open_orders
    transport: rest
    product: spot
    method: GET
    path: /api/v2/spot/trade/unfilled-orders
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_uid
    weight: 1
    request_spec_required: true
  - operation: get_recent_fills
    transport: rest
    product: spot
    method: GET
    path: /api/v2/spot/trade/fills
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_uid
    weight: 1
    request_spec_required: true
