schema_version: 1
exchange: oxfun
adapter: OxfunGatewayAdapter
status_date: "2026-06-08"
metadata:
  status: draft
  source: docs/oxfun_adapter.md
  last_reviewed: "2026-06-08"
  notes: Task 10 conservative audit shell. OX.FUN trading is mostly WebSocket based; live resync and private routing remain disabled.
market_types: [perpetual, option]
products: [perpetual, options]
base_urls:
  rest: https://api.ox.fun
  public_ws: wss://api.ox.fun/v2/websocket
  private_ws: wss://api.ox.fun/v2/websocket
  testnet_public_ws: wss://stgapi.ox.fun/v2/websocket
  testnet_private_ws: wss://stgapi.ox.fun/v2/websocket
auth:
  private_rest: AccessKey/Timestamp/Nonce/Signature HMAC-SHA256 base64
  private_ws: login payload signs timestamp + GET/auth/self/verify
rate_limits:
  oxfun_account_source: { scope: account, interval_ms: 1000, limit: 1 }
  websocket_orders: { scope: account, interval_ms: 1000, limit: 50 }
  unverified_rest: { scope: exchange, interval_ms: 1000, limit: 0 }
pagination:
  private_history: { mode: unsupported_unverified }
reconciliation:
  private_state: rest_fallback_required
  notes: Public depthUpdate requires snapshot then monotonic seqNum diffs; runtime resync is not enabled until live validation.
batch:
  place: { support: spec_only, reason: websocket placeorders documented but runtime disabled }
  cancel: { support: spec_only, reason: websocket batch cancel documented but runtime disabled }
websocket:
  public:
    support: spec_only
    channels: [market, depthUpdate, trade, ticker, candles]
    heartbeat: { mode: text_ping, interval_ms: 20000, timeout_ms: 45000, stale_message_ms: 60000 }
    resync: snapshot_then_seqnum_diffs
    order_book:
      channel: depthUpdate:<marketCode>
      depth_channel: "depthUpdate:<marketCode> 100ms"
      snapshot_event: depthUpdate
      delta_event: depthUpdate-diff
      push_interval_ms: 100
      depth: unspecified
      update_model: snapshot_then_diff_absolute_quantity
      sequence_field: seqNum
      checksum: supported
      gap_policy: resubscribe
  private:
    support: spec_only
    auth_renewal: { mode: login_payload }
unsupported:
  - operation: spot_product
    reason: OX.FUN official profile is perpetual swaps/options-style trading; shared spot order lifecycle is not supported by this adapter.
  - operation: get_fees
    reason: "交易所不支持当前费率接口 runtime：private account/orders/funding 仍未验证，未核到稳定 fee endpoint。"
  - operation: get_balances
    status: project_unimplemented
    source_fixture: tests/fixtures/exchanges/oxfun/request_specs/get_balances_account_source.json
    reason: "OX.FUN private account/funding materials indicate account state readback, but stable balances/account equity runtime, parser and reconciliation are not implemented yet."
  - operation: get_positions
    status: project_unimplemented
    source_fixture: tests/fixtures/exchanges/oxfun/request_specs/get_positions_account_source.json
    reason: "OX.FUN private account/positions/funding materials indicate position readback, but stable get_positions runtime, parser and reconciliation are not implemented yet."
  - operation: amend_order
    status: unsupported
    reason: "No OX.FUN amend/replace command has been verified as a lossless shared amend_order model; current code returns oxfun.amend_order_unverified."
  - operation: place_order_list
    status: unsupported
    reason: "No OCO/OTO/order-list semantics are verified for the shared gateway model; current code returns oxfun.order_list_unverified."
  - operation: batch_place_orders
    status: project_unimplemented
    request_spec_fixture: tests/fixtures/exchanges/oxfun/request_specs/ws_batch_place_orders.json
    signing_vector: tests/fixtures/exchanges/oxfun/signing_vectors/ws_login.json
    parser_fixtures:
      - tests/fixtures/exchanges/oxfun/ws/private_order_ack.json
      - tests/fixtures/exchanges/oxfun/ws/private_batch_place_ack_partial.json
    reason: "Private WebSocket placeorders is fixture-backed but runtime remains disabled pending authenticated WS session lifecycle, request tag/order-id reconciliation, dry-run guard and REST/private-stream readback."
  - operation: batch_cancel_orders
    status: unsupported
    reason: "OX.FUN cancelorders is not fixture-verified for shared batch_cancel_orders; current code keeps oxfun.batch_cancel_orders_ws_request_spec_only unsupported until safe request/parser/reconciliation evidence exists."
streams:
  - operation: ws_market_snapshot
    transport: websocket
    channel: market:all
    support: parser_only
    resync: symbol_rules
  - operation: ws_depth_update
    transport: websocket
    channel: "depthUpdate:<marketCode> 100ms"
    support: parser_only
    update_model: snapshot_then_diff_absolute_quantity
    push_interval_ms: 100
    sequence_field: seqNum
    checksum: supported
    gap_policy: resubscribe
    resync:
      endpoint_operation: order_book
    notes: Accepts official object-shaped snapshot/diff payloads and legacy array fixture shape; gap handling must resubscribe.
  - operation: ws_heartbeat
    transport: websocket
    channel: text:ping
    support: spec_only
  - operation: ws_login
    transport: websocket
    channel: login
    support: spec_only
endpoints:
  - operation: symbol_rules
    product: perpetual
    market_types: [perpetual, options]
    transport: rest
    method: subscribe
    path: market:all
    auth: none
    rate_limit_bucket: oxfun_ws_public
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: parser_only
    official_doc: https://oxoxox.gitbook.io/ox-docs/api/websocket/subscriptions-public/market
    reason: oxfun.symbol_rules_rest_unverified_ws_market_parser_only
  - operation: order_book
    product: perpetual
    market_types: [perpetual, options]
    transport: rest
    method: subscribe
    path: depthUpdate:<marketCode>
    auth: none
    rate_limit_bucket: oxfun_ws_public
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: parser_only
    official_doc: https://oxoxox.gitbook.io/ox-docs/api/websocket/subscriptions-public/incremental-order-book
    reason: oxfun.order_book_rest_unverified_ws_resync_required
  - operation: ws_login
    product: perpetual
    market_types: [perpetual, options]
    transport: rest
    method: login
    path: /v2/websocket
    auth: hmac
    rate_limit_bucket: oxfun_ws_private
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: spec_only
    request_spec_fixture: tests/fixtures/exchanges/oxfun/request_specs/ws_login.json
    official_doc: https://oxoxox.gitbook.io/ox-docs/api/websocket/authentication
  - operation: place_order
    product: perpetual
    market_types: [perpetual, options]
    transport: rest
    method: placeorder
    path: /v2/websocket
    auth: hmac
    rate_limit_bucket: oxfun_ws_orders
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: non_atomic
    testnet: true
    support: spec_only
    request_spec_fixture: tests/fixtures/exchanges/oxfun/request_specs/ws_place_order.json
    official_doc: https://oxoxox.gitbook.io/ox-docs/api/websocket/order-commands/place-limit-order
    reason: oxfun.place_order_ws_request_spec_only
  - operation: batch_place_orders
    product: perpetual
    market_types: [perpetual, options]
    transport: rest
    method: placeorders
    path: /v2/websocket
    auth: hmac
    rate_limit_bucket: oxfun_ws_orders
    weight: 1
    request_spec_required: true
    native_batch: true
    atomicity: partial
    testnet: true
    support: spec_only
    request_spec_fixture: tests/fixtures/exchanges/oxfun/request_specs/ws_batch_place_orders.json
    official_doc: https://oxoxox.gitbook.io/ox-docs/api/websocket/order-commands/place-batch-market-order
    reason: oxfun.batch_place_orders_ws_private_write_runtime_blocked
    response_parser:
      status: fixture_only
      fixtures:
        - tests/fixtures/exchanges/oxfun/ws/private_batch_place_ack_single.json
        - tests/fixtures/exchanges/oxfun/ws/private_batch_place_ack_partial.json
      reconciliation_report: tests/fixtures/exchanges/oxfun/ws/private_batch_place_reconciliation_report.json
    notes: "Keep offline: shared runtime lacks authenticated private WS session lifecycle, request tag/order-id reconciliation, dry-run guard, and REST/private-stream readback after WS write."
  - operation: amend_order
    product: perpetual
    market_types: [perpetual, options]
    transport: rest
    method: UNSUPPORTED
    path: /unsupported/oxfun/amend-order
    auth: unsupported
    rate_limit_bucket: oxfun_unverified
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    testnet: false
    support: unsupported
    reason: oxfun.amend_order_unverified
  - operation: place_order_list
    product: perpetual
    market_types: [perpetual, options]
    transport: rest
    method: UNSUPPORTED
    path: /unsupported/oxfun/order-list
    auth: unsupported
    rate_limit_bucket: oxfun_unverified
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    testnet: false
    support: unsupported
    reason: oxfun.order_list_unverified
  - operation: batch_cancel_orders
    product: perpetual
    market_types: [perpetual, options]
    transport: rest
    method: UNSUPPORTED
    path: /unsupported/oxfun/batch-cancel
    auth: unsupported
    rate_limit_bucket: oxfun_unverified
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    testnet: false
    support: unsupported
    reason: oxfun.batch_cancel_orders_ws_request_spec_only
  - operation: cancel_order
    product: perpetual
    market_types: [perpetual, options]
    transport: rest
    method: cancelorder
    path: /v2/websocket
    auth: hmac
    rate_limit_bucket: oxfun_ws_orders
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: non_atomic
    testnet: true
    support: spec_only
    request_spec_fixture: tests/fixtures/exchanges/oxfun/request_specs/ws_cancel_order.json
    official_doc: https://oxoxox.gitbook.io/ox-docs/api/websocket/order-commands/cancel-order
    reason: oxfun.cancel_order_ws_request_spec_only
  - operation: get_positions
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: SOURCE_READ
    path: source://oxfun/private-account-positions
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: oxfun_account_source
    weight: 0
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: spec_only
    request_spec_fixture: tests/fixtures/exchanges/oxfun/request_specs/get_positions_account_source.json
    reason: "OX.FUN private account/positions source is fixture-backed as an offline boundary; runtime remains disabled pending stable endpoint verification, read-only auth smoke, parser, and private WS/REST reconciliation."
  - operation: get_balances
    product: perpetual
    market_types: [perpetual, options]
    transport: rest
    method: SOURCE_READ
    path: source://oxfun/private-account-equity
    auth: none
    rate_limit_bucket: oxfun_account_source
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: spec_only
    reason: "Private account/equity source boundary only; shared get_balances runtime remains project-unimplemented pending auth smoke, balance/equity parser, and reconciliation."
    request_spec: { status: fixture_only, fixture: tests/fixtures/exchanges/oxfun/request_specs/get_balances_account_source.json }
    response_parser: { status: planned, fixture: tests/fixtures/exchanges/oxfun/request_specs/get_balances_account_source.json }
  - operation: funding
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /unsupported/oxfun/funding
    auth: unsupported
    rate_limit_bucket: oxfun_unverified
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    testnet: false
    support: unsupported_unverified
    reason: oxfun.funding_unverified
