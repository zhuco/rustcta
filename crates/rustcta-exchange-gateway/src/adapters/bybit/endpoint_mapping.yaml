schema_version: 1
exchange: bybit
adapter: rustcta_exchange_gateway::adapters::bybit
status_date: "2026-06-09"
metadata:
  status: validated
  source: Bybit V5 REST/WS docs plus legacy private_perp migration notes
  last_reviewed: "2026-06-09"
market_types: [spot, perpetual, futures]
products: [spot, perpetual, futures]
rest:
  base_url: https://api.bybit.com
  testnet_base_url: https://api-testnet.bybit.com
base_urls:
  public_ws_linear: wss://stream.bybit.com/v5/public/linear
  public_ws_spot: wss://stream.bybit.com/v5/public/spot
  public_ws_inverse: wss://stream.bybit.com/v5/public/inverse
  public_ws_option: wss://stream.bybit.com/v5/public/option
  private_ws: wss://stream.bybit.com/v5/private
auth:
  private_rest: X-BAPI-SIGN = HMAC_SHA256(timestamp + api_key + recv_window + query_or_json_body)
  private_ws: auth args [api_key, expires_ms, HMAC_SHA256("GET/realtime" + expires_ms)]
rate_limits:
  public_market: { scope: ip, retry_after: http_429_or_retCode_10006, default_weight: 1 }
  private_account: { scope: api_key, retry_after: http_429_or_retCode_10006, default_weight: 1 }
  private_trade: { scope: api_key, retry_after: http_429_or_retCode_10006, default_weight: 1 }
reconciliation:
  private_stream_fallback: rest
  readbacks: [get_balances, get_positions, query_order, get_open_orders, get_recent_fills]
  unknown_order_policy: query_order_then_open_orders
batch:
  place_orders:
    support: native
    endpoint: /v5/order/create-batch
    atomicity: partial
    max_items: 20
    same_market_type_required: true
    partial_failure: true
  cancel_orders:
    support: native
    endpoint: /v5/order/cancel-batch
    atomicity: partial
    max_items: 20
    same_market_type_required: true
    partial_failure: true
  cancel_all_orders:
    support: native
    atomicity: partial
    partial_failure: true
websocket:
  public:
    support: native
    channels: [orderbook.1, orderbook.50, orderbook.200, orderbook.1000, publicTrade, tickers, kline.1]
    subscription: json_subscribe
    order_book:
      channel: orderbook.{depth}.{symbol}
      depths: [1, 50, 200, 1000]
      interval_ms: [10, 20, 100, 200]
      message_types: [snapshot, delta]
      sequence_fields: [u, seq]
      timestamp_fields: [ts, cts]
      resync: rest_order_book_snapshot
    orderbook:
      channel_template: orderbook.{depth}.{symbol}
      products:
        spot:
          url: wss://stream.bybit.com/v5/public/spot
          depths: [1, 50, 200, 1000]
          interval_ms: { 1: 10, 50: 20, 200: 100, 1000: 200 }
        linear:
          url: wss://stream.bybit.com/v5/public/linear
          depths: [1, 50, 200, 1000]
          interval_ms: { 1: 10, 50: 20, 200: 100, 1000: 200 }
        inverse:
          url: wss://stream.bybit.com/v5/public/inverse
          depths: [1, 50, 200, 1000]
          interval_ms: { 1: 10, 50: 20, 200: 100, 1000: 200 }
        option:
          url: wss://stream.bybit.com/v5/public/option
          depths: [25, 100]
          interval_ms: { 25: 20, 100: 100 }
      message_types: [snapshot, delta]
      level1_message_types: [snapshot]
      sequence_fields: [u, seq]
      timestamp_fields: [ts, cts]
      zero_size_delta: delete_price_level
      parser: parse_bybit_public_stream_events
    heartbeat: { mode: client_ping, interval_ms: 20000, timeout_ms: 60000 }
    resync: rest_order_book_snapshot
  private:
    support: spec_only_when_credentials_configured
    channels: [order, execution, position, wallet]
    auth: bybit_v5_auth
    fallback: rest_reconciliation
endpoints:
  - operation: get_symbol_rules
    product: perpetual
    transport: rest
    method: GET
    path: /v5/market/instruments-info
    auth: none
    rate_limit_bucket: public_market
    weight: 1
    request_spec_required: false
  - operation: get_order_book
    product: perpetual
    transport: rest
    method: GET
    path: /v5/market/orderbook
    auth: none
    rate_limit_bucket: public_market
    weight: 1
    request_spec_required: false
  - operation: get_funding_rates
    product: perpetual
    transport: rest
    method: GET
    path: /v5/market/tickers
    auth: none
    rate_limit_bucket: public_market
    weight: 1
    request_spec_required: false
    support: native
    response_parser:
      status: implemented
      fixture: tests/fixtures/exchanges/bybit/funding_history.json
      test: crates/rustcta-exchange-gateway/src/adapters/bybit/tests.rs
    notes: "Runtime fetches tickers for current funding and scanner enrichment fields mark_price/index_price/open_interest/turnover_24h/volume_24h/next_funding_time, then /v5/market/funding/history for the latest settled funding timestamp."
  - operation: open_interest
    product: perpetual
    transport: rest
    method: GET
    path: /v5/market/open-interest
    auth: none
    rate_limit_bucket: public_market
    weight: 1
    request_spec_required: false
    support: spec_only
    response_parser: { status: fixture_only, fixture: tests/fixtures/exchanges/bybit/open_interest.json }
  - operation: get_balances
    product: spot_perpetual
    transport: rest
    method: GET
    path: /v5/account/wallet-balance
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_account
    weight: 1
    request_spec_required: true
  - operation: get_positions
    product: perpetual
    transport: rest
    method: GET
    path: /v5/position/list
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_account
    weight: 1
    request_spec_required: true
  - operation: place_order
    product: perpetual
    transport: rest
    method: POST
    path: /v5/order/create
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_trade
    weight: 1
    request_spec_required: true
  - operation: cancel_order
    product: perpetual
    transport: rest
    method: POST
    path: /v5/order/cancel
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_trade
    weight: 1
    request_spec_required: true
  - operation: cancel_all_orders
    product: perpetual
    transport: rest
    method: POST
    path: /v5/order/cancel-all
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_trade
    weight: 1
    request_spec_required: true
  - operation: batch_place_orders
    product: perpetual
    transport: rest
    method: POST
    path: /v5/order/create-batch
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_trade
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/bybit/request_specs/batch_place_orders.json
    native_batch: true
    atomicity: partial
    support: native
    response_parser:
      status: implemented
    notes: "Runtime builds signed V5 create-batch requests and returns partial-failure batch reports from retExtInfo.list."
  - operation: batch_cancel_orders
    product: perpetual
    transport: rest
    method: POST
    path: /v5/order/cancel-batch
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_trade
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/bybit/request_specs/batch_cancel_orders.json
    native_batch: true
    atomicity: partial
    support: native
    response_parser:
      status: implemented
    notes: "Runtime builds signed V5 cancel-batch requests and returns partial-failure batch reports from retExtInfo.list."
  - operation: amend_order
    product: perpetual
    transport: rest
    method: POST
    path: /v5/order/amend
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_trade
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/bybit/request_specs/amend_order.json
    native_batch: false
    atomicity: non_atomic
    support: native
    response_parser:
      status: implemented
    notes: "Runtime builds signed V5 amend requests for shared API quantity changes; shared API has no price field, and Bybit client-order-id replacement is rejected before send."
  - operation: place_order_list
    product: perpetual
    transport: rest
    method: POST
    path: /unsupported/bybit/order_list
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: private_trade
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    support: unsupported
    reason: bybit.order_list_unsupported_in_shared_model
  - operation: query_order
    product: perpetual
    transport: rest
    method: GET
    path: /v5/order/realtime
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_account
    weight: 1
    request_spec_required: true
  - operation: get_open_orders
    product: perpetual
    transport: rest
    method: GET
    path: /v5/order/realtime
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_account
    weight: 1
    request_spec_required: true
  - operation: get_recent_fills
    product: perpetual
    transport: rest
    method: GET
    path: /v5/execution/list
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_account
    weight: 1
    request_spec_required: true
  - operation: get_fees
    product: mixed
    transport: rest
    method: GET
    path: /v5/account/fee-rate
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_account
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/bybit/request_specs/get_fees.json
    response_parser:
      status: implemented
      fixture: tests/fixtures/exchanges/bybit/fee_rate.json
    notes: "Runtime currently maps Spot/Perpetual/Futures symbols through category=spot/linear; inverse/option remain documented V5 categories until shared market-type routing is expanded."
  - operation: set_leverage
    product: perpetual
    transport: rest
    method: POST
    path: /v5/position/set-leverage
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_trade
    weight: 1
    request_spec_required: true
    support: native
    request_spec:
      fixture: tests/fixtures/exchanges/bybit/request_specs/set_leverage.json
    response_parser:
      status: implemented
    notes: "Runtime maps the shared SetLeverageRequest leverage to both buyLeverage and sellLeverage for V5 linear/inverse contracts."
  - operation: switch_margin_mode
    product: perpetual
    transport: rest
    method: POST
    path: /v5/position/switch-isolated
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_trade
    weight: 1
    request_spec_required: true
    support: unsupported
    reason: no shared gateway mutation request type for margin mode in task-1 adapter surface
  - operation: set_position_mode
    product: perpetual
    transport: rest
    method: POST
    path: /v5/position/switch-mode
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_trade
    weight: 1
    request_spec_required: true
    support: native
    notes: "Runtime maps shared SetPositionModeRequest to linear account-level mode 3(hedge) or 0(one-way)."
