streams:
- operation: public_spot_order_book_snapshot_method1
  product: spot
  channel: spot/level2_20:{symbol}
  transport: websocket
  url: wss://ws.futurescw.info?token={public_token}
  subscription_mode: json_subscribe
  push_interval_ms: null
  depth: 20
  sequence_field: seq
  checksum: unsupported
  parser_fixture: tests/fixtures/exchanges/coinw/ws/spot_depth_snapshot.json
  resync:
    mode: rest_snapshot_after_reconnect_or_seq_gap
    endpoint_operation: get_order_book
- operation: public_spot_order_book_snapshot_method2
  product: spot
  channel: depth_snapshot
  transport: websocket
  url: wss://ws.futurescw.com
  subscription_mode: json_subscribe
  push_interval_ms: null
  depth: 100
  sequence_field: seq
  checksum: unsupported
  parser_fixture: tests/fixtures/exchanges/coinw/ws/spot_depth_snapshot.json
  notes: Requires numeric CoinW pairCode from market summary; runtime currently keeps
    method1 symbol-based subscription for generic SymbolScope compatibility.
  resync:
    mode: rest_snapshot_after_reconnect_or_seq_gap
    endpoint_operation: get_order_book
- operation: public_spot_order_book_incremental
  product: spot
  channel: depth
  transport: websocket
  url: wss://ws.futurescw.com
  subscription_mode: json_subscribe
  push_interval_ms: null
  depth: incremental
  sequence_fields: [startSeq, endSeq]
  level_sequence_index: 2
  checksum: unsupported
  parser_fixture: tests/fixtures/exchanges/coinw/ws/spot_depth_incremental.json
  notes: Requires numeric CoinW pairCode from market summary; zero quantity levels
    are delete markers.
  resync:
    mode: rest_snapshot_then_replay_incremental
    endpoint_operation: get_order_book
- operation: public_futures_order_book_depth
  product: linear_perp
  channel: depth
  transport: websocket
  url: wss://ws.futurescw.com/perpum
  subscription_mode: json_subscribe
  push_interval_ms: null
  depth: 100
  sequence_field: null
  checksum: unsupported
  parser_fixture: tests/fixtures/exchanges/coinw/ws/futures_depth_100.json
  risk: Official response fields list asks/bids/n/ts but no sequence or checksum;
    treat reconnect or suspected loss as requiring fresh REST/WS snapshot.
  resync:
    mode: rest_snapshot_after_reconnect_or_gap_suspicion
    endpoint_operation: get_order_book_perp
