schema_version: 1
exchange: bydfi
adapter: BydfiGatewayAdapter
status_date: "2026-06-08"
metadata:
  status: validated
  source: docs/bydfi_adapter.md
  last_reviewed: "2026-06-08"
  notes: USDT perpetual first adapter. Spot trading, testnet and private WS remain explicit Unsupported boundaries.
market_types: [spot, perpetual]
products: [spot, perpetual]
base_urls:
  rest: https://api.bydfi.com/api
  public_ws: wss://stream.bydfi.com/v1/public/fapi
  testnet: unsupported_no_official_url
auth:
  private_rest: hmac_sha256_headers
  private_ws: unsupported_private_connection_url_not_documented
rate_limits:
  public_rest: { scope: ip, interval_ms: 1000, limit: 20 }
  private_rest: { scope: api_key, interval_ms: 1000, limit: 5, notes: per-interface private quotas not fully published }
  public_ws_subscriptions: { scope: ip, interval_ms: 1000, limit: 5, burst_5m: 300 }
pagination:
  history: { mode: time_window_limit, max_window_days: 7, max_age_months: 6, max_limit: 1000 }
reconciliation:
  private_state: rest_fallback
  order_book: REST GET /v1/fapi/market/depth
  orders: REST GET /v2/fapi/trade/open_order and /v2/fapi/trade/history_trade
batch:
  place: { support: native, max_items: 5, atomicity: partial }
  cancel: { support: native, max_items: 10, atomicity: partial, same_symbol_required: true }
websocket:
  public:
    support: native
    url: wss://stream.bydfi.com/v1/public/fapi
    subscribe: { method: SUBSCRIBE, params: ["<symbol>@depth", "<symbol>@ticker", "<symbol>@kline_1m"] }
    heartbeat: { method: ping, interval_ms: 30000, expected_result: pong, retention_ms: 1200000 }
  private:
    support: unsupported
    reason: BYDFi documents LOGIN and events but not a stable private WebSocket connection URL.
unsupported:
  - operation: spot_trading
    reason: Current official SPOT section does not document spot market/order lifecycle endpoints.
  - operation: testnet
    reason: No official testnet or sandbox base URL found.
  - operation: private_websocket_runtime
    reason: Private WS URL/subscription lifecycle is undocumented; use REST reconciliation.
endpoints:
