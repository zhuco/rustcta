    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /v1/fapi/market/exchange_info
    auth: none
    rate_limit_bucket: bydfi_public_market
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
    official_doc: https://developers.bydfi.com/en/futures/market
    response_parser: { status: implemented, test: crates/rustcta-exchange-gateway/src/adapters/bydfi/public_tests.rs, fixture: tests/fixtures/exchanges/bydfi/instruments.json }
