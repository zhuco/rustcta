    transport: rest
    product: spot
    method: GET
    path: /api/v3/viewer/trades
    auth: jwt
    credential_scopes: [read_only]
    rate_limit_bucket: private_account
    weight: 1
    request_spec_required: true
    request_spec:
      status: fixture_only
      fixture: tests/fixtures/exchanges/bigone/request_specs/recent_fills_spot.json
    response_parser:
      status: implemented
      fixture: tests/fixtures/exchanges/bigone/fill.json
      test: crates/rustcta-exchange-gateway/src/adapters/bigone/private_tests.rs
