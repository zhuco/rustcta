      test: crates/rustcta-exchange-gateway/src/adapters/bigone/private_tests.rs
  - operation: amend_order
    transport: rest
    product: spot
    method: PATCH
    path: /unsupported/bigone/amend_order
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: orders
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    support: unsupported
    reason: bigone.amend_order_unsupported
  - operation: place_order_list
    transport: rest
    product: spot
    method: POST
    path: /unsupported/bigone/order_list
