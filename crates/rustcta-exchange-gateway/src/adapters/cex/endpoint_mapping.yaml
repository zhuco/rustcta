schema_version: 1
exchange: cex
adapter: rustcta_exchange_gateway::adapters::cex
status_date: '2026-06-08'
metadata:
  status: validated
  source: https://docs.cex.io/
  last_reviewed: '2026-06-08'
  notes: A-15 CEX.IO spot adapter with public REST and Spot Trading WS order book payload/parser coverage. Private REST and
    fiat ledger runtime stay disabled pending request-spec promotion.
market_types:
- spot
products:
- spot
rest:
  base_url: https://cex.io/api
auth:
  private_rest: JSON body nonce/key/signature; HMAC-SHA256 over nonce + user_id + api_key
  spot_trading_rest: Spot Trading REST private calls use authenticated session/API-key context; get_my_current_fee requires
    read permission.
  websocket: auth message with HMAC-SHA256 over timestamp + api_key
rate_limits:
  public_rest:
    scope: ip
    interval: 10m
    limit: 600
  private_rest:
    scope: account
    interval: 10m
    limit: 2000
websocket:
  url: wss://ws.cex.io/ws/
  status: public_order_book_runtime
  public:
    support: spec_only
    runtime: project_unimplemented
    url: wss://trade.cex.io/api/spot/ws-public
    order_book:
      snapshot_channel: order_book_subscribe
      delta_channel: order_book_increment
      interval: no fixed ms; event-driven by book changes
      depth: 25
      sequence_field: seqId
      checksum: unsupported
      resync:
        mode: rest_snapshot_after_disconnect_or_seqid_gap
        continuity: initial snapshot seqId, then increments must apply in seqId + 1 order
        endpoint_operation: get_order_book
  private:
    support: unsupported
    reason: private WebSocket runtime is not promoted in this adapter slice.
  heartbeat: server_ping_client_pong
  reconnect: server may drop sessions; reconnect and resubscribe required
  public_order_book:
    product: spot
    snapshot_event: order_book_subscribe
    increment_event: order_book_increment
    subscribe_payload:
      e: order-book-subscribe
      data:
        pair:
        - '{base}'
        - '{quote}'
        subscribe: true
        depth: 25
      oid: '{client_request_id}'
    unsubscribe_payload:
      e: order-book-unsubscribe
      data:
        pair:
        - '{base}'
        - '{quote}'
      oid: '{client_request_id}'
    sequence:
      field: seqId
      continuity: initial order_book_subscribe snapshot carries seqId; each order_book_increment must apply in seqId + 1 order
      gap_detection: reconnect_resubscribe_and_rest_snapshot_on_gap_or_regression
    update_semantics: absolute quantity at changed price levels; quantity 0 removes a level in the local book
    checksum: null
    resync:
      mode: rest_snapshot_after_disconnect_or_seqid_gap
      endpoint_operation: get_order_book
      triggers:
      - connect
      - reconnect
      - disconnect
      - seqId_gap
      - seqId_regression
      - parse_gap
reconciliation:
  private_stream_fallback: rest
  status: not enabled until private REST request specs are promoted
unsupported:
- operation: contract_product
  reason: CEX.IO public trading documentation is Spot Trading REST/WS; standard futures/perpetual/options products are not
    exposed by this profile.
- operation: get_fees
  status: project_unimplemented
  reason: Official/account/config fee source exists, but shared get_fees runtime is project-unimplemented for this adapter
    pending get_my_current_fee/get_myfee request spec, auth, parser, and profile guard.
- operation: get_balances
  status: project_unimplemented
  request_spec_fixture: tests/fixtures/exchanges/cex/request_specs/get_balances.json
  reason: Official/private account or balance readback exists, but shared get_balances runtime is project-unimplemented for
    this adapter pending read-only request spec, private balance parser, HMAC auth, and fiat/trading scope guard.
- operation: amend_order
  reason: CEX.IO Spot Trading does not expose a shared in-place amend endpoint for the current gateway model; cancel-and-replace
    is not treated as amend_order.
- operation: place_order_list
  reason: CEX.IO Spot Trading has no native OCO/OTO/order-list endpoint mapped to the shared gateway semantics.
- operation: batch_place_orders
  reason: CEX.IO Spot Trading private write runtime is request-spec-only and no safe native/shared batch place mapping is
    enabled.
- operation: batch_cancel_orders
  reason: CEX.IO Spot Trading private write runtime is request-spec-only and no safe native/shared batch cancel mapping is
    enabled.
- private_rest_runtime
- private_websocket_runtime
- fiat_deposit_withdrawal_runtime
- positions
- margin
- futures
- order_list
- generic_batch_place
- generic_batch_cancel
- live_trading
