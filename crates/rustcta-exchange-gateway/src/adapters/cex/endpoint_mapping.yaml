    is not enabled.
  official_doc: https://docs.cex.io/#get-my-fee
  request_spec:
    status: fixture_only
    fixture: tests/fixtures/exchanges/cex/request_specs/get_myfee_legacy.json
  response_parser:
    status: fixture_only
    fixture: tests/fixtures/exchanges/cex/parser/get_myfee_legacy.json
  notes: Legacy source returns colon-pair keys with buy/sell taker and buyMaker/sellMaker maker percentages; parser must normalize
