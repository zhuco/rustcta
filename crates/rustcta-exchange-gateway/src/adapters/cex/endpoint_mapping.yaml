  request_spec_required: true
  native_batch: false
  atomicity: not_applicable
  testnet: false
  support: spec_only
  reason: Official CEX.IO Spot Trading Current Fee endpoint is mapped as an offline request-spec boundary; shared get_fees
    runtime/parser is not enabled.
  official_doc: https://trade.cex.io/docs/
  request_spec:
    status: fixture_only
    fixture: tests/fixtures/exchanges/cex/request_specs/get_my_current_fee.json
  response_parser:
    status: fixture_only
    fixture: tests/fixtures/exchanges/cex/parser/get_my_current_fee.json
  notes: Source returns data.tradingFee keyed by DASH pairs with percent values; parser must map the single percent into gateway
    maker/taker policy after CEX Spot profile guard is enabled.
