schema_version: 1
exchange: btcbox
adapter: rustcta_exchange_gateway::adapters::btcbox
status_date: "2026-06-08"
metadata:
  status: validated
  source: docs/btcbox_adapter.md
  last_reviewed: "2026-06-08"
  notes: "Japanese JPY Spot adapter. Public REST plus guarded private readback are wired; live writes stay offline until dry-run/write reconciliation is complete."
market_types: [spot]
products: [spot]
base_urls:
  rest: https://www.btcbox.co.jp/api/v1
rest:
  base_url: https://www.btcbox.co.jp/api/v1
auth:
  private_rest:
    scheme: hmac_sha256_md5_private_key
    body: application/x-www-form-urlencoded
    signing_payload: "URL-encoded POST params without signature"
rate_limits:
  buckets:
    public_rest:
      scope: ip
      interval: 1s
      limit: 1
      notes: "Public endpoints have no fixed cap; conservative bucket avoids large depth polling."
    private_balance:
      scope: account
      interval: 1s
      limit: 2
    private_trade_list:
      scope: account
      interval: 1s
      limit: 1
    private_trade_view:
      scope: account
      interval: 1s
      limit: 1
    private_orders:
      scope: account
      interval: 1s
      limit: 2
reconciliation:
  private_state: rest_only_guarded_readback
  readbacks: [trade_view, trade_list]
  after_ws_gap: unsupported_no_official_ws
batch:
  place_orders: { support: unsupported, reason: "No native batch place endpoint." }
  cancel_orders: { support: unsupported, reason: "No native batch cancel endpoint." }
websocket:
  public:
    support: unsupported
    reason: "No official stable WebSocket API found for BTCBOX public books."
  private:
    support: unsupported
    fallback: rest_reconciliation_after_future_private_rest_verification
endpoints:
  - operation: get_symbol_rules
    product: spot
    transport: rest
    method: GET
    path: /tickers
    auth: none
    rate_limit_bucket: public_rest
    weight: 1
    request_spec_required: false
    support: native
    official_doc: https://blog.btcbox.jp/en/archives/8762
    notes: "No dedicated market metadata endpoint; adapter derives JPY Spot symbols from ticker keys."
  - operation: get_order_book
    product: spot
    transport: rest
    method: GET
    path: /depth
    auth: none
    rate_limit_bucket: public_rest
    weight: 1
    request_spec_required: false
    support: native
    official_doc: https://blog.btcbox.jp/en/archives/8762
    params:
      - name: coin
        required: false
        values: [btc, bch, ltc, eth]
    notes: "Docs confirm depth for BTC/BCH/LTC/ETH. Adapter sorts levels locally."
  - operation: public_trades
    product: spot
    transport: rest
    method: GET
    path: /orders
    auth: none
    rate_limit_bucket: public_rest
    weight: 1
    request_spec_required: false
    support: unsupported
    official_doc: https://blog.btcbox.jp/en/archives/8762
    params:
      - name: coin
        required: false
        values: [btc, bch, ltc, eth]
    notes: "Documented endpoint, but this A-12 scan-only adapter does not expose a public trades method/parser yet."
  - operation: get_balances
    product: spot
    transport: rest
    method: POST
    path: /balance
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_balance
    weight: 1
    request_spec_required: true
    support: spec_only
    official_doc: https://blog.btcbox.jp/en/archives/8762
    request_spec:
      status: fixture_only
      fixture: tests/fixtures/exchanges/btcbox/request_specs/balance.json
    reason: "BTCBOX balance request spec is fixture-backed, but shared get_balances runtime remains disabled pending official response fixture, HMAC read-only runtime, balance parser, coin scope guard, and reconciliation."
    response_parser:
      status: planned
      fixture: tests/fixtures/exchanges/btcbox/request_specs/balance.json
      source: request_spec_only
    notes: "Runtime remains disabled during scan-only phase."
  - operation: get_open_orders
    product: spot
    transport: rest
    method: POST
    path: /trade_list
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_trade_list
    weight: 1
    request_spec_required: true
    support: native
    official_doc: https://blog.btcbox.jp/en/archives/8762
    request_spec:
      status: fixture_only
      fixture: tests/fixtures/exchanges/btcbox/request_specs/trade_list.json
    response_parser:
      status: implemented
      fixture: tests/fixtures/exchanges/btcbox/trade_list_success.json
    notes: "Runtime guarded by BTCBOX_PRIVATE_REST_ENABLED, API key/secret, Spot symbol and JPY coin scope. Pagination supports BTCBOX since cursor only; limit/id/token cursor remain unsupported."
  - operation: query_order
    product: spot
    transport: rest
    method: POST
    path: /trade_view
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_trade_view
    weight: 1
    request_spec_required: true
    support: native
    official_doc: https://blog.btcbox.jp/en/archives/8762
    request_spec:
      status: fixture_only
      fixture: tests/fixtures/exchanges/btcbox/request_specs/trade_view.json
    response_parser:
      status: implemented
      fixture: tests/fixtures/exchanges/btcbox/trade_view_success.json
    notes: "Runtime guarded by BTCBOX_PRIVATE_REST_ENABLED, API key/secret, numeric exchange_order_id and JPY coin scope. BTCBOX has no client_order_id query semantics."
  - operation: cancel_order
    product: spot
    transport: rest
    method: POST
    path: /trade_cancel
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_orders
    weight: 1
    request_spec_required: true
    support: spec_only
    official_doc: https://blog.btcbox.jp/en/archives/8762
    request_spec:
      status: fixture_only
      fixture: tests/fixtures/exchanges/btcbox/request_specs/trade_cancel.json
    notes: "Offline request construction only; ExchangeClient returns Unsupported."
  - operation: place_order
    product: spot
    transport: rest
    method: POST
    path: /trade_add
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_orders
    weight: 1
    request_spec_required: true
    support: spec_only
    official_doc: https://blog.btcbox.jp/en/archives/8762
    request_spec:
      status: fixture_only
      fixture: tests/fixtures/exchanges/btcbox/request_specs/trade_add_limit.json
    notes: "Offline request construction only; ExchangeClient returns Unsupported."
  - operation: amend_order
    product: spot
    transport: rest
    method: UNSUPPORTED
    path: /unsupported/btcbox/amend-order
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: private_orders
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    support: unsupported
    reason: btcbox.amend_order_unsupported
  - operation: place_order_list
    product: spot
    transport: rest
    method: UNSUPPORTED
    path: /unsupported/btcbox/order-list
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: private_orders
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    support: unsupported
    reason: btcbox.order_list_unsupported
  - operation: batch_place_orders
    product: spot
    transport: rest
    method: UNSUPPORTED
    path: /unsupported/btcbox/batch-place
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: private_orders
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    support: unsupported
    reason: btcbox.batch_place_orders_unsupported
  - operation: batch_cancel_orders
    product: spot
    transport: rest
    method: UNSUPPORTED
    path: /unsupported/btcbox/batch-cancel
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: private_orders
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    support: unsupported
    reason: btcbox.batch_cancel_orders_unsupported
unsupported:
  - operation: contract_product
    reason: "Current official/API profile lists JPY Spot public/private endpoints only and exposes no standard futures/perpetual/options product line."
  - operation: private_rest_runtime
    reason: "Documented private API is left disabled until account/KYC/API-key and service-state validation are handled by a later live-readonly task."
  - operation: websocket
    reason: "No official stable WebSocket API was found."
  - operation: fiat_funding
    reason: "JPY funding, deposits, withdrawals, and wallet operations are out of gateway trading runtime scope."
  - operation: non_jpy_markets
    reason: "Official public docs list JPY Spot pairs only."
  - operation: get_fees
    reason: "交易所不支持当前费率接口 runtime：当前资料未验证到稳定 BTCBOX fee endpoint。"
