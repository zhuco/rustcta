schema_version: 1
exchange: bittrade
adapter: rustcta_exchange_gateway::adapters::bittrade
metadata:
  status: validated
  notes: "A-10 BitTrade Japan spot adapter. Official docs state leverage trading is not supported; private readback REST is guarded by BITTRADE_PRIVATE_REST_ENABLED plus credentials; private writes remain offline request-spec only."
market_types:
  - spot
products:
  - spot
base_urls:
  rest: https://api-cloud.bittrade.co.jp
  public_ws: wss://api-cloud.bittrade.co.jp/ws
  private_ws: wss://api-cloud.bittrade.co.jp/ws/v2
rest:
  base_url: https://api-cloud.bittrade.co.jp
auth:
  rest:
    scheme: hmac_sha256_v2_query
    signature_encoding: base64
    signing_payload: "METHOD + '\\n' + lower_host + '\\n' + path + '\\n' + ascii_sorted_urlencoded_query"
    auth_query: [AccessKeyId, SignatureMethod, SignatureVersion, Timestamp, Signature]
rate_limits:
  buckets:
    public_rest:
      scope: ip
      interval: 1s
      limit: 10
      burst: 10
    private_rest:
      scope: api_key
      interval: 1s
      limit: 10
      burst: 10
    public_ws:
      scope: websocket
      interval: 1s
      limit: 50
      burst: 50
    private_ws:
      scope: api_key
      interval: 1s
      limit: 50
      burst: 50
pagination:
  order_history:
    style: from_direct_size
    limit_param: size
    cursor_param: from
    direction_param: direct
reconciliation:
  private_stream_fallback: rest
  readbacks:
    - query_order
    - get_open_orders
    - get_recent_fills
  after_unknown_place: query_order
  after_unknown_cancel: query_order
  after_ws_gap: rest_order_book_snapshot
batch:
  place_orders:
    support: unsupported
  cancel_orders:
    support: native
    mode: order_ids_or_client_order_ids
    atomicity: non_atomic
    max_orders: 50
    partial_failure: true
websocket:
  public:
    support: native
    url: wss://api-cloud.bittrade.co.jp/ws
    protocol: huobi-style-gzip-json
    topics:
      order_book: market.{symbol}.depth.step0
      bbo: market.{symbol}.bbo
      trades: market.{symbol}.trade.detail
      candles: market.{symbol}.kline.{period}
    order_book:
      channels:
        - market.{symbol}.depth.step0
        - market.{symbol}.depth.step1
        - market.{symbol}.depth.step2
        - market.{symbol}.depth.step3
        - market.{symbol}.depth.step4
        - market.{symbol}.depth.step5
      bbo_channel: market.{symbol}.bbo
      depth_types: [step0, step1, step2, step3, step4, step5]
      supported_depths: [1]
      interval: no fixed ms
      compression: gzip
      bbo_sequence_field: seqId
      checksum: not_published
      resync: rest_order_book_snapshot
    heartbeat:
      direction: server_ping_client_pong
      interval_ms: 5000
      timeout_ms: 10000
    resync: rest_order_book_snapshot
  private:
    support: request_spec_only
    url: wss://api-cloud.bittrade.co.jp/ws/v2
    auth: signed_json_payload
    topics:
      orders: orders#{symbol}
      fills: trade.clearing#{symbol}#{mode}
      accounts: accounts.update#{mode}
    fallback: rest_reconciliation
endpoints:
  - operation: get_symbol_rules
    product: spot
    transport: rest
    method: GET
    path: /v1/common/symbols
    auth: none
    rate_limit_bucket: public_rest
    weight: 1
    request_spec_required: false
  - operation: get_order_book
    product: spot
    transport: rest
    method: GET
    path: /market/depth
    auth: none
    rate_limit_bucket: public_rest
    weight: 1
    request_spec_required: false
    params:
      - name: symbol
      - name: type
  - operation: get_accounts
    product: spot
    transport: rest
    method: GET
    path: /v1/account/accounts
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
  - operation: get_balances
    product: spot
    transport: rest
    method: GET
    path: /v1/account/accounts/{account-id}/balance
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
    support: spec_only
    request_spec:
      fixture: tests/fixtures/exchanges/bittrade/request_specs/balance_get.json
    response_parser:
      status: planned
    notes: Account-scoped balance request spec is present, but account-id discovery, parser, and readback reconciliation are not implemented; runtime returns bittrade.get_balances.offline_request_spec_only.
  - operation: place_order
    support: spec_only
    product: spot
    transport: rest
    method: POST
    path: /v1/order/orders/place
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/bittrade/request_specs/place_limit_order.json
    notes: "Offline request-spec only; runtime does not expose live order placement."
  - operation: cancel_order
    support: spec_only
    product: spot
    transport: rest
    method: POST
    path: /v1/order/orders/{order-id}/submitcancel
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/bittrade/request_specs/cancel_order.json
  - operation: batch_cancel_orders
    product: spot
    transport: rest
    method: POST
    path: /v1/order/orders/batchcancel
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/bittrade/request_specs/batch_cancel_orders.json
  - operation: batch_place_orders
    product: spot
    transport: rest
    method: POST
    path: /unsupported/bittrade/batch_place_orders
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: private_rest
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    support: unsupported
    reason: bittrade.batch_place_orders_unsupported
  - operation: amend_order
    product: spot
    transport: rest
    method: PATCH
    path: /unsupported/bittrade/amend_order
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: private_rest
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    support: unsupported
    reason: bittrade.amend_order_unsupported
  - operation: place_order_list
    product: spot
    transport: rest
    method: POST
    path: /unsupported/bittrade/order_list
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: private_rest
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    support: unsupported
    reason: bittrade.order_list_unsupported
  - operation: get_open_orders
    support: native
    product: spot
    transport: rest
    method: GET
    path: /v1/order/openOrders
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/bittrade/request_specs/get_open_orders.json
    response_parser:
      status: implemented
      fixture: tests/fixtures/exchanges/bittrade/open_orders_success.json
    notes: "Guarded read-only private REST runtime; requires BITTRADE_PRIVATE_REST_ENABLED plus BITTRADE_API_KEY/BITTRADE_API_SECRET. Request requires symbol scope and sends signed query authentication. Writes are not promoted."
  - operation: query_order
    support: native
    product: spot
    transport: rest
    method: GET
    path: /v1/order/orders/{order-id}
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/bittrade/request_specs/query_order.json
    response_parser:
      status: implemented
      fixture: tests/fixtures/exchanges/bittrade/order_success.json
    notes: "Guarded read-only private REST runtime by exchange_order_id; requires BITTRADE_PRIVATE_REST_ENABLED plus BITTRADE_API_KEY/BITTRADE_API_SECRET. client_order_id lookup remains unsupported."
  - operation: get_recent_fills
    support: native
    product: spot
    transport: rest
    method: GET
    path: /v1/order/matchresults
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/bittrade/request_specs/get_recent_fills.json
    response_parser:
      status: implemented
      fixture: tests/fixtures/exchanges/bittrade/recent_fills_success.json
    notes: "Guarded read-only private REST runtime; requires BITTRADE_PRIVATE_REST_ENABLED plus BITTRADE_API_KEY/BITTRADE_API_SECRET. Request requires symbol scope and context tenant/account for normalized Fill rows."
streams:
  - operation: subscribe_public_order_book
    product: spot
    channel: market.{symbol}.depth.step0
    support: native
    resync:
      endpoint_operation: get_order_book
  - operation: subscribe_public_trades
    product: spot
    channel: market.{symbol}.trade.detail
    support: native
  - operation: subscribe_private_orders
    product: spot
    channel: orders#{symbol}
    support: request_spec_only
    auth_renewal:
      endpoint_operation: get_accounts
unsupported:
  - operation: leverage_or_margin_trading
    reason: "Official BitTrade API introduction states leverage trading is currently unsupported."
  - operation: contract_product
    reason: "Current official/API profile documents no standard futures/perpetual/options product line for this adapter."
  - operation: fiat_funding
    reason: "Fiat deposit, withdrawal, bank transfer, and ledger writes are outside gateway runtime scope."
  - operation: live_private_write
    reason: "Private write endpoints are delivered as offline request-spec and signing vectors only."
  - operation: retail_broker_ordering
    reason: "BitTrade retail/sales-office APIs are documented separately and are not mapped into exchange spot order routing."
  - operation: get_fees
    reason: "交易所不支持当前费率接口 runtime：官方/API 资料未核到 account-effective maker/taker fee endpoint；fee 页面不能直接映射 runtime readback。"
