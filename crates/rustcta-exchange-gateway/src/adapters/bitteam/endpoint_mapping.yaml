unsupported:
- operation: contract_product
  reason: Current official/API profile lists Spot/P2P and CCXT-style Spot endpoints, with no stable standard futures/perpetual/options
    contract product line verified.
- operation: get_balances
  status: project_unimplemented
  request_spec_fixture: tests/fixtures/exchanges/bitteam/request_specs/get_balances.json
  reason: Official/private account or balance readback exists, but shared get_balances runtime is project-unimplemented for
    this adapter pending Basic auth read-only runtime, balance parser, credential validation, and REST reconciliation.
- operation: get_fees
  status: unsupported
  reason: 交易所不支持当前费率接口 runtime：private REST 为 request-spec-only，capabilities 默认把 fees 标为 unsupported。
