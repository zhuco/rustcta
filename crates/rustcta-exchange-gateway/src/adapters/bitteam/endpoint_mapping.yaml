  transport: rest
  method: UNSUPPORTED
  path: /unsupported/bitteam/batch-cancel
  auth: unsupported
  credential_scopes:
  - trade
  rate_limit_bucket: bitteam_private
  weight: 0
  request_spec_required: false
  native_batch: false
  atomicity: unsupported
  testnet: false
  support: unsupported
