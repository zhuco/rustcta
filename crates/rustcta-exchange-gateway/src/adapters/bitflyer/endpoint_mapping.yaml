schema_version: 1
exchange: bitflyer
adapter: rustcta_exchange_gateway::adapters::bitflyer
metadata:
  status: validated
  notes: "Task 13 bitFlyer scope for Japanese Spot and Lightning FX product-code boundaries. FX_BTC_JPY is documented as Lightning FX/CFD-style exposure, not a standard futures/perpetual contract."
market_types:
  - spot
  - margin
products:
  - spot
  - margin
rest:
  base_url: https://api.bitflyer.com
base_urls:
  public_ws: wss://ws.lightstream.bitflyer.com/json-rpc
  private_ws: wss://ws.lightstream.bitflyer.com/json-rpc
auth:
  rest:
    algorithm: "HMAC-SHA256 hex"
    prehash: "timestamp + method + request_path_with_query + body"
    headers: [X-API-KEY, X-API-TIMESTAMP, X-API-SIGN]
rate_limits:
  buckets:
    public_rest:
      scope: rest
      interval: 5m
      limit: 500
    private_rest:
      scope: account
      interval: 5m
      limit: 500
    private_order:
      scope: orders
      interval: 5m
      limit: 300
    websocket:
      scope: websocket
      interval: 1m
      limit: 100
pagination:
  open_orders:
    style: count_before_after_or_skip
    cursor: id_or_offset
    limit_param: count
    before_param: before
    offset_param: skip
    max_limit: 500
  recent_fills:
    style: count_before_after
    cursor: execution_id
    limit_param: count
    before_param: before
    max_limit: 500
reconciliation:
  private_stream_fallback: rest
  readbacks:
    - query_order
    - get_open_orders
    - get_recent_fills
  after_unknown_place: query_order
  after_unknown_cancel: query_order
  after_ws_gap: rest_order_book_snapshot
batch:
  place_orders:
    support: composed
    mode: composed_sequential
    atomicity: non_atomic
    max_items: 10
    partial_failure: false
  cancel_orders:
    support: composed
    mode: composed_sequential
    atomicity: non_atomic
    max_items: 10
    partial_failure: false
websocket:
  public:
    support: native
    url: wss://ws.lightstream.bitflyer.com/json-rpc
    protocol: json_rpc_2
    channels:
      - lightning_board_snapshot_{product_code}
      - lightning_board_{product_code}
      - lightning_ticker_{product_code}
      - lightning_executions_{product_code}
    heartbeat:
      direction: server_ping
      response: pong
    resync: rest_order_book_snapshot
    order_book:
      channel_family: lightning_board
      channels:
        - "orderbook:lightning_board_snapshot_{product_code}"
        - "orderbook:lightning_board_{product_code}"
        - lightning_board_snapshot_{product_code}
        - lightning_board_{product_code}
      product: spot
      market_types: [spot, margin]
      protocol: json_rpc_2
      request:
        subscribe_method: subscribe
        unsubscribe_method: unsubscribe
        params_field: channel
        snapshot_channel: lightning_board_snapshot_{product_code}
        delta_channel: lightning_board_{product_code}
      update_interval:
        fixed_update_interval_ms: null
        note: "Official Realtime API docs do not publish a fixed millisecond order book cadence."
      depth:
        parameter: null
        max_depth_per_side: null
        note: "depth: unspecified; no fixed depth selector is documented for lightning_board_snapshot/lightning_board."
      sequence:
        fields: []
        continuity: unsupported_no_official_sequence
        gap_detection: reconnect_or_stale_stream_only
      checksum:
        supported: false
        field: null
        risk: "No official checksum field; checksum mismatch detection is unavailable."
      resync:
        rest_snapshot:
          method: GET
          path: /v1/getboard
          query: product_code
        strategy: "Rebuild from REST GET /v1/getboard and resubscribe to lightning_board_snapshot_{product_code} plus lightning_board_{product_code} after disconnect, stale stream or suspected message loss."
  private:
    support: native
    url: wss://ws.lightstream.bitflyer.com/json-rpc
    channel: child_order_events
    auth: api_key_permission_required
    fallback: rest_reconciliation
unsupported:
  - operation: fiat_funding
    reason: "JPY deposits, withdrawals, bank transfers and ledger writes are outside gateway runtime scope."
  - operation: standard_futures_perpetual
    reason: "Lightning FX/CFD product codes are not modeled as standard futures/perpetual contracts."
  - operation: contract_product
    status: project_unimplemented
    product_lines: [crypto_cfd, fx]
    boundary: project_unimplemented_product_line
    official_gap: bitflyer_crypto_cfd_fx_product_codes
    source_boundary_fixture: tests/fixtures/exchanges/bitflyer/request_specs/product_line_source_boundary.json
    runtime_isolation: "Current adapter keeps Spot and Lightning FX product-code handling separate; do not advertise FX_BTC_JPY as a standard futures/perpetual runtime."
    required_endpoints:
      market_metadata: [Crypto CFD/FX product_code catalog, contract sizing and settlement model, margin mode and leverage constraints]
      public_market_data: [Crypto CFD/FX order book, Crypto CFD/FX ticker, Crypto CFD/FX executions]
      private_account: [collateral or margin state, positions, risk or leverage limits]
      private_order_lifecycle: [Crypto CFD/FX place order, Crypto CFD/FX cancel order, Crypto CFD/FX query/open orders, Crypto CFD/FX fills]
    unsafe_to_promote_without: [adapter-specific CFD contract model, position/margin/risk parser coverage, product-scoped order lifecycle reconciliation, clear mapping that FX_BTC_JPY is not generic futures/perpetual]
    reason: "Crypto CFD/FX requires a separate unified contract-product design; do not classify it as exchange-unsupported."
  - operation: cfd_fx_product
    status: project_unimplemented
    product_lines: [crypto_cfd, fx]
    boundary: project_unimplemented_product_line
    official_gap: bitflyer_crypto_cfd_fx_product_codes
    source_boundary_fixture: tests/fixtures/exchanges/bitflyer/request_specs/product_line_source_boundary.json
    required_endpoints:
      market_metadata: [Crypto CFD/FX product_code catalog, contract sizing and settlement model]
      private_account: [collateral or margin state, positions, risk or leverage limits]
      private_order_lifecycle: [Crypto CFD/FX place/cancel/query/open orders, Crypto CFD/FX fills]
    reason: "Official bitFlyer material describes Crypto CFD/FX product codes, but the current gateway only exposes adapter-specific margin/spot boundaries and lacks a unified CFD contract model."
endpoints:
  - operation: get_symbol_rules
    product: spot
    transport: rest
    method: GET
    path: /v1/getmarkets
    auth: none
    rate_limit_bucket: public_rest
    weight: 1
    request_spec_required: false
    response_parser:
      fixture: tests/fixtures/exchanges/bitflyer/markets_success.json
  - operation: get_symbol_rules_fx
    product: margin
    transport: rest
    method: GET
    path: /v1/getmarkets
    auth: none
    rate_limit_bucket: public_rest
    weight: 1
    request_spec_required: false
    response_parser:
      fixture: tests/fixtures/exchanges/bitflyer/markets_success.json
  - operation: get_order_book
    product: spot
    transport: rest
    method: GET
    path: /v1/getboard
    auth: none
    rate_limit_bucket: public_rest
    weight: 1
    request_spec_required: false
    response_parser:
      fixture: tests/fixtures/exchanges/bitflyer/orderbook_success.json
  - operation: get_order_book_fx
    product: margin
    transport: rest
    method: GET
    path: /v1/getboard
    auth: none
    rate_limit_bucket: public_rest
    weight: 1
    request_spec_required: false
  - operation: get_balances
    product: spot
    transport: rest
    method: GET
    path: /v1/me/getbalance
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
    support: spec_only
    request_spec:
      fixture: tests/fixtures/exchanges/bitflyer/request_specs/get_balances.json
    response_parser:
      status: planned
      fixture: tests/fixtures/exchanges/bitflyer/balances_success.json
    notes: Private getbalance endpoint and response fixture exist, but shared balance parser/runtime promotion is still pending; runtime returns bitflyer.get_balances.rest_parser_pending.
  - operation: get_fees
    product: spot
    transport: rest
    method: GET
    path: /v1/me/gettradingcommission
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
    support: spec_only
    request_spec:
      fixture: tests/fixtures/exchanges/bitflyer/request_specs/get_fees_tradingcommission.json
    response_parser:
      status: planned
      fixture: tests/fixtures/exchanges/bitflyer/tradingcommission_success.json
    notes: Private commission endpoint is documented but shared maker/taker normalization and product-scope guard are not implemented; runtime remains offline.
  - operation: place_order
    support: spec_only
    product: spot
    transport: rest
    method: POST
    path: /v1/me/sendchildorder
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_order
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/bitflyer/request_specs/place_order_limit.json
  - operation: place_order_fx
    product: margin
    transport: rest
    method: POST
    path: /v1/me/sendchildorder
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_order
    weight: 1
    request_spec_required: true
  - operation: cancel_order
    support: spec_only
    product: spot
    transport: rest
    method: DELETE
    path: /v1/me/cancelchildorder
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_order
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/bitflyer/request_specs/cancel_order.json
  - operation: cancel_order_fx
    product: margin
    transport: rest
    method: DELETE
    path: /v1/me/cancelchildorder
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_order
    weight: 1
    request_spec_required: true
  - operation: cancel_all_orders
    support: spec_only
    product: spot
    transport: rest
    method: POST
    path: /v1/me/cancelallchildorders
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_order
    weight: 1
    request_spec_required: true
    request_spec:
      status: planned
      fixture: tests/fixtures/exchanges/bitflyer/request_specs/core_trading_source_boundary.json
  - operation: batch_place_orders
    product: spot
    transport: rest
    method: POST
    path: /composed/bitflyer/batch_place_orders
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_order
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: non_atomic
    support: composed
    notes: Gateway-composed sequential single-order placement.
  - operation: batch_cancel_orders
    product: spot
    transport: rest
    method: DELETE
    path: /composed/bitflyer/batch_cancel_orders
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_order
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: non_atomic
    support: composed
    notes: Gateway-composed sequential single-order cancel.
  - operation: amend_order
    product: spot
    transport: rest
    method: PATCH
    path: /unsupported/bitflyer/amend_order
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: private_order
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    support: unsupported
    reason: bitflyer.amend_order_unsupported
  - operation: place_order_list
    product: spot
    transport: rest
    method: POST
    path: /unsupported/bitflyer/order_list
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: private_order
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    support: unsupported
    reason: bitflyer.order_list_unsupported
  - operation: query_order
    support: native
    product: spot
    transport: rest
    method: GET
    path: /v1/me/getchildorders
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/bitflyer/request_specs/query_order.json
    response_parser:
      fixture: tests/fixtures/exchanges/bitflyer/order_state_success.json
    notes: "Runtime guarded by private REST enablement, HMAC credentials, symbol, and order identifier."
  - operation: get_open_orders
    support: native
    product: spot
    transport: rest
    method: GET
    path: /v1/me/getchildorders
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/bitflyer/request_specs/get_open_orders.json
    response_parser:
      fixture: tests/fixtures/exchanges/bitflyer/order_state_success.json
    notes: "Runtime guarded by private REST enablement, HMAC credentials, symbol, and active-order filter."
  - operation: get_recent_fills
    support: native
    product: spot
    transport: rest
    method: GET
    path: /v1/me/getexecutions
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/bitflyer/request_specs/get_recent_fills.json
    response_parser:
      fixture: tests/fixtures/exchanges/bitflyer/fills_success.json
    notes: "Runtime guarded by private REST enablement, HMAC credentials, symbol, and context account."
