schema_version: 1
exchange: ascendex
status: implemented
rest_base_url: https://ascendex.com
auth:
  account_group_required: true
  headers:
    api_key: x-auth-key
    timestamp_ms: x-auth-timestamp
    signature: x-auth-signature
  signature:
    algorithm: hmac_sha256_base64
    prehash: "{timestamp_ms}+{api_path}"
    api_path_examples:
      spot_order: order
      spot_balance: balance
      futures_order: v2/futures/order
      spot_stream: stream
      futures_stream: v2/stream
capabilities_v2:
  public_rest: native
  private_rest: native_when_credentials_present
  public_ws:
    support: spec_payload_and_parser
    runtime: subscribe_payloads_and_message_parser
  private_ws:
    support: spec_payload_and_order_parser_when_credentials_present
    unsupported_gaps:
      - private balance stream events are not normalized
      - private position stream events are not normalized
      - private account stream events are subscription-only
  market_types:
    - spot
    - perpetual
  order_types:
    - market
    - limit
    - post_only
    - ioc
    - fok
  unsupported:
    - quote market order placement
    - amend order
    - stop market and stop limit orders
    - leverage, margin mode, and position mode mutation
rate_limit_plan:
  source: exchange_public_docs
  enforcement: platform_shared_http_limiter_follow_up
  buckets:
    - name: public_rest
      scope: ip
      adapter_default: conservative
    - name: private_rest
      scope: account_group
      adapter_default: conservative
    - name: websocket
      scope: connection
      adapter_default: heartbeat_and_subscription_rate_guard
pagination:
  recent_fills:
    endpoint: order_history_current
    limit_param: n
    max_limit: 500
    cursor: unsupported
  open_orders:
    endpoint: order_open
    cursor: unsupported
  order_history:
    current_history_only: true
    historical_cursor: unsupported_gap
reconciliation:
  read_models:
    - balances
    - positions
    - open_orders
    - query_order
    - recent_fills_from_order_history
  policy:
    after_place: query_order_or_open_orders
    after_cancel: query_order_then_open_orders
    after_batch: query_each_order_id_when_present
    unknown_order: treat_as_reconcile_required
  live_dry_run_guards:
    - kill_switch_required_by_runner
    - disabled_symbol_filter_required_by_runner
    - max_notional_required_by_runner
batch:
  place:
    native: true
    max_items: 10
    atomicity: exchange_defined_non_atomic
    partial_failure: parse_each_returned_item_then_reconcile_missing_items
  cancel:
    native: true
    max_items: 10
    atomicity: exchange_defined_non_atomic
    partial_failure: parse_each_returned_item_then_reconcile_missing_items
websocket:
  public:
    support: spec_payload_and_parser
    runtime: subscribe_payloads_and_message_parser
    urls:
      spot: wss://ascendex.com/api/pro/v1/stream
      perpetual: wss://ascendex.com/api/pro/v2/stream
    order_book:
      depth_channel: depth:{symbol}
      bbo_channel: bbo:{symbol}
      interval_ms:
        depth: 300
        bbo: on_change
      depth:
        delta: l2_delta
        bbo: 1
        snapshot: 500
        snapshot_top100: 100
      sequence_field: seqnum
      checksum: unsupported
      resync:
        snapshot_actions: [depth-snapshot, depth-snapshot-top100]
        continuity: next seqnum must equal previous seqnum + 1 per symbol
        gap_action: resubscribe_and_request_depth_snapshot
  private:
    support: spec_payload_and_order_parser_when_credentials_present
websocket_policy:
  heartbeat:
    ping_payload: '{"op":"ping"}'
    pong_payload: '{"op":"pong"}'
    ping_interval_ms: 15000
    pong_timeout_ms: 30000
    stale_message_ms: 30000
  auth_renewal:
    model: reconnect_and_reauth
    listen_key: unsupported
    token_refresh: not_required
streams:
  public_orderbook_depth:
    products:
      - spot
      - perpetual
    channel: depth:{symbol}
    interval_ms: 300
    depth: l2_delta
    sequence_field: seqnum
    checksum: unsupported
    update_semantics: absolute_quantity_level_delta
    fixture: tests/fixtures/exchanges/ascendex/ws_public_depth.json
    resync:
      strategy: resubscribe_and_request_snapshot
      snapshot_actions:
        - depth-snapshot
        - depth-snapshot-top100
      continuity: next seqnum must equal previous seqnum + 1 per symbol
      gap_action: discard_local_book_then_request_fresh_snapshot
  public_orderbook_snapshot:
    products:
      - spot
      - perpetual
    action: depth-snapshot
    max_levels: 500
    sequence_field: seqnum
    checksum: unsupported
    rebuild_source: websocket_snapshot_request
  public_orderbook_snapshot_top100:
    products:
      - spot
      - perpetual
    action: depth-snapshot-top100
    max_levels: 100
    sequence_field: seqnum
    checksum: unsupported
    rebuild_source: websocket_snapshot_request
  public_orderbook_bbo:
    products:
      - spot
      - perpetual
    channel: bbo:{symbol}
    interval: on_change
    depth: 1
    sequence_field: none_documented
    checksum: unsupported
    update_semantics: best_bid_offer_snapshot
    fixture: tests/fixtures/exchanges/ascendex/ws_public_bbo.json
operations:
  symbol_rules:
    spot:
      method: GET
      path: /api/pro/v1/cash/products
      auth: none
    perpetual:
      method: GET
      path: /api/pro/v2/futures/contract
      auth: none
  order_book:
    spot:
      method: GET
      path: /api/pro/v1/depth
      auth: none
      query:
        symbol: required
    perpetual:
      method: GET
      path: /api/pro/v1/depth
      auth: none
      query:
        symbol: required
      note: shared depth endpoint used as scan-only fallback
  balances:
    spot:
      method: GET
      path: /{account_group}/api/pro/v1/cash/balance
      sign_path: balance
    perpetual:
      method: GET
      path: /{account_group}/api/pro/v2/futures/position
      sign_path: v2/futures/position
  positions:
    perpetual:
      method: GET
      path: /{account_group}/api/pro/v2/futures/position
      sign_path: v2/futures/position
    spot:
      support: unsupported
  fees:
    spot:
      method: GET
      path: /{account_group}/api/pro/v1/spot/fee
      sign_path: fee
    perpetual:
      method: GET
      path: /{account_group}/api/pro/v1/futures/fee
      sign_path: fee
  place_order:
    spot:
      method: POST
      path: /{account_group}/api/pro/v1/cash/order
      sign_path: order
    perpetual:
      method: POST
      path: /{account_group}/api/pro/v2/futures/order
      sign_path: v2/futures/order
  cancel_order:
    spot:
      method: DELETE
      path: /{account_group}/api/pro/v1/cash/order
      sign_path: order
    perpetual:
      method: DELETE
      path: /{account_group}/api/pro/v2/futures/order
      sign_path: v2/futures/order
  cancel_all_orders:
    spot:
      method: DELETE
      path: /{account_group}/api/pro/v1/cash/order/all
      sign_path: order/all
    perpetual:
      method: DELETE
      path: /{account_group}/api/pro/v2/futures/order/all
      sign_path: v2/futures/order/all
  batch_place_orders:
    spot:
      method: POST
      path: /{account_group}/api/pro/v1/cash/order/batch
      sign_path: order/batch
    perpetual:
      method: POST
      path: /{account_group}/api/pro/v2/futures/order/batch
      sign_path: v2/futures/order/batch
  batch_cancel_orders:
    spot:
      method: DELETE
      path: /{account_group}/api/pro/v1/cash/order/batch
      sign_path: order/batch
    perpetual:
      method: DELETE
      path: /{account_group}/api/pro/v2/futures/order/batch
      sign_path: v2/futures/order/batch
  amend_order:
    spot:
      support: unsupported
      reason: ascendex.amend_order_unsupported
    perpetual:
      support: unsupported
      reason: ascendex.amend_order_unsupported
  place_order_list:
    spot:
      support: unsupported
      reason: ascendex.order_list_unsupported
    perpetual:
      support: unsupported
      reason: ascendex.order_list_unsupported
  query_order:
    spot:
      method: GET
      path: /{account_group}/api/pro/v1/cash/order/status
      sign_path: order/status
      query:
        orderId: required
    perpetual:
      method: GET
      path: /{account_group}/api/pro/v2/futures/order/status
      sign_path: v2/futures/order/status
      query:
        orderId: required
  open_orders:
    spot:
      method: GET
      path: /{account_group}/api/pro/v1/cash/order/open
      sign_path: order/open
    perpetual:
      method: GET
      path: /{account_group}/api/pro/v2/futures/order/open
      sign_path: v2/futures/order/open
  recent_fills:
    spot:
      method: GET
      path: /{account_group}/api/pro/v1/cash/order/hist/current
      sign_path: order/hist/current
      fallback: fills_from_order_history
    perpetual:
      method: GET
      path: /{account_group}/api/pro/v2/futures/order/hist/current
      sign_path: v2/futures/order/hist/current
      fallback: fills_from_order_history
  public_ws:
    spot:
      url: wss://ascendex.com/api/pro/v1/stream
      channels:
        order_book: depth:{symbol}
        trades: trades:{symbol}
        ticker: bbo:{symbol}
        candles: bar:{interval}:{symbol}
      orderbook:
        depth:
          channel: depth:{symbol}
          interval_ms: 300
          sequence_field: seqnum
          checksum: unsupported
          update_semantics: absolute_quantity_level_delta
        bbo:
          channel: bbo:{symbol}
          interval: on_change
          depth: 1
        snapshot:
          action: depth-snapshot
          max_levels: 500
        snapshot_top100:
          action: depth-snapshot-top100
          max_levels: 100
        rebuild:
          continuity: next seqnum must equal previous seqnum + 1
          strategy: resubscribe_and_request_depth_snapshot_on_gap
    perpetual:
      url: wss://ascendex.com/api/pro/v2/stream
      channels:
        order_book: depth:{symbol}
        trades: trades:{symbol}
        ticker: bbo:{symbol}
        candles: bar:{interval}:{symbol}
      orderbook:
        depth:
          channel: depth:{symbol}
          interval_ms: 300
          sequence_field: seqnum
          checksum: unsupported
          update_semantics: absolute_quantity_level_delta
        bbo:
          channel: bbo:{symbol}
          interval: on_change
          depth: 1
        snapshot:
          action: depth-snapshot
          max_levels: 500
        snapshot_top100:
          action: depth-snapshot-top100
          max_levels: 100
        rebuild:
          continuity: next seqnum must equal previous seqnum + 1
          strategy: resubscribe_and_request_depth_snapshot_on_gap
  private_ws:
    spot:
      url: wss://ascendex.com/{account_group}/api/pro/v1/stream
      auth_sign_path: stream
      channels:
        orders: order:cash
        fills: order:cash
    perpetual:
      url: wss://ascendex.com/{account_group}/api/pro/v2/stream
      auth_sign_path: v2/stream
      channels:
        orders: futures-order
        fills: futures-order
        account: futures-account-update
