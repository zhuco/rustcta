schema_version: 1
exchange: bitmart
adapter: BitmartGatewayAdapter
status_date: "2026-06-08"
metadata:
  status: draft
  source: docs/bitmart_adapter.md
  last_reviewed: "2026-06-08"
  notes: Task 3 mapping for Spot and USDT perpetual REST plus WS spec/parser helpers.
market_types: [spot, perpetual]
products: [spot, perpetual]
base_urls:
  spot_rest: https://api-cloud.bitmart.com
  futures_rest: https://api-cloud-v2.bitmart.com
  spot_public_ws: wss://ws-manager-compress.bitmart.com/api?protocol=1.1
  futures_public_ws: wss://openapi-ws-v2.bitmart.com/api?protocol=1.1
auth:
  private_rest: BitMart X-BM-KEY, X-BM-TIMESTAMP and X-BM-SIGN HMAC headers; memo maps to broker id.
rate_limits:
  public_rest: { scope: ip, interval_ms: 1000, limit: 10 }
  private_rest: { scope: api_key, interval_ms: 1000, limit: 5 }
pagination:
  order_book: { mode: limit, max_limit: 200 }
  open_orders: { mode: limit, max_limit: 100 }
  recent_fills: { mode: limit, max_limit: 100 }
reconciliation:
  private_state: rest_fallback
  endpoint_operation: open_orders
  notes: Use REST wallet, positions, open orders, order detail and fills after WS reconnect.
batch:
  place: { support: unsupported, reason: "Futures submit-plan-order is a trigger/plan order endpoint, not shared regular batch-place semantics." }
  cancel: { support: native, atomicity: non_atomic, max_items: null, same_market_type_required: true, partial_failure: true }
websocket:
  public:
    support: spec_only
    heartbeat: { mode: client_ping_text, interval_ms: 15000, timeout_ms: 30000 }
    resync: { mode: rest_snapshot, endpoint_operation: order_book }
    order_book:
      product: spot
      market_types: [spot]
      url: wss://ws-manager-compress.bitmart.com/api?protocol=1.1
      protocol: websocket_json_zlib
      subscribe:
        payload:
          op: subscribe
          args:
            - spot/depth/increase100:{symbol}
        snapshot_request_payload:
          op: request
          args:
            - spot/depth/increase100:{symbol}
        symbol_format: BASE_QUOTE
      channels:
        l1:
          channel: spot/bookTicker:{symbol}
          interval_ms: null
          semantics: "Real-time best bid/ask changes."
        partial_depth:
          channels:
            - { channel: "spot/depth5:{symbol}", depth: 5, interval_ms: 500, semantics: full_depth_snapshot }
            - { channel: "spot/depth20:{symbol}", depth: 20, interval_ms: 500, semantics: full_depth_snapshot }
            - { channel: "spot/depth50:{symbol}", depth: 50, interval_ms: 500, semantics: full_depth_snapshot }
        incremental_depth:
          channel: spot/depth/increase100:{symbol}
          depth: 100
          interval_ms: 100
          message_types: [snapshot, update]
          update_quantity_semantics: absolute
      sequence:
        field: version
        contiguous_rule: "Accept update when version == local_version + 1; discard version <= local_version; rebuild when version > local_version + 1."
        gap_detection: version_gap_or_regression
      checksum:
        supported: false
        field: null
        risk: "Official Spot depth docs do not document a checksum; continuity relies on version checks."
      resync:
        mode: ws_request_or_rest_snapshot_rebuild
        ws_request: "request spot/depth/increase100:{symbol}"
        rest_endpoint_operation: order_book
        rest_endpoint: /spot/v1/symbols/book
        triggers: [connect, reconnect, version_gap, stale_stream, parse_error, suspected_message_loss]
      fixtures:
        snapshot: tests/fixtures/exchanges/bitmart/ws_spot_depth_increase_snapshot.json
        update: tests/fixtures/exchanges/bitmart/ws_spot_depth_increase_update.json
        bbo: tests/fixtures/exchanges/bitmart/ws_spot_book_ticker.json
  private:
    support: spec_only
    heartbeat: { mode: client_ping_text, interval_ms: 15000, timeout_ms: 30000 }
    auth_renewal: { mode: relogin }
    resync: { mode: rest_reconciliation, endpoint_operation: open_orders }
unsupported:
  - operation: get_fees
    status: project_unimplemented
    source_type: official_spot_futures_vip_fee_schedule
    source_fixture: tests/fixtures/exchanges/bitmart/request_specs/get_fees_source_boundary.json
    reason: "BitMart Spot/Futures VIP fee schedule is now recorded as an offline config source; shared get_fees runtime remains project-unimplemented pending VIP/account-effective tier source, product-scope guard, and FeeRateSnapshot mapping."
endpoints:
  - operation: get_fees
    product: mixed
    market_types: [spot, perpetual]
    transport: rest
    method: GET
    path: /fee
    auth: none
    rate_limit_bucket: bitmart_public_rest
    weight: 0
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: spec_only
    reason: "P3 fee boundary: official fee table/VIP model is fixture-backed as a source table only, not an account-effective runtime."
    official_doc: https://www.bitmart.com/en-US/fee
    request_spec:
      fixture: tests/fixtures/exchanges/bitmart/request_specs/get_fees_source_boundary.json
  - operation: symbol_rules
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: GET
    path: /spot/v1/symbols/details
    auth: none
    rate_limit_bucket: bitmart_public_rest
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
    notes: Perpetual symbols use /contract/public/details.
  - operation: order_book
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: GET
    path: /spot/v1/symbols/book
    auth: none
    rate_limit_bucket: bitmart_public_rest
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
    notes: Perpetual order book uses /contract/public/depth.
  - operation: account
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: GET
    path: /spot/v1/wallet
    auth: signed
    credential_scopes: [read_only]
    rate_limit_bucket: bitmart_private_rest
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
    request_spec: { status: implemented, fixture: tests/fixtures/exchanges/bitmart/request_specs/place_order.json }
    notes: Perpetual account uses /contract/private/assets-detail.
  - operation: positions
    product: perpetual
    transport: rest
    method: GET
    path: /contract/private/position
    auth: signed
    credential_scopes: [read_only]
    rate_limit_bucket: bitmart_private_rest
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
  - operation: place_order
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: POST
    path: /spot/v2/submit_order
    auth: signed
    credential_scopes: [trade]
    rate_limit_bucket: bitmart_private_rest
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: non_atomic
    testnet: false
    support: native
    request_spec: { status: implemented, fixture: tests/fixtures/exchanges/bitmart/request_specs/place_order.json }
    notes: Perpetual order submit uses /contract/private/submit-order.
  - operation: cancel_order
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: POST
    path: /spot/v3/cancel_order
    auth: signed
    credential_scopes: [trade]
    rate_limit_bucket: bitmart_private_rest
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: non_atomic
    testnet: false
    support: native
  - operation: batch_cancel_orders
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: POST
    path: /contract/private/cancel-orders
    auth: signed
    credential_scopes: [trade]
    rate_limit_bucket: bitmart_private_rest
    weight: 1
    request_spec_required: true
    native_batch: true
    atomicity: non_atomic
    testnet: false
    support: native
    notes: Official futures endpoint is "Batch Cancel Contract Orders"; Spot batch cancel is not mapped to the shared runtime.
  - operation: batch_place_orders
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: POST
    path: /unsupported/bitmart/batch_place_orders
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: bitmart_private_rest
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    testnet: false
    support: unsupported
    reason: bitmart.batch_place_regular_order_unsupported
  - operation: amend_order
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: PATCH
    path: /unsupported/bitmart/amend_order
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: bitmart_private_rest
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    testnet: false
    support: unsupported
    reason: bitmart.amend_order_unsupported
  - operation: place_order_list
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: POST
    path: /unsupported/bitmart/order_list
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: bitmart_private_rest
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    testnet: false
    support: unsupported
    reason: bitmart.order_list_unsupported
  - operation: cancel_all_orders
    product: mixed
    market_types: [spot, perpetual]
    transport: rest
    method: POST
    path: /spot/v3/cancel_orders
    auth: signed
    credential_scopes: [trade]
    rate_limit_bucket: bitmart_private_rest
    weight: 1
    request_spec_required: true
    native_batch: true
    atomicity: non_atomic
    testnet: false
    support: native
    notes: Perpetual all/symbol cancel uses /contract/private/cancel-orders.
  - operation: quote_market_order
    product: spot
    market_types: [spot]
    transport: rest
    method: POST
    path: /spot/v2/submit_order
    auth: signed
    credential_scopes: [trade]
    rate_limit_bucket: bitmart_private_rest
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: non_atomic
    testnet: false
    support: native
    notes: Shared quote-sized market order maps only to Spot market buy with notional/quote_quantity.
  - operation: query_order
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: GET
    path: /spot/v2/order_detail
    auth: signed
    credential_scopes: [read_only]
    rate_limit_bucket: bitmart_private_rest
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
  - operation: open_orders
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: GET
    path: /spot/v2/orders
    auth: signed
    credential_scopes: [read_only]
    rate_limit_bucket: bitmart_private_rest
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
  - operation: recent_fills
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: GET
    path: /spot/v2/trades
    auth: signed
    credential_scopes: [read_only]
    rate_limit_bucket: bitmart_private_rest
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
