schema_version: 1
exchange: aftermath
adapter: AftermathGatewayAdapter
status_date: "2026-06-08"
metadata:
  status: draft
  source: docs/aftermath_adapter.md
  last_reviewed: "2026-06-08"
  notes: Public CCXT perpetual endpoints are native scan-only; Sui wallet transaction writes and account-scoped reads remain unsupported.
market_types: [perpetual]
products: [perpetual]
base_urls:
  rest: https://aftermath.finance
  rest_testnet_unverified: https://testnet.aftermath.finance
  public_ws: wss://aftermath.finance/api/perpetuals/ws/updates
auth:
  public_rest: none
  optional_wallet_message_token: bearer access token generated by wallet message flow; not a trading credential
  private_write: Sui transaction build/sign/submit; unsupported in this adapter
rate_limits:
  public_ccxt: { scope: ip, interval_ms: 10000, limit: 1000 }
  unsupported: { scope: exchange, interval_ms: 1000, limit: 0 }
pagination:
  markets: { mode: none }
  order_book: { mode: none }
  private_history: { mode: unsupported }
reconciliation:
  order_book:
    mode: snapshot_only
    checksum: unsupported
    notes: CCXT orderbook endpoint returns snapshots; WS delta runtime is spec-only.
  private_state: unsupported
batch:
  place: { support: unsupported, reason: aftermath.batch_place_orders_requires_sui_transaction_signing }
  cancel: { support: unsupported, reason: aftermath.batch_cancel_orders_requires_sui_transaction_signing }
websocket:
  public:
    support: spec_only
    endpoint: /api/perpetuals/ws/updates
    heartbeat: { mode: none, interval_ms: 30000, timeout_ms: 45000, stale_message_ms: 60000 }
    parser_fixtures:
      - tests/fixtures/exchanges/aftermath/ws/updates_orderbook_delta.json
  private:
    support: unsupported
    auth_renewal: { mode: unsupported }
streams:
  - operation: public_orderbook_delta
    product: perpetual
    channel: updates.orderbook
    support: spec_only
    resync: { mode: rest_snapshot, endpoint_operation: order_book }
    fixture: tests/fixtures/exchanges/aftermath/ws/updates_orderbook_delta.json
  - operation: private_account
    product: perpetual
    channel: unsupported.private_account
    support: unsupported
    reason: aftermath.private_streams_require_sui_account_auth
endpoints:
  - operation: symbol_rules
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /api/ccxt/markets
    auth: none
    rate_limit_bucket: aftermath_public_ccxt
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: native
    official_doc: https://docs.aftermath.finance/for-developers/api/ccxt
    request_spec_fixture: tests/fixtures/exchanges/aftermath/request_specs/markets.json
    response_parser: { status: implemented, fixture: tests/fixtures/exchanges/aftermath/markets.json }
  - operation: order_book
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: POST
    path: /api/ccxt/orderbook
    auth: none
    rate_limit_bucket: aftermath_public_ccxt
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: native
    official_doc: https://aftermath.finance/api/openapi/spec.json
    body:
      - name: chId
        required: true
        source: symbol.exchange_symbol
    request_spec_fixture: tests/fixtures/exchanges/aftermath/request_specs/orderbook.json
    response_parser: { status: implemented, fixture: tests/fixtures/exchanges/aftermath/orderbook.json }
  - operation: ticker
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /api/ccxt/ticker
    auth: none
    rate_limit_bucket: aftermath_public_ccxt
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: parser_only
    reason: aftermath.ticker_not_exposed_by_gateway_interface
    response_parser: { status: fixture_only, fixture: tests/fixtures/exchanges/aftermath/ticker.json }
  - operation: trades
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /api/ccxt/trades
    auth: none
    rate_limit_bucket: aftermath_public_ccxt
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: parser_only
    reason: aftermath.trades_not_exposed_by_gateway_interface
    response_parser: { status: fixture_only, fixture: tests/fixtures/exchanges/aftermath/trades.json }
  - operation: ohlcv
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /api/ccxt/ohlcv
    auth: none
    rate_limit_bucket: aftermath_public_ccxt
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: parser_only
    reason: aftermath.ohlcv_not_exposed_by_gateway_interface
    response_parser: { status: fixture_only, fixture: tests/fixtures/exchanges/aftermath/ohlcv.json }
  - operation: balances
    product: perpetual
    market_types: [perpetual]
    transport: rest
