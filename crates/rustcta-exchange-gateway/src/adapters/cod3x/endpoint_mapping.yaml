schema_version: 1
exchange: cod3x
adapter: Cod3xGatewayAdapter
status: audit_only
status_date: "2026-06-08"
metadata:
  status: draft
  source: docs/cod3x_adapter.md
  last_reviewed: "2026-06-08"
  notes: "C-48: Cod3x is audited as an AI perps trading terminal/routing layer, not a standalone exchange venue. Runtime REST/WS/signing remain unsupported_unverified until a stable Cod3x-native API contract is fixture-verified."
  venue_profiles:
    - hyperliquid
    - gmx_v2
    - lighter
market_types:
  - perpetual
products:
  - perpetual
base_urls:
  docs: https://docs.cod3x.org
  website: https://www.cod3x.org
  app: https://app.cod3x.org
  rest: unsupported_unverified
auth:
  private_rest: unsupported
  account_read_source: spec_only_downstream_or_wallet
  routed_signing: unsupported_unverified
  notes: "No promoted Cod3x API-key/HMAC, terminal token, downstream venue key, or wallet signing path is implemented."
rate_limits:
  cod3x_unverified:
    scope: none
    notes: "No live HTTP runtime is opened by this adapter."
reconciliation:
  positions: unsupported_unverified
  balances: project_unimplemented_downstream_or_wallet_source_boundary
  open_orders: unsupported_unverified
batch:
  place_orders: unsupported_unverified
  cancel_orders: unsupported_unverified
websocket:
  public:
    support: unsupported
    reason: "Cod3x-native profile has no stable public order book WebSocket contract; downstream venue WebSockets stay in their own adapters."
    order_book:
      support: unsupported
      reason: no_cod3x_native_orderbook_channel
  private:
    support: unsupported
    reason: "No Cod3x-native API-key/HMAC or wallet-owned private stream runtime is promoted."
unsupported:
  - operation: spot_product
    reason: Cod3x is audited as an AI perpetual trading terminal/routing profile; downstream spot venues are not merged into this adapter.
  - operation: get_fees
    reason: "交易所不支持当前费率接口 runtime：Cod3x-native 不提供本地 fee runtime；费用属于下游 venue。"
  - operation: get_positions
    reason: "交易所不支持当前仓位接口 runtime：Cod3x 是 perps terminal/routing layer；下游 venue 的 positions 走各自 adapter。"
  - operation: place_order
    reason: "交易所不支持当前交易/私有接口 runtime：Cod3x-native profile 是 terminal/routing layer；下游 venue 的下单走各自 adapter。"
  - operation: cancel_order
    reason: "交易所不支持当前交易/私有接口 runtime：Cod3x-native profile 是 terminal/routing layer；下游 venue 的撤单走各自 adapter。"
  - operation: query_order
    reason: "交易所不支持当前交易/私有接口 runtime：Cod3x-native profile 是 terminal/routing layer；下游 venue 的订单查询走各自 adapter。"
  - operation: get_open_orders
    reason: "交易所不支持当前交易/私有接口 runtime：Cod3x-native profile 是 terminal/routing layer；下游 venue 的 open orders 走各自 adapter。"
  - operation: get_recent_fills
    reason: "交易所不支持当前交易/私有接口 runtime：Cod3x-native profile 是 terminal/routing layer；下游 venue 的成交回报走各自 adapter。"
  - operation: amend_order
    reason: "No verified Cod3x-native amend routing contract/API; downstream venue amend semantics remain in their own adapters."
  - operation: place_order_list
    reason: "No verified Cod3x-native OCO/OTO/order-list routing contract/API; downstream venue order-list semantics remain in their own adapters."
  - operation: batch_place_orders
    reason: "No verified Cod3x-native batch order routing contract/API; downstream venue batch semantics remain in their own adapters."
  - operation: batch_cancel_orders
    reason: "No verified Cod3x-native batch cancel routing contract/API; downstream venue batch semantics remain in their own adapters."
  - operation: cancel_all_orders
    reason: "No verified Cod3x-native cancel-all routing contract/API; downstream venue cancel-all semantics remain in their own adapters."
