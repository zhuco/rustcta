schema_version: 1
exchange: bitopro
adapter: rustcta_exchange_gateway::adapters::bitopro
metadata:
  status: validated
  last_reviewed: "2026-06-09"
  source: "BitoPro official v3 REST and WebSocket docs"
  notes: "A-08 Bitopro: Taiwan Spot exchange. Public REST is executable; private read REST is signed when credentials plus identity are configured; single, batch, and cancel-all private writes are signed runtime behind explicit credentials."
market_types:
  - spot
products:
  - spot
base_urls:
  rest: https://api.bitopro.com/v3
  websocket: wss://stream.bitopro.com:443/ws
rest:
  base_url: https://api.bitopro.com/v3
auth:
  rest:
    scheme: hmac_sha384_base64_payload
    headers:
      - X-BITOPRO-APIKEY
      - X-BITOPRO-PAYLOAD
      - X-BITOPRO-SIGNATURE
    signing_payload:
      get_delete: "base64(json({identity, nonce_millis}))"
      post: "base64(json_body)"
      signature: "hex(hmac_sha384(payload_base64, api_secret))"
rate_limits:
  buckets:
    public_rest:
      scope: ip
      interval: 1m
      limit: 600
    private_rest:
      scope: ip_and_uid
      interval: 1m
      limit: 600
    orders_create:
      scope: ip_and_uid
      interval: 1m
      limit: 1200
    orders_cancel:
      scope: ip_and_uid
      interval: 1m
      limit: 900
    open_orders:
      scope: ip_and_uid
      interval: 1s
      limit: 5
    batch_create:
      scope: ip_and_uid
      interval: 1m
      limit: 90
    batch_cancel:
      scope: ip
      interval: 1s
      limit: 2
    cancel_all:
      scope: ip_and_uid
      interval: 1s
      limit: 2
pagination:
  recent_fills:
    style: trade_id_offset_with_time_window
    limit_param: limit
    max_limit: 1000
    since_param: startTimestamp
    until_param: endTimestamp
    cursor_param: tradeId
    max_history_window: 90d
reconciliation:
  private_stream_fallback: rest
  readbacks:
    - query_order
    - get_open_orders
    - get_recent_fills
  after_unknown_place: query_order
  after_unknown_cancel: query_order
  after_ws_gap: rest_order_book_snapshot
batch:
  place_orders:
    support: native
    max_items: 10
    atomicity: non_atomic
  cancel_orders:
    support: native
    mode: pair_to_order_ids_map
    atomicity: partial
websocket:
  public:
    support: native
    url: wss://stream.bitopro.com:443/ws
    protocol: url_path_subscription
    channels:
      order_book_snapshot: /v1/pub/order-books/{PAIR}:{limit}
      trades: /v1/pub/trades/{PAIR}
      ticker: /v1/pub/tickers/{PAIR}
    order_book:
      product: spot
      protocol: url_path_subscription
      request_model: connect_to_path
      channel: /v1/pub/order-books/{PAIR}:{limit}
      url_template: wss://stream.bitopro.com:443/ws/v1/pub/order-books/{PAIR}:{limit}
      multi_pair_request: wss://stream.bitopro.com:443/ws/v1/pub/order-books/{limit}?pairs={PAIR},{PAIR}
      default_limit: 5
      supported_limits: [1, 5, 10, 20, 30, 50]
      interval_ms: 1000
      push_condition: when_order_book_updated
      update_semantics: full_order_book_snapshot
      delta_supported: false
      snapshot_only: true
      sequence:
        field: none
        event_id_field: eventID
        timestamp_field: timestamp
        continuity: unsupported_event_id_is_not_book_sequence
        gap_detection: not_applicable_snapshot_only
      checksum: none
      sequence_checksum_risk: no documented sequence or checksum; every message is a full-book snapshot so there is no delta replay risk
      response_parser:
        status: implemented
        fixture: tests/fixtures/exchanges/bitopro/ws/public_orderbook.json
      request_fixture: tests/fixtures/exchanges/bitopro/ws/public_orderbook_subscription.json
      reconnect_resync:
        strategy: fetch_rest_order_book_snapshot_then_reconnect_resubscribe
        endpoint_operation: get_order_book
        rest_path: /order-book/{pair}
    heartbeat:
      direction: server_ping_client_pong
      interval_ms: 20000
      timeout_ms: 5000
    resync: rest_order_book_snapshot
  private:
    support: native
    url: wss://stream.bitopro.com:443/ws
    protocol: authenticated_websocket_handshake_headers
    channels:
      orders: /v1/pub/auth/orders
      order_history: /v1/pub/auth/orders/histories
      balances: /v1/pub/auth/account-balance
      user_trades: /v1/pub/auth/user-trades
    auth: X-BITOPRO headers on websocket request
    fallback: rest_reconciliation
streams:
  - operation: public_orderbook_snapshot
    transport: websocket
    product: spot
    market_types: [spot]
    channel: /v1/pub/order-books/{PAIR}:{limit}
    url: wss://stream.bitopro.com:443/ws/v1/pub/order-books/{PAIR}:{limit}
    protocol: url_path_subscription
    request: connect_directly_to_channel_path
    auth: none
    support: native
    interval_ms: 1000
    push_condition: when_order_book_updated
    depth: [1, 5, 10, 20, 30, 50]
    default_depth: 5
    update_semantics: snapshot_only_full_order_book
    delta_supported: false
    sequence: none
    sequence_detail:
      event_id_field: eventID
      timestamp_field: timestamp
      continuity: unsupported_event_id_is_not_book_sequence
    checksum: none
    risk: no_sequence_checksum_delta_replay_risk_snapshot_only
    request_spec:
      status: implemented
      fixture: tests/fixtures/exchanges/bitopro/ws/public_orderbook_subscription.json
    response_parser:
      status: implemented
      fixture: tests/fixtures/exchanges/bitopro/ws/public_orderbook.json
    resync:
      endpoint_operation: get_order_book
      mode: rest_snapshot_after_reconnect_or_resubscribe
endpoints:
  - operation: get_fees
    product: spot
    market_types: [spot]
    transport: rest
    method: GET
    path: /ns/fees
    auth: none
    rate_limit_bucket: bitopro_public
    weight: 0
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: spec_only
    reason: "P3 fee boundary: official VIP fee schedule is fixture-backed as a config/source table only, not a live account-effective fee runtime."
    official_doc: https://www.bitopro.com/ns/fees
    request_spec:
      fixture: tests/fixtures/exchanges/bitopro/request_specs/get_fees_source_boundary.json
  - operation: get_symbol_rules
    product: spot
    transport: rest
    method: GET
    path: /provisioning/trading-pairs
    auth: none
    rate_limit_bucket: public_rest
    weight: 1
    request_spec_required: false
    testnet: false
    official_doc: https://github.com/bitoex/bitopro-official-api-docs/blob/master/api/v3/public/get_trading_pair_info.md
  - operation: get_order_book
    product: spot
    transport: rest
    method: GET
    path: /order-book/{pair}
    auth: none
    rate_limit_bucket: public_rest
    weight: 1
    request_spec_required: false
    testnet: false
    official_doc: https://github.com/bitoex/bitopro-official-api-docs/blob/master/api/v3/public/get_orderbook_data.md
    params:
      - name: limit
      - name: scale
  - operation: get_balances
    product: spot
    transport: rest
    method: GET
    path: /accounts/balance
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
    testnet: false
    official_doc: https://github.com/bitoex/bitopro-official-api-docs/blob/master/api/v3/private/get_account_balance.md
    request_spec:
      status: implemented
      fixture: tests/fixtures/exchanges/bitopro/request_specs/get_balances.json
  - operation: query_order
    product: spot
    transport: rest
    method: GET
    path: /orders/{pair}/{orderId}
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
    testnet: false
    official_doc: https://github.com/bitoex/bitopro-official-api-docs/blob/master/api/v3/private/get_an_order_data.md
    request_spec:
      status: implemented
      fixture: tests/fixtures/exchanges/bitopro/request_specs/query_order.json
  - operation: get_open_orders
    product: spot
    transport: rest
    method: GET
    path: /orders/open
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: open_orders
    weight: 1
    request_spec_required: true
    testnet: false
    official_doc: https://github.com/bitoex/bitopro-official-api-docs/blob/master/api/v3/private/get_open_orders_data.md
    request_spec:
      status: implemented
      fixture: tests/fixtures/exchanges/bitopro/request_specs/get_open_orders.json
  - operation: get_recent_fills
    product: spot
    transport: rest
    method: GET
    path: /orders/trades/{pair}
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
    testnet: false
    official_doc: https://github.com/bitoex/bitopro-official-api-docs/blob/master/api/v3/private/get_trades_data.md
    request_spec:
      status: implemented
      fixture: tests/fixtures/exchanges/bitopro/request_specs/get_recent_fills.json
    params:
      - name: startTimestamp
      - name: endTimestamp
      - name: orderId
      - name: tradeId
      - name: limit
  - operation: place_order
    product: spot
    transport: rest
    method: POST
    path: /orders/{pair}
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: orders_create
    weight: 1
    request_spec_required: true
    support: native
    native_batch: false
    atomicity: not_applicable
    testnet: false
    official_doc: https://github.com/bitoex/bitopro-official-api-docs/blob/master/api/v3/private/create_an_order.md
    request_spec:
      status: implemented
      fixture: tests/fixtures/exchanges/bitopro/request_specs/place_order_limit.json
    notes: "Runtime requires explicit private REST credentials plus API identity; mock test covers signed POST body and order ack parser/fallback."
  - operation: cancel_order
    product: spot
    transport: rest
    method: DELETE
    path: /orders/{pair}/{orderId}
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: orders_cancel
    weight: 1
    request_spec_required: true
    support: native
    atomicity: not_applicable
    testnet: false
    official_doc: https://github.com/bitoex/bitopro-official-api-docs/blob/master/api/v3/private/cancel_an_order.md
    request_spec:
      status: implemented
      fixture: tests/fixtures/exchanges/bitopro/request_specs/cancel_order.json
    notes: "Runtime requires explicit private REST credentials plus API identity; mock test covers signed DELETE path and cancelled-state parser/fallback."
  - operation: cancel_all_orders
    product: spot
    transport: rest
    method: DELETE
    path: /orders/all_or_/orders/{pair}
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: cancel_all
    weight: 1
    request_spec_required: true
    support: native
    atomicity: partial
    testnet: false
    official_doc: https://github.com/bitoex/bitopro-official-api-docs/blob/master/api/v3/private/cancel_all_orders.md
    request_spec:
      status: implemented
      fixture: tests/fixtures/exchanges/bitopro/request_specs/cancel_all_orders.json
      pair_fixture: tests/fixtures/exchanges/bitopro/request_specs/cancel_all_orders_by_pair.json
    notes: "Runtime requires explicit private REST credentials plus API identity; mock test covers signed DELETE and tests/fixtures/exchanges/bitopro/cancel_all_orders_success.json parser/fallback."
  - operation: batch_place_orders
    product: spot
    transport: rest
    method: POST
    path: /orders/batch
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: batch_create
    weight: 1
    request_spec_required: true
    support: native
    native_batch: true
    atomicity: non_atomic
    max_items: 10
    testnet: false
    official_doc: https://github.com/bitoex/bitopro-official-api-docs/blob/master/api/v3/private/create_batch_orders.md
    request_spec:
      status: implemented
      fixture: tests/fixtures/exchanges/bitopro/request_specs/batch_place_orders.json
    notes: "Runtime requires explicit private REST credentials; mock test covers signed request body, tests/fixtures/exchanges/bitopro/batch_place_orders_success.json, and parser fallback."
  - operation: batch_cancel_orders
    product: spot
    transport: rest
    method: PUT
    path: /orders
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: batch_cancel
    weight: 1
    request_spec_required: true
    support: native
    native_batch: true
    atomicity: partial
    testnet: false
    official_doc: https://github.com/bitoex/bitopro-official-api-docs/blob/master/api/v3/private/cancel_batch_orders.md
    request_spec:
      status: implemented
      fixture: tests/fixtures/exchanges/bitopro/request_specs/batch_cancel_orders.json
    notes: "Runtime requires explicit private REST credentials; mock test covers signed PUT body, tests/fixtures/exchanges/bitopro/batch_cancel_orders_success.json, and cancelled-order parser fallback."
  - operation: amend_order
    product: spot
    transport: rest
    method: UNSUPPORTED
    path: /unsupported/bitopro/amend_order
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: unsupported
    weight: 0
    request_spec_required: false
    support: unsupported
    native_batch: false
    atomicity: unsupported
    reason: "No official in-place amend endpoint was found in BitoPro v3 docs."
  - operation: place_order_list
    product: spot
    transport: rest
    method: POST
    path: /unsupported/bitopro/order_list
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: bitopro_private
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    support: unsupported
    reason: bitopro.order_list_unsupported
unsupported:
  - operation: get_fees
    status: project_unimplemented
    source_type: official_vip_fee_schedule
    source_fixture: tests/fixtures/exchanges/bitopro/request_specs/get_fees_source_boundary.json
    reason: "BitoPro public VIP fee schedule is now recorded as an offline config source; shared get_fees runtime remains project-unimplemented pending VIP/config loader, account-effective override, and FeeRateSnapshot mapping."
  - operation: private_write_runtime
    reason: "Single place/cancel, batch place/cancel, and cancel-all are runtime-backed behind explicit private REST credentials."
  - operation: contract_product
    reason: "Official reviewed BitoPro v3 docs cover Spot exchange APIs only; no standard futures/perpetual/options product line is exposed."
  - operation: wallet_deposit_withdraw_transfer
    reason: "Wallet endpoints are official but outside trading gateway runtime scope."
  - operation: testnet
    reason: "No official sandbox/testnet base URL found in reviewed docs."
  - operation: json_ws_subscribe_unsubscribe
    reason: "Official WebSocket subscription model is URL/path based; no JSON subscribe/unsubscribe frame is documented."
