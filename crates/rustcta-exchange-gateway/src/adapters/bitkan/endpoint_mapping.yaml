schema_version: 1
exchange: bitkan
adapter: BitkanGatewayAdapter
status_date: "2026-06-08"
metadata:
  status: draft
  source: docs/bitkan_adapter.md
  last_reviewed: "2026-06-08"
  notes: Task 20 conservative shell. All unverified REST and live WS surfaces remain unsupported.
market_types: [spot, perpetual]
products: [spot, perpetual]
base_urls:
  rest: https://bitkan.com
  public_ws: wss://bitkan.com/ws
auth:
  private_rest: unsupported; no verified signing scheme
rate_limits:
  bitkan_account_source: { scope: account, interval_ms: 1000, limit: 1 }
  unsupported: { scope: exchange, interval_ms: 1000, limit: 0 }
pagination:
  all: { mode: unsupported }
reconciliation:
  private_state: unsupported
  notes: No verified open-order/account/fill endpoint; adapter must not be promoted to live-dry-run.
batch:
  place: { support: unsupported, reason: bitkan.batch_place_orders_unverified }
  cancel: { support: unsupported, reason: bitkan.batch_cancel_orders_unverified }
websocket:
  public:
    support: unsupported
    helper_only: true
    heartbeat: { mode: unsupported, interval_ms: 30000, timeout_ms: 45000, stale_message_ms: 60000 }
  private:
    support: unsupported
    auth_renewal: { mode: unsupported }

unsupported:
  - operation: get_fees
    reason: "交易所不支持当前费率接口 runtime：未核到稳定官方 BitKan-native fee/account API。"
  - operation: get_balances
    status: project_unimplemented
    source_fixture: tests/fixtures/exchanges/bitkan/request_specs/get_balances_account_source.json
    reason: "BitKan exchange account balances should be modeled through a verified account/balance API, but stable BitKan-native readback docs and signing rules are not implemented in this adapter yet."
  - operation: get_positions
    reason: "交易所不支持当前仓位接口 runtime：当前未核到稳定官方 BitKan-native exchange API、签名规则和仓位生命周期文档。"
  - operation: place_order
    reason: "交易所不支持当前交易/私有接口 runtime：当前未核到稳定官方 BitKan-native exchange trading API、签名规则和订单生命周期文档。"
  - operation: cancel_order
    reason: "交易所不支持当前交易/私有接口 runtime：当前未核到稳定官方 BitKan-native cancel API、签名规则和订单生命周期文档。"
  - operation: query_order
    reason: "交易所不支持当前交易/私有接口 runtime：当前未核到稳定官方 BitKan-native order readback API、签名规则和订单生命周期文档。"
  - operation: get_open_orders
    reason: "交易所不支持当前交易/私有接口 runtime：当前未核到稳定官方 BitKan-native open orders API、签名规则和订单生命周期文档。"
  - operation: get_recent_fills
    reason: "交易所不支持当前交易/私有接口 runtime：当前未核到稳定官方 BitKan-native fills API、签名规则和订单生命周期文档。"

endpoints:
  - operation: symbol_rules
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: GET
    path: /unsupported/bitkan/symbol_rules
    auth: unsupported
    rate_limit_bucket: bitkan_unsupported
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: unsupported_unverified
    reason: bitkan.symbol_rules_unverified
  - operation: order_book
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: GET
    path: /unsupported/bitkan/order_book
    auth: unsupported
    rate_limit_bucket: bitkan_unsupported
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: unsupported_unverified
    reason: bitkan.order_book_unverified
  - operation: get_balances
    product: mixed
    market_types: [spot, perpetual]
    transport: rest
    method: SOURCE_READ
    path: source://bitkan/account-balance-api-unverified
    auth: none
    rate_limit_bucket: bitkan_account_source
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: spec_only
    reason: "Account/balance readback boundary only; shared get_balances runtime remains project-unimplemented pending official BitKan-native account/balance API verification, signing rules, parser, and read-only guard."
    request_spec: { status: fixture_only, fixture: tests/fixtures/exchanges/bitkan/request_specs/get_balances_account_source.json }
    response_parser: { status: planned, fixture: tests/fixtures/exchanges/bitkan/request_specs/get_balances_account_source.json }
  - operation: place_order
    product: spot
    market_types: [spot, perpetual]
    transport: rest
