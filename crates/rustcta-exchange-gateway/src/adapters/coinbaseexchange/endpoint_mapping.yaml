schema_version: 1
exchange: coinbaseexchange
adapter: rustcta_exchange_gateway::adapters::coinbaseexchange
metadata:
  status: validated
  notes: "Task 15 Coinbase Exchange spot-only adapter. Separate from coinbase Advanced Trade/INTX. Sandbox REST URL: https://api-public.sandbox.exchange.coinbase.com."
market_types:
  - spot
products:
  - spot
rest:
  base_url: https://api.exchange.coinbase.com
rate_limits:
  buckets:
    public_rest:
      scope: rest
      interval: 1s
      limit: 10
    private_rest:
      scope: account
      interval: 1s
      limit: 15
    websocket:
      scope: websocket
      interval: 1m
      limit: 100
pagination:
  open_orders:
    style: before_after_cursor
    cursor: response_header_cursor
    limit_param: limit
    max_limit: 100
  recent_fills:
    style: before_after_cursor
    cursor: response_header_cursor
    limit_param: limit
    max_limit: 100
reconciliation:
  private_stream_fallback: rest
  readbacks:
    - get_open_orders
    - get_recent_fills
    - query_order
  after_unknown_place: query_order
  after_unknown_cancel: query_order
  after_ws_gap: rest_order_book_snapshot
batch:
  place_orders:
    support: composed
    mode: composed_sequential
    atomicity: non_atomic
    max_items: 20
    partial_failure: false
  cancel_orders:
    support: composed
    mode: composed_sequential
    atomicity: non_atomic
    max_items: 20
    partial_failure: false
websocket:
  public:
    support: native
    url: wss://ws-feed.exchange.coinbase.com
    subscribe:
      type: subscribe
      payload:
        type: subscribe
        product_ids: ["{product_id}"]
        channels: ["{channel}"]
    channels:
      heartbeat:
        channel: heartbeat
        interval_ms: 1000
        sequence: sequence
      ticker:
        channel: ticker
        sequence: sequence
      trades:
        channel: matches
        sequence: sequence
      orderbook_level2_batch:
        channel: level2_batch
        products: [spot]
        interval_ms: 50
        depth: full_l2_delta
        message_types: [snapshot, l2update]
        auth: none
        sequence: none_in_level2_schema
        update_semantics: absolute_quantity_level_delta
        checksum: none
      orderbook_level2:
        channel: level2
        products: [spot]
        interval_ms: realtime
        depth: full_l2_delta
        message_types: [snapshot, l2update]
        auth: hmac
        sequence: none_in_level2_schema
        update_semantics: absolute_quantity_level_delta
        checksum: none
      orderbook_full:
        channel: full
        products: [spot]
        interval_ms: realtime
        depth: full_l3_events
        message_types: [received, open, done, match, change, activate]
        auth: hmac
        sequence: sequence
        checksum: none
      orderbook_level3:
        channel: level3
        products: [spot]
        interval_ms: realtime
        depth: full_l3_events_compact
        message_types: [schema, open, change, done, match, noop]
        auth: hmac
        sequence: sequence
        checksum: none
    orderbook:
      public_runtime_channel: level2_batch
      public_runtime_interval_ms: 50
      rest_snapshot:
        endpoint_operation: get_order_book
        path: /products/{product_id}/book
        levels: [2, 3]
        sequence_field: sequence
      replay:
        level2_batch: refetch REST snapshot after reconnect or suspected loss; level2 schema does not expose sequence
        full: buffer messages, fetch REST level=3 snapshot, discard sequence <= snapshot sequence, then apply contiguous sequence messages
        level3: same sequence boundary as full after processing initial compact schema
      risk: no checksum; level2_batch is public unauthenticated but sequence-less, full/level3 are sequence-bearing authenticated feeds
    fixtures:
      subscribe_payload: crates/rustcta-exchange-gateway/src/adapters/coinbaseexchange/stream_tests.rs
      parser_snapshot: tests/fixtures/exchanges/coinbaseexchange/ws/public_level2_snapshot.json
      parser_update: tests/fixtures/exchanges/coinbaseexchange/ws/public_level2_batch_update.json
    heartbeat:
      direction: application_message
      channel: heartbeat
    resync: rest_order_book_snapshot
  private:
    support: native
    url: wss://ws-feed.exchange.coinbase.com
    channel: user
    auth: hmac
    signing_payload: timestamp + "GET" + "/users/self/verify"
    fallback: rest_reconciliation
streams:
  - operation: public_orderbook_delta_batch
    transport: websocket
    product: spot
    channel: level2_batch
    auth: none
    support: native
    interval_ms: 50
    depth: full_l2_delta
    message_types: [snapshot, l2update]
    sequence: none_in_level2_schema
    checksum: none
    request_spec:
      status: implemented
      test: crates/rustcta-exchange-gateway/src/adapters/coinbaseexchange/stream_tests.rs
    response_parser:
      status: implemented
      fixtures:
        - tests/fixtures/exchanges/coinbaseexchange/ws/public_level2_snapshot.json
        - tests/fixtures/exchanges/coinbaseexchange/ws/public_level2_batch_update.json
    resync:
      endpoint_operation: get_order_book
      mode: rest_snapshot_after_reconnect_or_suspected_loss
      replay: level2_batch messages have no documented sequence field; rebuild from REST /products/{product_id}/book snapshot
  - operation: public_orderbook_delta_level2
    transport: websocket
    product: spot
    channel: level2
    auth: hmac
    support: native_when_authenticated
    interval_ms: realtime
    depth: full_l2_delta
    message_types: [snapshot, l2update]
    sequence: none_in_level2_schema
    checksum: none
    request_spec:
      status: implemented
      test: crates/rustcta-exchange-gateway/src/adapters/coinbaseexchange/stream_tests.rs
    resync:
      endpoint_operation: get_order_book
      mode: rest_snapshot_after_reconnect_or_suspected_loss
  - operation: public_orderbook_l3_full
    transport: websocket
    product: spot
    channel: full
    auth: hmac
    support: metadata_only
    interval_ms: realtime
    depth: full_l3_events
    message_types: [received, open, done, match, change, activate]
    sequence: sequence
    checksum: none
    resync:
      endpoint_operation: get_order_book
      mode: rest_level3_snapshot_then_sequence_replay
      replay: discard queued messages with sequence <= snapshot sequence, then require contiguous per-product sequence
  - operation: public_orderbook_l3_compact
    transport: websocket
    product: spot
    channel: level3
    auth: hmac
    support: metadata_only
    interval_ms: realtime
    depth: full_l3_events_compact
    message_types: [schema, open, change, done, match, noop]
    sequence: sequence
    checksum: none
    resync:
      endpoint_operation: get_order_book
      mode: rest_level3_snapshot_then_sequence_replay
      replay: parse initial level3 schema, discard queued compact messages with sequence <= snapshot sequence, then require contiguous per-product sequence
endpoints:
  - operation: get_symbol_rules
    product: spot
    transport: rest
    method: GET
    path: /products
    auth: none
    rate_limit_bucket: public_rest
    weight: 1
    request_spec_required: false
    official_doc: https://docs.cdp.coinbase.com/api-reference/exchange-api/rest-api/products/get-all-known-trading-pairs
  - operation: get_order_book
    product: spot
    transport: rest
    method: GET
    path: /products/{product_id}/book
    auth: none
    rate_limit_bucket: public_rest
    weight: 1
    request_spec_required: false
    official_doc: https://docs.cdp.coinbase.com/api-reference/exchange-api/rest-api/products/get-product-book
  - operation: get_balances
    product: spot
    transport: rest
    method: GET
    path: /accounts
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
  - operation: place_order
    product: spot
    transport: rest
    method: POST
    path: /orders
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/coinbaseexchange/request_specs/place_order_limit.json
  - operation: cancel_order
    product: spot
    transport: rest
    method: DELETE
    path: /orders/{order_id}
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/coinbaseexchange/request_specs/cancel_order.json
  - operation: cancel_all_orders
    product: spot
    transport: rest
    method: DELETE
    path: /orders
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
    notes: "Requires product_id in this adapter to keep symbol scope explicit."
  - operation: batch_place_orders
    product: spot
    transport: rest
    method: POST
    path: /composed/coinbaseexchange/batch_place_orders
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: non_atomic
    support: composed
    notes: Gateway-composed sequential single-order placement.
  - operation: batch_cancel_orders
    product: spot
    transport: rest
    method: DELETE
    path: /composed/coinbaseexchange/batch_cancel_orders
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: non_atomic
    support: composed
    notes: Gateway-composed sequential single-order cancel.
  - operation: amend_order
    product: spot
    transport: rest
    method: PATCH
    path: /unsupported/coinbaseexchange/amend_order
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: private_rest
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    support: unsupported
    reason: coinbaseexchange.amend_order_unsupported
  - operation: place_order_list
    product: spot
    transport: rest
    method: POST
    path: /unsupported/coinbaseexchange/order_list
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: private_rest
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    support: unsupported
    reason: coinbaseexchange.order_list_unsupported
  - operation: query_order
    product: spot
    transport: rest
    method: GET
    path: /orders/{order_id}
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
  - operation: get_open_orders
    product: spot
    transport: rest
    method: GET
    path: /orders
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
  - operation: get_recent_fills
    product: spot
    transport: rest
    method: GET
    path: /fills
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
  - operation: get_fees
    product: spot
    transport: rest
    method: GET
    path: /fees
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: private_rest
    weight: 1
    request_spec_required: true
unsupported:
  - operation: contract_product
    reason: Coinbase Exchange API is a spot exchange API; standard futures/perpetual/options products are not exposed by this profile.
  - operation: advanced_trade_brokerage
    reason: "Handled by existing coinbase adapter; not Coinbase Exchange."
  - operation: intx_perpetual
    reason: "Handled by existing coinbase INTX boundary; coinbaseexchange is spot-only."
  - operation: deposits_withdrawals_transfers
    reason: "Funding operations are outside trading runtime."
