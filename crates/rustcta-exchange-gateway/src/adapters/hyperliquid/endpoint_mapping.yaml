schema_version: 1
exchange: hyperliquid
adapter: rustcta_exchange_gateway::adapters::hyperliquid
status_date: "2026-06-08"
metadata:
  status: validated
  source: docs/hyperliquid_adapter.md
  last_reviewed: "2026-06-08"
  notes: USDC perpetual DEX gateway adapter. Public and private read REST use POST /info; signed writes use POST /exchange with L1 action signing.
market_types: [perpetual]
products: [perpetual]
rest:
  base_url: https://api.hyperliquid.xyz
  testnet_base_url: https://api.hyperliquid-testnet.xyz
base_urls:
  public_ws: wss://api.hyperliquid.xyz/ws
  private_ws: wss://api.hyperliquid.xyz/ws
auth:
  private_rest: L1 action secp256k1 signing over msgpack action hash plus EIP-712 Agent domain; API wallet private key must come from env/runtime secret storage only.
  private_ws: address-scoped user subscriptions; signed post requests use same action payload as REST.
rate_limits:
  info: { scope: ip_and_address, retry_after: http_429, default_weight: 2 }
  exchange: { scope: address, retry_after: http_429, default_weight: 1 }
pagination:
  recent_fills: { mode: time_range, since_param: startTime, until_param: endTime, max_limit: 2000 }
  open_orders: { mode: none }
reconciliation:
  private_state: rest_fallback
  after_place: Query orderStatus, openOrders, then userFillsByTime.
  after_cancel: Query orderStatus and openOrders; userFillsByTime resolves race with fills.
  stream_recovery: Resubscribe orderUpdates/userFills/userEvents, then reconcile clearinghouseState, openOrders, and userFillsByTime.
batch:
  place_orders: { support: native, endpoint: /exchange action=order, atomicity: partial, partial_failure: true }
  cancel_orders: { support: native, endpoint: /exchange action=cancel, atomicity: partial, partial_failure: true }
websocket:
  public:
    support: native
    channels: [l2Book, trades, bbo, candle, allMids, activeAssetCtx]
    order_book:
      channels: [l2Book, bbo]
      snapshot: POST /info type=l2Book
      snapshot_depth: 20 levels per side
      update_mode: event-driven; official docs do not publish a fixed millisecond interval.
      push_interval_ms: null
      sequence_fields: []
      sequence_policy: no traditional sequence; use stale-book detection and REST l2Book resync.
      checksum: unsupported
      resync_policy: Rebuild from REST l2Book after disconnect, stale book, or suspicious update ordering.
    heartbeat: { mode: client_ping, interval_ms: 30000, timeout_ms: 90000 }
    resync: { mode: rest_snapshot, endpoint_operation: order_book }
  private:
    support: native_when_wallet_configured
    channels: [orderUpdates, userFills, userEvents, userFundings, userNonFundingLedgerUpdates]
    auth_renewal: { mode: address_subscription }
    resync: { mode: rest_reconciliation, endpoint_operation: open_orders }
unsupported:
  - operation: spot_product
    status: project_unimplemented
    reason: "Official Hyperliquid spotMeta, spot asset contexts, and HIP-1 spot order books exist, but this adapter scope is USDC-settled perpetual metadata/book/account/order lifecycle only; remaining Spot runtime work is spotMeta asset-id mapping, HIP-1 spot l2Book public parsers, spot order/cancel action encoding, open-order/fill/balance private readback, and asset-scope reconciliation guards."
    official_gap: spot_product
    source_boundary_fixture: tests/fixtures/exchanges/hyperliquid/request_specs/product_line_source_boundary.json
    current_scope: "USDC-settled perpetual metadata, book, account, and order lifecycle."
    runtime_gap: "spotMeta/spot asset id mapping, HIP-1 spot order book parser, spot order action encoding, and spot account/fill reconciliation are not wired."
    required_endpoints: [info_spot_meta, info_spot_meta_and_asset_ctxs, info_l2_book_spot, exchange_spot_order, exchange_cancel_spot, info_open_orders_spot, info_user_fills_spot]
  - operation: get_fees
    status: project_unimplemented
    source_type: protocol_fee_schedule
    source_fixture: tests/fixtures/exchanges/hyperliquid/request_specs/get_fees_source_boundary.json
    reason: "Hyperliquid official fee schedule/user tier source is recorded as an offline protocol source; shared account-tier get_fees runtime remains project-unimplemented pending user fee tier readback, asset scope, and discount guard."
endpoints:
  - operation: get_fees
    product: mixed
    market_types: [perpetual, spot]
    transport: rest
    method: GET
    path: /trading/fees
    auth: none
    rate_limit_bucket: hyperliquid_info
    weight: 0
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: spec_only
    reason: "P3 fee boundary: default fee schedule/protocol fee tier source is fixture-backed only; production needs user-tier readback or explicit override."
    official_doc: https://hyperliquid.gitbook.io/hyperliquid-docs/trading/fees
    request_spec:
      fixture: tests/fixtures/exchanges/hyperliquid/request_specs/get_fees_source_boundary.json
  - operation: symbol_rules
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: POST
    path: /info type=meta
    auth: none
    rate_limit_bucket: hyperliquid_info
    weight: 2
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: native
  - operation: order_book
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: POST
    path: /info type=l2Book
    auth: none
    rate_limit_bucket: hyperliquid_info
    weight: 2
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: native
  - operation: balances
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: POST
    path: /info type=clearinghouseState
    auth: api_key
    rate_limit_bucket: hyperliquid_info
    weight: 2
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: native
  - operation: positions
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: POST
    path: /info type=clearinghouseState
    auth: api_key
    rate_limit_bucket: hyperliquid_info
    weight: 2
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: native
  - operation: place_order
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: POST
    path: /exchange action=order
    auth: signed
    credential_scopes: [trade]
    rate_limit_bucket: hyperliquid_exchange
    weight: 1
    request_spec_required: true
    native_batch: true
    atomicity: partial
    testnet: true
    support: native
  - operation: cancel_order
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: POST
    path: /exchange action=cancel|cancelByCloid
    auth: signed
    credential_scopes: [trade]
    rate_limit_bucket: hyperliquid_exchange
    weight: 1
    request_spec_required: true
    native_batch: true
    atomicity: partial
    testnet: true
    support: native
  - operation: open_orders
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: POST
    path: /info type=openOrders
    auth: api_key
    rate_limit_bucket: hyperliquid_info
    weight: 2
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: native
  - operation: recent_fills
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: POST
    path: /info type=userFills|userFillsByTime
    auth: api_key
    rate_limit_bucket: hyperliquid_info
    weight: 2
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: native
  - operation: private_websocket
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: SUBSCRIBE
    path: orderUpdates|userFills|userEvents
    auth: api_key
    rate_limit_bucket: hyperliquid_ws
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: spec_only
