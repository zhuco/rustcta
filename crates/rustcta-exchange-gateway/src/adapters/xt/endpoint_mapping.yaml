schema_version: 1
exchange: xt
adapter: crates/rustcta-exchange-gateway/src/adapters/xt
metadata:
  status: validated
  source: rustcta-exchange-gateway XT spot and USDT-M adapter implementation
  last_reviewed: '2026-06-08'
  notes: Dual-product REST mapping. Spot and USDT-M futures use separate base URLs
    and signing payloads.
market_types:
- spot
- linear_perp
base_urls:
  spot_rest: https://sapi.xt.com
  futures_rest: https://fapi.xt.com
  spot_public_ws: wss://stream.xt.com/public
  spot_private_ws: wss://stream.xt.com/private
  futures_public_ws: wss://fstream.xt.com/ws/market
  futures_private_ws: wss://fstream.xt.com/ws/user
auth:
  spot: HMAC-SHA256 validate-* payload
  futures: HMAC-SHA256 validate-appkey/timestamp path payload
rate_limits:
  public: conservative weight 1 per mapped public REST request
  private: conservative weight 1 per mapped signed REST request
  orders: conservative weight 1 per mapped order request
pagination:
  open_orders: limit only, max 100
  fills: limit only, max 100
batch:
  place: native spot /v4/batch-order; native futures /future/trade/v2/order/atomic-create-batch
  cancel: native spot /v4/batch-order; native futures /future/trade/v1/order/cancel-batch
  atomicity: partial
  max_items: 20
reconciliation:
  private_state: REST fallback via query_order, get_open_orders, and get_recent_fills
    before live-dry-run promotion
websocket:
  support: request-spec/parser/session helpers; shared supervisor/live validation
    remains required
  heartbeat: ping/pong or server ping per adapter stream helpers
  private_auth: listen-key or signed private subscription where supported
  public:
    support: native
    order_book:
      topics:
        - spot depth_update depth500 1000ms
        - futures depth_update depth500 1000ms
      spot:
        topic: depth_update
        fixed_update_interval_ms: 1000
        snapshot_limit: 500
        sequence:
          first_update_id_field: fi
          last_update_id_field: i
          contiguous_required: true
      futures:
        topic: depth_update
        fixed_update_interval_ms: 1000
        snapshot_limit: 500
        sequence:
          first_update_id_field: fu
          last_update_id_field: u
          contiguous_required: true
      checksum: unsupported
      resync: REST order book snapshot, drop stale updates, then enforce fi/i or fu/u continuity
endpoints:
- operation: get_symbol_rules
  product: spot
  transport: rest
  method: GET
  path: /v4/public/symbol
  auth: none
  rate_limit_bucket: public
  weight: 1
  request_spec_required: false
  response_parser:
    status: implemented
    fixture: tests/fixtures/exchanges/xt/spot_symbols.json
    test: crates/rustcta-exchange-gateway/src/adapters/xt/public_tests.rs
- operation: get_symbol_rules_futures
  product: linear_perp
  transport: rest
  method: GET
  path: /future/market/v3/public/symbol/list
  auth: none
  rate_limit_bucket: public
  weight: 1
  request_spec_required: false
