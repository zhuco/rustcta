    fixture: tests/fixtures/exchanges/paymium/request_specs/query_order.json
  notes: 'P2 core readback runtime gate: PAYMIUM_PRIVATE_REST_ENABLED. Fails closed unless PAYMIUM_API_KEY/PAYMIUM_API_SECRET
