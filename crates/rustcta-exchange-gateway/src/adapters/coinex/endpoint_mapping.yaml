schema_version: 1
exchange: coinex
adapter: rustcta_exchange_gateway::adapters::coinex
metadata:
  status: validated
  notes: "Task 11 Spot-only mapping; symbols are uppercase compact BASEQUOTE."
market_types:
  - spot
products:
  - spot
rest:
  base_url: https://api.coinex.com/v2
rate_limits:
  buckets:
    coinex_rest:
      scope: rest
      interval: 1m
      limit: 400
      burst: 40
    coinex_orders:
      scope: orders
      interval: 1m
      limit: 120
      burst: 20
    coinex_ws:
      scope: websocket
      interval: 1m
      limit: 100
      burst: 20
pagination:
  get_recent_fills:
    style: limit_with_time_or_id_cursor
    limit_param: limit
    max_limit: 1000
    since_param: start_time
    until_param: end_time
    cursor_param: last_id
    unsupported_cursors:
      - offset
reconciliation:
  private_stream_fallback: rest
  readbacks:
    - query_order
    - get_open_orders
    - get_recent_fills
  unknown_order_policy: query_by_client_order_id_then_open_orders_then_recent_fills
  live_dry_run_requires:
    - kill_switch
    - disabled_symbol_gate
    - max_notional_gate
batch:
  place_orders:
    support: composed
    mode: composed_sequential
    atomicity: partial
    max_items: 10
    partial_failure: true
  cancel_orders:
    support: composed
    mode: composed_sequential
    atomicity: partial
    max_items: 10
    partial_failure: true
websocket:
  public:
    support: native
    url: wss://socket.coinex.com/v2/spot
    separate_connection: true
    order_book:
      support: native
      channel: depth.subscribe
      channels: [depth.subscribe, depth.update]
      subscribe_method: depth.subscribe
      update_method: depth.update
      depths: [5, 10, 20, 50]
      params_shape:
        field: market_list
        item: [market, limit, interval, is_full]
      push_delay_ms: 200
      full_refresh_interval_ms: 60000
      limits: [5, 10, 20, 50]
      default_limit: 50
      merge_intervals:
        - "0"
        - "0.00000000001"
        - "0.000000000001"
        - "0.0000000001"
        - "0.000000001"
        - "0.00000001"
        - "0.0000001"
        - "0.000001"
        - "0.00001"
        - "0.0001"
        - "0.001"
        - "0.01"
        - "0.1"
        - "1"
        - "10"
        - "100"
        - "1000"
      default_merge_interval: "0"
      full_incremental_semantics:
        full: "is_full=true pushes complete subscribed depth about every 200ms when changed; full market depth refresh arrives about every 1 minute."
        incremental: "is_full=false pushes changed levels about every 200ms when changed; quantity 0 deletes that price level."
      checksum:
        algorithm: crc32
        encoding: signed_i32
        string_order: bid_price:bid_amount...ask_price:ask_amount
        source_field: depth.checksum
        resync_on_mismatch: true
      resync: "Build or rebuild from REST /spot/depth, then resubscribe. Rebuild after reconnect, stale stream, parser error, or checksum mismatch."
    heartbeat:
      method: server.ping
      direction: client_ping
      interval_ms: 30000
      timeout_ms: 10000
    resync: rest_order_book_snapshot
  private:
    support: native
    url: wss://socket.coinex.com/v2/spot
    separate_connection: true
    auth: server.sign
    renewal: relogin
    renewal_interval_ms: 1800000
    fallback: rest_reconciliation
unsupported:
  - operation: contract_product
    status: project_unimplemented
    product_lines: [futures, perpetual]
    boundary: project_unimplemented_product_line
    official_gap: coinex_futures_api_v2
    source_boundary_fixture: tests/fixtures/exchanges/coinex/request_specs/product_line_source_boundary.json
    runtime_isolation: "Current coinex adapter uses Spot v2 REST/WS hosts and must not route futures symbols through spot order, balance or stream paths."
    required_endpoints:
      market_metadata: [futures/perpetual markets, contract specifications, settlement currency and precision rules]
      public_market_data: [futures/perpetual depth, futures/perpetual ticker, futures/perpetual deals]
      private_account: [futures balances or margin account, positions, leverage and risk limits]
      private_order_lifecycle: [futures/perpetual place order, futures/perpetual cancel order, futures/perpetual query/open orders, futures/perpetual fills]
    unsafe_to_promote_without: [CoinEx Futures metadata and depth fixtures, position/leverage/risk parser coverage, futures signing/request specs, post-write order and fills reconciliation]
    reason: "Official CoinEx Futures API is a separate product line; current coinex adapter only maps Spot."
  - operation: futures_product
    status: project_unimplemented
    product_lines: [futures, perpetual]
    boundary: project_unimplemented_product_line
    official_gap: coinex_futures_api_v2
    source_boundary_fixture: tests/fixtures/exchanges/coinex/request_specs/product_line_source_boundary.json
    required_endpoints:
      market_metadata: [futures/perpetual markets, contract specifications]
      private_account: [futures balances or margin account, positions, leverage and risk limits]
      private_order_lifecycle: [futures/perpetual place/cancel/query/open orders, futures/perpetual fills]
    reason: "CoinEx Futures API requires separate market metadata, leverage/risk, position and order runtime wiring."
endpoints:
  - operation: get_symbol_rules
    product: spot
    transport: rest
    method: GET
    path: /spot/market
    auth: none
    rate_limit_bucket: coinex_rest
    weight: 1
    request_spec_required: false
  - operation: get_order_book
    product: spot
    transport: rest
    method: GET
    path: /spot/depth
    auth: none
    rate_limit_bucket: coinex_rest
    weight: 1
    request_spec_required: false
    params:
      - name: market
      - name: limit
      - name: interval
  - operation: get_balances
    product: spot
    transport: rest
    method: GET
    path: /assets/spot/balance
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: coinex_rest
    weight: 1
    request_spec_required: true
  - operation: get_fees
    product: spot
    transport: rest
    method: GET
    path: /spot/market
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: coinex_rest
    weight: 1
    request_spec_required: true
  - operation: place_order
    product: spot
    transport: rest
    method: POST
    path: /spot/order
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: coinex_orders
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/coinex/request_specs/place_order_limit.json
    notes: "Signing vector: tests/fixtures/exchanges/coinex/signing_vectors/private_post_order.json"
  - operation: cancel_order
    product: spot
    transport: rest
    method: DELETE
    path: /spot/order
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: coinex_orders
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/coinex/request_specs/cancel_order.json
  - operation: cancel_all_orders
    product: spot
    transport: rest
    method: POST
    path: /spot/cancel-all-order
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: coinex_orders
    weight: 5
    request_spec_required: true
  - operation: amend_order
    product: spot
    transport: rest
    method: POST
    path: /spot/modify-order
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: coinex_orders
    weight: 1
    request_spec_required: true
  - operation: batch_place_orders
    product: spot
    transport: rest
    method: POST
    path: /composed/coinex/batch_place_orders
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: coinex_orders
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: non_atomic
    support: composed
    notes: Gateway-composed sequential single-order placement.
  - operation: batch_cancel_orders
    product: spot
    transport: rest
    method: POST
    path: /composed/coinex/batch_cancel_orders
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: coinex_orders
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: non_atomic
    support: composed
    notes: Gateway-composed sequential single-order cancel.
  - operation: place_order_list
    product: spot
    transport: rest
    method: POST
    path: /unsupported/coinex/order_list
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: coinex_orders
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    support: unsupported
    reason: coinex.order_list_unsupported
  - operation: query_order
    product: spot
    transport: rest
    method: GET
    path: /spot/order-status
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: coinex_rest
    weight: 1
    request_spec_required: true
    params:
      - any_of: [order_id, client_id]
  - operation: get_open_orders
    product: spot
    transport: rest
    method: GET
    path: /spot/pending-order
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: coinex_rest
    weight: 1
    request_spec_required: true
  - operation: get_recent_fills
    product: spot
    transport: rest
    method: GET
    path: /spot/finished-order
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: coinex_rest
    weight: 1
    request_spec_required: true
    params:
      - name: market
      - name: order_id
      - name: start_time
      - name: end_time
      - name: last_id
      - name: limit
