schema_version: 1
exchange: upbit
adapter: rustcta_exchange_gateway::adapters::upbit
metadata:
  status: validated
  notes: "Task 12 Korean Spot adapter; KRW, BTC, and USDT market codes use QUOTE-BASE."
market_types:
  - spot
products:
  - spot
rest:
  base_url: https://api.upbit.com
rate_limits:
  buckets:
    upbit_rest:
      scope: rest
      interval: 1s
      limit: 10
      burst: 10
    upbit_orders:
      scope: orders
      interval: 1s
      limit: 8
      burst: 8
    upbit_ws:
      scope: websocket
      interval: 1m
      limit: 100
      burst: 10
pagination:
  get_open_orders:
    style: limit_with_cursor
    limit_param: limit
    max_limit: 100
  get_recent_fills:
    style: limit_with_time_or_order_id
    limit_param: limit
    max_limit: 100
reconciliation:
  private_stream_fallback: rest
  readbacks:
    - query_order
    - get_open_orders
    - get_recent_fills
  unknown_order_policy: query_by_exchange_order_id_then_open_orders_then_recent_fills
batch:
  place_orders:
    support: unsupported
    atomicity: unknown
    max_items: 1
  cancel_orders:
    support: unsupported
    atomicity: unknown
    max_items: 1
websocket:
  public:
    support: native
    url: wss://api.upbit.com/websocket/v1
    protocol: websocket_json_array
    regional_urls:
      korea: wss://api.upbit.com/websocket/v1
      singapore: wss://sg-api.upbit.com/websocket/v1
      indonesia: wss://id-api.upbit.com/websocket/v1
      thailand: wss://th-api.upbit.com/websocket/v1
    heartbeat:
      method: ping
      direction: client_ping
      interval_ms: 30000
      timeout_ms: 90000
    resync: rest_order_book_snapshot
    order_book:
      channel: orderbook
      product: spot
      market_types: [spot]
      url: wss://sg-api.upbit.com/websocket/v1
      protocol: websocket_json_array
      request:
        format: ticket_type_codes_format
        ticket_required: true
        type: orderbook
        codes_format: "{code}.{count}"
        code_format: QUOTE-BASE
        supported_unit_counts: [1, 5, 15, 30]
        default_unit_count: 30
        invalid_count_policy: exchange_defaults_to_30
        snapshot_switch: is_only_snapshot
        realtime_switch: is_only_realtime
        format_object: DEFAULT
      depth:
        field: orderbook_units
        unit_count_source: code_suffix
        depths: [1, 5, 15, 30]
        supported_unit_counts: [1, 5, 15, 30]
        default_unit_count: 30
        max_depth_per_side: 30
      update_interval:
        fixed_update_interval_ms: null
        note: "Official public WS docs do not publish a fixed millisecond orderbook cadence."
      sequence:
        fields: []
        timestamp_field: timestamp
        stream_type_field: stream_type
        snapshot_value: SNAPSHOT
        realtime_value: REALTIME
        continuity: unsupported_no_official_sequence
        gap_detection: reconnect_or_stale_stream_only
      checksum:
        supported: false
        field: null
        risk: "No official checksum field; no checksum mismatch risk, but continuity cannot be checksum-validated."
      resync:
        mode: rest_snapshot_rebuild
        rest_endpoint_operation: get_order_book
        rest_endpoint: /v1/orderbook
        triggers: [connect, reconnect, stale_stream, parse_error, suspected_message_loss]
      fixtures:
        subscribe: tests/fixtures/exchanges/upbit/ws/public_orderbook.json
        parser: tests/fixtures/exchanges/upbit/ws/orderbook_snapshot.json
  private:
    support: native_specs_only
    url: wss://api.upbit.com/websocket/v1/private
    auth: authorization_bearer_jwt
    fallback: rest_reconciliation
endpoints:
  - operation: get_symbol_rules
    product: spot
    transport: rest
    method: GET
    path: /v1/market/all
    auth: none
    rate_limit_bucket: upbit_rest
    weight: 1
    request_spec_required: false
  - operation: get_order_book
    product: spot
    transport: rest
    method: GET
    path: /v1/orderbook
    auth: none
    rate_limit_bucket: upbit_rest
    weight: 1
    request_spec_required: false
  - operation: get_balances
    product: spot
    transport: rest
    method: GET
    path: /v1/accounts
    auth: jwt
    credential_scopes: [read_only]
    rate_limit_bucket: upbit_rest
    weight: 1
    request_spec_required: true
  - operation: get_fees
    product: spot
    transport: rest
    method: GET
    path: /v1/orders/chance
    auth: jwt
    credential_scopes: [read_only]
    rate_limit_bucket: upbit_rest
    weight: 1
    request_spec_required: true
  - operation: place_order
    product: spot
    transport: rest
    method: POST
    path: /v1/orders
    auth: jwt
    credential_scopes: [trade]
    rate_limit_bucket: upbit_orders
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/upbit/request_specs/place_order_limit.json
    notes: "JWT request-spec covers query_hash via tests/fixtures/exchanges/upbit/signing_vectors/jwt_query_hash.json."
  - operation: cancel_order
    product: spot
    transport: rest
    method: DELETE
    path: /v1/order
    auth: jwt
    credential_scopes: [trade]
    rate_limit_bucket: upbit_orders
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/upbit/request_specs/cancel_order.json
  - operation: query_order
    product: spot
    transport: rest
    method: GET
    path: /v1/order
    auth: jwt
    credential_scopes: [read_only]
    rate_limit_bucket: upbit_rest
    weight: 1
    request_spec_required: true
  - operation: get_open_orders
    product: spot
    transport: rest
    method: GET
    path: /v1/orders/open
    auth: jwt
    credential_scopes: [read_only]
    rate_limit_bucket: upbit_rest
    weight: 1
    request_spec_required: true
  - operation: get_recent_fills
    product: spot
    transport: rest
    method: GET
    path: /v1/orders/closed
    auth: jwt
    credential_scopes: [read_only]
    rate_limit_bucket: upbit_rest
    weight: 1
    request_spec_required: true
unsupported:
  - operation: contract_product
    reason: "Current official/API reference scope is Spot-only and exposes no standard futures/perpetual/options product line."
  - operation: get_positions
    reason: "Upbit Spot has no derivative position model."
  - operation: amend_order
    reason: "No verified native amend endpoint mapped to the shared Spot amend contract."
  - operation: cancel_all_orders
    reason: "No account-wide native cancel-all mapped; use explicit order reconciliation."
  - operation: batch_place_orders
    reason: "No native atomic batch order endpoint confirmed."
  - operation: batch_cancel_orders
    reason: "No native atomic batch cancel endpoint confirmed."
