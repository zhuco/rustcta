schema_version: 1
exchange: apex
adapter: rustcta_exchange_gateway::adapters::apex
status_date: "2026-06-08"
metadata:
  status: draft
  source: api-docs.pro.apex.exchange official ApeX Omni API documentation
  last_reviewed: "2026-06-08"
  notes: Task 7 G1 implementation. Public perpetual symbol-rules/order-book REST is wired; private writes remain unsupported until zkLink/L2 order signing has deterministic Rust vectors.
market_types: [perpetual]
products: [perpetual]
rest:
  base_url: https://omni.apex.exchange
  testnet_base_url: https://testnet.omni.apex.exchange
base_urls:
  public_ws: wss://quote.omni.apex.exchange/realtime_public?v=2&timestamp=<ts>
  private_ws: wss://quote.omni.apex.exchange/realtime_private?v=2&timestamp=<ts>
auth:
  private_rest: APEX-SIGNATURE, APEX-TIMESTAMP, APEX-API-KEY, APEX-PASSPHRASE
  private_write_extra: zkKeys/L2 payload signature is required for order creation, transfers and withdrawals
rate_limits:
  public_ip: { scope: ip, interval_ms: 60000, limit: 600 }
  private_get: { scope: account, interval_ms: 60000, limit: 600 }
  private_post: { scope: account, interval_ms: 60000, limit: 300 }
  orders: { scope: user, limit: 200 }
pagination:
  open_orders: { mode: page_limit, max_limit: 100 }
  fills: { mode: page_limit_time, max_limit: 100 }
reconciliation:
  private_state: rest_fallback
  stream_recovery: Re-auth private WS, subscribe ws_zk_accounts_v3, then reconcile /v3/account, /v3/open-orders and /v3/fills.
batch:
  place_orders: { support: unsupported, reason: no official native batch place endpoint found }
  cancel_orders: { support: unsupported, reason: no official native batch cancel endpoint found }
websocket:
  public:
    support: native
    channels: [orderBook25, orderBook200, recentlyTrade, instrumentInfo, candle]
    heartbeat: { mode: client_ping, interval_ms: 15000, timeout_ms: 15000 }
    order_book:
      channel: "orderBook{limit}.H.{symbol}"
      topics: ["orderBook25.H.{symbol}", "orderBook200.H.{symbol}"]
      depths: [25, 200]
      interval: "no fixed ms; official docs label high-frequency but do not publish a fixed interval"
      update_mode: snapshot_plus_delta
      ordering: apply_in_timestamp_or_message_id_order
      checksum: unsupported
      resync: disorder_or_gap_rest_snapshot
    resync: { mode: rest_snapshot, endpoint_operation: order_book }
  private:
    support: api_key_login
    channels: [ws_zk_accounts_v3]
    resync: { mode: rest_reconciliation, endpoint_operation: get_open_orders }
unsupported:
  - operation: spot_product
    status: project_unimplemented
    reason: "Official ApeX spot account/wallet and trading clues exist, but this adapter scope is ApeX Omni perpetual public REST plus private request-spec boundaries only; remaining Spot runtime work is spot symbol/order-book public specs, spot wallet/account/balance private readback, spot place/cancel/query/open/fill lifecycle, zkLink/L2 signing scope, and reconciliation guards."
    official_gap: spot_product
    source_boundary_fixture: tests/fixtures/exchanges/apex/request_specs/product_line_source_boundary.json
    current_scope: "ApeX Omni perpetual public REST plus audited private request-spec boundaries."
    runtime_gap: "Spot market metadata, spot wallet/account reads, spot order lifecycle, and parser coverage are not wired into the adapter."
    required_endpoints: [spot_symbols, spot_order_book, spot_account, spot_wallet, spot_place_order, spot_cancel_order, spot_open_orders, spot_fills]
  - operation: get_fees
    reason: "交易所不支持当前费率接口 runtime：未核到可映射成共享 FeeRateSnapshot 的稳定 private fee-tier endpoint。"
endpoints:
  - operation: symbol_rules
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /api/v3/symbols
    auth: none
    rate_limit_bucket: apex_public
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: native
    response_parser: { status: implemented, fixture: tests/fixtures/exchanges/apex/symbols_perpetual.json }
  - operation: order_book
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /api/v3/depth
    auth: none
    rate_limit_bucket: apex_public
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: native
    response_parser: { status: implemented, fixture: tests/fixtures/exchanges/apex/depth_btcusdt.json }
  - operation: get_balances
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /api/v3/account-balance
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: apex_private_get
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: spec_only
    reason: "ApeX account-balance readback is fixture-backed, but shared get_balances runtime remains disabled pending HMAC auth smoke, zkLink/account scope guard, balance parser, and reconciliation."
    request_spec: { status: fixture_only, fixture: tests/fixtures/exchanges/apex/request_specs/get_account_balance.json }
    response_parser: { status: planned, fixture: tests/fixtures/exchanges/apex/request_specs/get_account_balance.json }
  - operation: positions
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /api/v3/account
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: apex_private_get
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: spec_only
    request_spec: { status: fixture_only, fixture: tests/fixtures/exchanges/apex/request_specs/get_account.json }
  - operation: get_open_orders
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /api/v3/open-orders
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: apex_private_get
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: native
    notes: Guarded runtime fails closed unless APEX_PRIVATE_REST_ENABLED/RUSTCTA_APEX_PRIVATE_REST_ENABLED plus API key, API secret and passphrase are configured.
    request_spec: { status: implemented, fixture: tests/fixtures/exchanges/apex/request_specs/get_open_orders.json }
    response_parser: { status: implemented, fixture: tests/fixtures/exchanges/apex/open_orders_success.json }
  - operation: query_order
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /api/v3/order
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: apex_private_get
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: native
    notes: Guarded runtime fails closed unless APEX_PRIVATE_REST_ENABLED/RUSTCTA_APEX_PRIVATE_REST_ENABLED plus API key, API secret and passphrase are configured.
    request_spec: { status: implemented, fixture: tests/fixtures/exchanges/apex/request_specs/query_order.json }
    response_parser: { status: implemented, fixture: tests/fixtures/exchanges/apex/order_success.json }
  - operation: get_recent_fills
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: GET
    path: /api/v3/fills
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: apex_private_get
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: true
    support: native
    notes: Guarded runtime fails closed unless APEX_PRIVATE_REST_ENABLED/RUSTCTA_APEX_PRIVATE_REST_ENABLED plus API key, API secret and passphrase are configured.
    request_spec: { status: implemented, fixture: tests/fixtures/exchanges/apex/request_specs/get_fills.json }
    response_parser: { status: implemented, fixture: tests/fixtures/exchanges/apex/recent_fills_success.json }
  - operation: place_order
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: POST
    path: /api/v3/order
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: apex_private_post
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: non_atomic
    testnet: true
    support: spec_only
    reason: order creation requires zkKeys/L2 payload signature not implemented in Rust gateway
    request_spec: { status: unsupported, fixture: tests/fixtures/exchanges/apex/request_specs/place_order_unsupported_zk.json }
  - operation: cancel_order
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: POST
    path: /api/v3/delete-order
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: apex_private_post
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: non_atomic
    testnet: true
    support: spec_only
    request_spec: { status: fixture_only, fixture: tests/fixtures/exchanges/apex/request_specs/cancel_all_orders.json }
    request_spec: { status: fixture_only, fixture: tests/fixtures/exchanges/apex/request_specs/cancel_order.json }
  - operation: batch_place_orders
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: UNSUPPORTED
    path: /unsupported/apex/batch_place_orders
    auth: unsupported
    rate_limit_bucket: apex_unsupported
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    testnet: false
    support: unsupported
    reason: no official native batch place endpoint found
  - operation: batch_cancel_orders
    product: perpetual
    market_types: [perpetual]
    transport: rest
    method: UNSUPPORTED
    path: /unsupported/apex/batch_cancel_orders
    auth: unsupported
    rate_limit_bucket: apex_unsupported
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    testnet: false
    support: unsupported
