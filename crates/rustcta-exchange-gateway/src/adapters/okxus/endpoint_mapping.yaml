    reason: OKX US private write is disabled pending US credential and product-scope audit.
  - operation: cancel_order
    product: spot
    transport: rest
    method: UNSUPPORTED
    path: /unsupported/okxus/cancel_order
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: unsupported
    weight: 0
    request_spec_required: false
    support: unsupported
    reason: OKX US private write is disabled pending US credential and product-scope audit.
  - operation: cancel_all_orders
    product: spot
    transport: rest
    method: UNSUPPORTED
    path: /unsupported/okxus/cancel_all_orders
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: unsupported
    weight: 0
    request_spec_required: false
    support: unsupported
    reason: OKX US private write is disabled pending US credential and product-scope audit.
  - operation: amend_order
    product: spot
    transport: rest
    method: UNSUPPORTED
    path: /unsupported/okxus/amend_order
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: unsupported
    weight: 0
    request_spec_required: false
    support: unsupported
    reason: OKX US private write is disabled pending US credential and product-scope audit.
  - operation: query_order
    product: spot
