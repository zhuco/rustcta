schema_version: 1
exchange: hashkey_global
adapter: HashKeyGlobalGatewayAdapter
status_date: "2026-06-08"
metadata:
  status: draft
  source: docs/hashkey_global_adapter.md
  last_reviewed: "2026-06-08"
  notes: Task 20 mapping for HashKey Global Spot + futures REST and WS specs.
market_types: [spot, perpetual]
products: [spot, perpetual]
base_urls:
  rest: https://api-glb.hashkey.com
  public_ws: wss://stream-glb.hashkey.com/quote/ws/v1
  private_ws: wss://stream-glb.hashkey.com/api/v1/ws
auth:
  private_rest: X-HK-APIKEY plus timestamp, recvWindow and HMAC-SHA256 signature query parameters
rate_limits:
  public_rest: { scope: ip, interval_ms: 1000, limit: 10 }
  private_rest: { scope: api_key, interval_ms: 1000, limit: 5 }
pagination:
  order_book: { mode: limit, max_limit: 200 }
  open_orders: { mode: limit, max_limit: 1000 }
  recent_fills: { mode: limit, max_limit: 1000 }
reconciliation:
  private_state: rest_fallback
  endpoint_operation: open_orders
  notes: Use account, futures account, query order, open orders and myTrades as REST source of truth after WS reconnect or listen-key renewal.
batch:
  place: { support: composed, atomicity: partial, max_items: null, partial_failure: true }
  cancel: { support: composed, atomicity: partial, max_items: null, partial_failure: true }
websocket:
  public:
    support: spec_only
    heartbeat: { mode: ping_pong, interval_ms: 10000, timeout_ms: 45000 }
    resync: { mode: rest_snapshot, endpoint_operation: order_book }
    channels:
      - depth.300ms.depth200.no_sequence.no_checksum.resync_REST
    order_book:
      topic: depth
      subscribe_event: sub
      update_interval_ms: 300
      supported_depths: [200]
      rest_snapshot_limit_max: 200
      sequence: unsupported_no_official_sequence
      checksum: unsupported_no_official_checksum
      heartbeat: { mode: client_ping, interval_ms: 10000 }
      resync:
        mode: rest_snapshot
        endpoint_operation: order_book
        spot_path: /api/v1/depth
        futures_path: /api/v1/futures/depth
  private:
    support: spec_only
    heartbeat: { mode: ping_pong, interval_ms: 30000, timeout_ms: 45000 }
    auth_renewal: { mode: listen_key_renewal, interval_ms: 1800000, endpoint_operation: listen_key }
    resync: { mode: rest_reconciliation, endpoint_operation: open_orders }
unsupported:
  - operation: amend_order
    status: unsupported
    reason: "No official HashKey Global Spot/Futures amend endpoint is verified for the shared amend_order semantics; current runtime exposes cancel/place and composed batch flows only."
  - operation: place_order_list
    status: unsupported
    reason: "No official HashKey Global OCO/OTO/order-list endpoint is verified as a lossless shared place_order_list model."
endpoints:
  - operation: symbol_rules
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: GET
    path: /api/v1/exchangeInfo
    auth: none
    rate_limit_bucket: hashkey_global_public_rest
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
    notes: Futures symbol rules use /api/v1/futures/exchangeInfo.
  - operation: order_book
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: GET
    path: /api/v1/depth
    auth: none
    rate_limit_bucket: hashkey_global_public_rest
    weight: 1
    request_spec_required: false
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
    notes: Futures order book uses /api/v1/futures/depth.
  - operation: account
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: GET
    path: /api/v1/account
    auth: signed
    credential_scopes: [read_only]
    rate_limit_bucket: hashkey_global_private_rest
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
    request_spec: { status: implemented, test: crates/rustcta-exchange-gateway/src/adapters/hashkey_global/private_tests.rs::hashkey_global_adapter_should_sign_private_readbacks_and_parse_responses }
    notes: Futures balances and positions use /api/v1/futures/account.
  - operation: get_fees
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: GET
    path: /api/v1/account
    auth: signed
    credential_scopes: [read_only]
    rate_limit_bucket: hashkey_global_private_rest
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
    request_spec: { status: implemented, test: crates/rustcta-exchange-gateway/src/adapters/hashkey_global/private_tests.rs::hashkey_global_adapter_should_sign_private_readbacks_and_parse_responses }
    response_parser: { status: implemented, test: crates/rustcta-exchange-gateway/src/adapters/hashkey_global/private_tests.rs::hashkey_global_adapter_should_sign_private_readbacks_and_parse_responses }
    notes: Futures fee readback uses /api/v1/futures/commissionRate.
  - operation: place_order
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: POST
    path: /api/v1/order
    auth: signed
    credential_scopes: [trade]
    rate_limit_bucket: hashkey_global_private_rest
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: non_atomic
    testnet: false
    support: native
    request_spec: { status: implemented, test: crates/rustcta-exchange-gateway/src/adapters/hashkey_global/private_tests.rs::hashkey_global_adapter_should_route_private_order_mutations }
    notes: Futures orders use /api/v1/futures/order.
  - operation: cancel_order
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: DELETE
    path: /api/v1/order
    auth: signed
    credential_scopes: [trade]
    rate_limit_bucket: hashkey_global_private_rest
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: non_atomic
    testnet: false
    support: native
    request_spec: { status: implemented, test: crates/rustcta-exchange-gateway/src/adapters/hashkey_global/private_tests.rs::hashkey_global_adapter_should_route_private_order_mutations }
  - operation: batch_orders
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: POST
    path: /composed/hashkey_global/batch_orders
    auth: signed
    credential_scopes: [trade]
    rate_limit_bucket: hashkey_global_private_rest
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: partial
    testnet: false
    support: composed
    request_spec: { status: implemented, test: crates/rustcta-exchange-gateway/src/adapters/hashkey_global/private_tests.rs::hashkey_global_adapter_should_route_private_order_mutations }
    notes: Gateway-composed sequential single-order calls; not a native atomic endpoint.
  - operation: batch_place_orders
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: POST
    path: /composed/hashkey_global/batch_place_orders
    auth: signed
    credential_scopes: [trade]
    rate_limit_bucket: hashkey_global_private_rest
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: partial
    testnet: false
    support: composed
    notes: Gateway-composed sequential single-order placement; not a native atomic endpoint.
  - operation: batch_cancel_orders
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: DELETE
    path: /composed/hashkey_global/batch_cancel_orders
    auth: signed
    credential_scopes: [trade]
    rate_limit_bucket: hashkey_global_private_rest
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: partial
    testnet: false
    support: composed
    notes: Gateway-composed sequential single-order cancel; not a native atomic endpoint.
  - operation: amend_order
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: PATCH
    path: /unsupported/hashkey_global/amend_order
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: hashkey_global_private_rest
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    testnet: false
    support: unsupported
    reason: hashkey_global.amend_order_not_in_shared_runtime
  - operation: place_order_list
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: POST
    path: /unsupported/hashkey_global/order_list
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: hashkey_global_private_rest
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    testnet: false
    support: unsupported
    reason: hashkey_global.order_list_unsupported
  - operation: open_orders
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: GET
    path: /api/v1/openOrders
    auth: signed
    credential_scopes: [read_only]
    rate_limit_bucket: hashkey_global_private_rest
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
    request_spec: { status: implemented, test: crates/rustcta-exchange-gateway/src/adapters/hashkey_global/private_tests.rs::hashkey_global_adapter_should_sign_private_readbacks_and_parse_responses }
    notes: Futures open orders use /api/v1/futures/openOrders.
  - operation: recent_fills
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: GET
    path: /api/v2/myTrades
    auth: signed
    credential_scopes: [read_only]
    rate_limit_bucket: hashkey_global_private_rest
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
    request_spec: { status: implemented, test: crates/rustcta-exchange-gateway/src/adapters/hashkey_global/private_tests.rs::hashkey_global_adapter_should_sign_private_readbacks_and_parse_responses }
    notes: Futures fills use /api/v1/futures/myTrades.
  - operation: listen_key
    product: spot
    market_types: [spot, perpetual]
    transport: rest
    method: POST
    path: /api/v1/userDataStream
    auth: api_key
    credential_scopes: [read_only]
    rate_limit_bucket: hashkey_global_private_rest
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: not_applicable
    testnet: false
    support: native
    request_spec: { status: implemented, test: crates/rustcta-exchange-gateway/src/adapters/hashkey_global/stream_tests.rs::hashkey_global_private_stream_payloads_and_urls_should_match_docs }
