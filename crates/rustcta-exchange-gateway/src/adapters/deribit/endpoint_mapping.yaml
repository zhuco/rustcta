schema_version: 1
exchange: deribit
adapter: rustcta_exchange_gateway::adapters::deribit
metadata:
  status: validated
  notes: "Task 4 mapping for Deribit options, futures, and perpetual common gateway surface. Option greeks/settlements are adapter-specific helpers."
market_types: [option, futures, perpetual]
products: [option, futures, perpetual]
base_urls:
  rest: https://www.deribit.com
  websocket: wss://www.deribit.com/ws/api/v2
auth:
  rest:
    algorithm: oauth_client_credentials
    token_endpoint: /api/v2/public/auth
    headers: [Authorization]
  websocket:
    algorithm: jsonrpc_public_auth_client_credentials
rate_limits:
  buckets:
    non_matching_engine:
      scope: rest
      interval: 1s
      limit: 20
    matching_engine:
      scope: orders
      interval: 1s
      limit: 20
    ws_private:
      scope: user_stream
      interval: 1s
      limit: 5
pagination:
  recent_fills:
    style: count_cursor_or_time
    endpoint: /api/v2/private/get_user_trades_by_instrument
    limit_param: count
    cursor_param: continuation
    max_limit: 1000
reconciliation:
  private_stream_fallback: rest
  readbacks: [query_order, get_open_orders, get_recent_fills]
  triggers: [place_order_timeout, cancel_order_timeout, private_stream_disconnected]
batch:
  place_orders:
    support: composed
    endpoint: /api/v2/private/buy|sell
    atomicity: non_atomic
  cancel_orders:
    support: composed
    endpoint: /api/v2/private/cancel
    atomicity: non_atomic
websocket:
  public:
    support: native
    heartbeat:
      accepts: ['{"method":"heartbeat"}']
    resync: rest_order_book_snapshot
    order_book:
      channel: book.{instrument_name}.{group}.{depth}.{interval}
      channel_template: book.{instrument_name}.{group}.{depth}.{interval}
      default_channel: book.{instrument_name}.none.20.100ms
      subscription_method: public/subscribe
      groups:
        supported: [none, "1", "2", "5", "10", "25", "100", "250"]
        notes: "Use none for no price grouping; ETH group values are scaled by 1/100 per Deribit API."
      depth:
        supported: [1, 10, 20]
        default: 20
      interval:
        supported: [raw, 100ms, agg2]
        default: 100ms
        notes: "raw is only available to authorized users; public runtime defaults to 100ms."
      sequence:
        change_id: monotonic
        prev_change_id: "every non-initial message must equal previous change_id"
        continuity_action: rest_snapshot_resync
      checksum: none
      snapshot_resync:
        endpoint: /api/v2/public/get_order_book
        params: [instrument_name, depth]
        default_depth: 20
        triggers: [connect, reconnect, prev_change_id_gap, parse_gap]
  private:
    support: native
    auth: client_credentials
    channels: [user.orders.any.any.100ms, user.trades.any.any.100ms, user.portfolio.any]
    fallback: rest_reconciliation
streams:
  - operation: subscribe_public_stream
    scope: public
    channel: book.{instrument_name}.{group}.{depth}.{interval}
    product: mixed
    support: native
    subscription_method: public/subscribe
    default_channel: book.{instrument_name}.none.20.100ms
    groups: [none, "1", "2", "5", "10", "25", "100", "250"]
    depths: [1, 10, 20]
    intervals: [raw, 100ms, agg2]
    sequence_fields: [change_id, prev_change_id]
    checksum: none
    resync: get_order_book
    fixture: tests/fixtures/exchanges/deribit/ws/public_book_grouped.json
unsupported:
  - operation: spot_product
    status: project_unimplemented
    reason: "Official Deribit instruments with kind=spot exist, but this adapter scope is options, futures, and perpetual instruments/order lifecycle only; remaining Spot runtime work is kind=spot instrument filtering, spot order-book/ticker public parsers, private spot buy/sell/open-orders/user-trades specs, balance scope audit, and spot order reconciliation."
    official_gap: spot_product
    source_boundary_fixture: tests/fixtures/exchanges/deribit/request_specs/product_line_source_boundary.json
    current_scope: "Deribit options, futures, and perpetual instruments/order lifecycle."
    runtime_gap: "kind=spot instrument filtering, spot book/ticker parsing, and any spot order/account lifecycle have not been wired."
    required_endpoints: [public_get_instruments_kind_spot, public_get_order_book_spot, public_ticker_spot, private_buy_sell_spot, private_open_orders_spot, private_user_trades_spot]
endpoints:
  - operation: get_symbol_rules
    product: mixed
    transport: rest
    method: GET
    path: /api/v2/public/get_instruments
    auth: none
    rate_limit_bucket: non_matching_engine
    weight: 1
    request_spec_required: false
    response_parser:
      fixture: tests/fixtures/exchanges/deribit/instruments_options.json
  - operation: get_order_book
    product: mixed
    transport: rest
    method: GET
    path: /api/v2/public/get_order_book
    auth: none
    rate_limit_bucket: non_matching_engine
    weight: 1
    request_spec_required: false
    response_parser:
      fixture: tests/fixtures/exchanges/deribit/orderbook_option.json
  - operation: get_balances
    product: mixed
    transport: rest
    method: GET
    path: /api/v2/private/get_account_summary
    auth: bearer
    credential_scopes: [read_only]
    rate_limit_bucket: non_matching_engine
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/deribit/request_specs/get_positions.json
  - operation: get_fees
    product: mixed
    transport: rest
    method: GET
    path: /api/v2/private/get_account_summary
    auth: bearer
    credential_scopes: [read_only]
    rate_limit_bucket: non_matching_engine
    weight: 1
    request_spec_required: true
    support: native
    request_spec:
      fixture: tests/fixtures/exchanges/deribit/request_specs/get_positions.json
    response_parser:
      fixture: tests/fixtures/exchanges/deribit/account_summary.json
  - operation: get_positions
    product: mixed
    transport: rest
    method: GET
    path: /api/v2/private/get_positions
    auth: bearer
    credential_scopes: [read_only]
    rate_limit_bucket: non_matching_engine
    weight: 1
    request_spec_required: true
    response_parser:
      fixture: tests/fixtures/exchanges/deribit/positions.json
  - operation: place_order
    product: mixed
    transport: rest
    method: GET
    path: /api/v2/private/buy|sell
    auth: bearer
    credential_scopes: [trade]
    rate_limit_bucket: matching_engine
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/deribit/request_specs/place_order_option.json
  - operation: cancel_order
    product: mixed
    transport: rest
    method: GET
    path: /api/v2/private/cancel
    auth: bearer
    credential_scopes: [trade]
    rate_limit_bucket: matching_engine
    weight: 1
    request_spec_required: true
  - operation: batch_place_orders
    product: mixed
    market_types: [option, futures, perpetual]
    transport: rest
    method: GET
    path: /api/v2/private/buy|sell
    auth: bearer
    credential_scopes: [trade]
    rate_limit_bucket: matching_engine
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: non_atomic
    support: composed
    notes: Composed by submitting each order through the single-order buy/sell endpoints.
  - operation: batch_cancel_orders
    product: mixed
    market_types: [option, futures, perpetual]
    transport: rest
    method: GET
    path: /api/v2/private/cancel
    auth: bearer
    credential_scopes: [trade]
    rate_limit_bucket: matching_engine
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: non_atomic
    support: composed
    notes: Composed by submitting each cancel through the single-order cancel endpoint.
  - operation: amend_order
    product: mixed
    market_types: [option, futures, perpetual]
    transport: rest
    method: GET
    path: /api/v2/private/edit
    auth: bearer
    credential_scopes: [trade]
    rate_limit_bucket: matching_engine
    weight: 1
    request_spec_required: true
    native_batch: false
    atomicity: non_atomic
    support: native
    notes: Runtime calls private/edit and parses the returned order state.
  - operation: place_order_list
    product: mixed
    market_types: [option, futures, perpetual]
    transport: rest
    method: UNSUPPORTED
    path: /unsupported/deribit/order-list
    auth: unsupported
    credential_scopes: [trade]
    rate_limit_bucket: matching_engine
    weight: 0
    request_spec_required: false
    native_batch: false
    atomicity: unsupported
    support: unsupported
    reason: deribit.order_list_not_in_shared_advanced_model
  - operation: option_chain_helper
    product: option
    transport: rest
    method: GET
    path: /api/v2/public/get_instruments
    auth: none
    rate_limit_bucket: non_matching_engine
    weight: 1
    request_spec_required: false
    notes: "Adapter-specific helper; not exposed as unified ExchangeClient option model."
  - operation: greeks_helper
    product: option
    transport: rest
    method: GET
    path: /api/v2/public/ticker
    auth: none
    rate_limit_bucket: non_matching_engine
    weight: 1
    request_spec_required: false
    response_parser:
      fixture: tests/fixtures/exchanges/deribit/greeks_ticker.json
  - operation: settlement_helper
    product: option
    transport: rest
    method: GET
    path: /api/v2/public/get_last_settlements_by_instrument
    auth: none
    rate_limit_bucket: non_matching_engine
    weight: 1
    request_spec_required: false
    response_parser:
      fixture: tests/fixtures/exchanges/deribit/settlements.json
