schema_version: 1
exchange: kucoin
adapter: rustcta_exchange_gateway::adapters::kucoin
metadata:
  status: validated
  notes: "Task 11 Spot-only mapping; REST and WS symbols use dashed uppercase BASE-QUOTE."
market_types:
  - spot
products:
  - spot
rest:
  base_url: https://api.kucoin.com
rate_limits:
  buckets:
    spot_public:
      scope: rest
      interval: 3s
      limit: 30
    spot_private_hf:
      scope: account
      interval: 3s
      limit: 45
    spot_orders:
      scope: orders
      interval: 3s
      limit: 45
    websocket:
      scope: websocket
      interval: 1m
      limit: 100
pagination:
  open_orders:
    style: currentPage_pageSize
    cursor: offset_or_page_number_token
    limit_param: pageSize
    page_param: currentPage
    max_limit: 500
  recent_fills:
    style: currentPage_pageSize_with_time_window
    cursor: offset_or_page_number_token
    since_param: startAt
    until_param: endAt
    limit_param: pageSize
    page_param: currentPage
    max_limit: 500
reconciliation:
  private_stream_fallback: rest
  readbacks:
    - query_order
    - get_open_orders
    - get_recent_fills
  after_unknown_place: query_order
  after_unknown_cancel: query_order
  after_ws_gap: rest_order_book_snapshot
batch:
  place_orders:
    support: composed
    mode: composed_sequential
    atomicity: non_atomic
    max_items: 20
    partial_failure: false
  cancel_orders:
    support: composed
    mode: composed_sequential
    atomicity: non_atomic
    max_items: 20
    partial_failure: false
websocket:
  public:
    support: native
    url: wss://ws-api-spot.kucoin.com/endpoint
    channels:
      - obu_depth1_realtime_bbo
      - obu_depth5_100ms
      - obu_depth50_100ms
      - obu_increment_realtime
    orderbook:
      subscription_mode: json_subscribe
      channel: obu
      depths: [1, 5, 50, increment]
      push_interval:
        bbo: real_time_no_fixed_ms
        depth5: 100ms
        depth50: 100ms
        increment: real_time_no_fixed_ms
      sequence_fields: [sequenceStart, sequenceEnd, sequence]
      checksum: none
      resync: rest_snapshot_then_replay_delta
      future_migration:
        effective_utc: 2026-06-17
        channel: obu_depth500_increment@10ms
        status: planned_not_current
      source:
        url: https://www.kucoin.com/docs-new/3470221w0
        reviewed_at: 2026-06-08
    heartbeat:
      direction: client_ping
      interval_ms: 20000
      timeout_ms: 10000
    resync: rest_order_book_snapshot
  private:
    support: native
    token_endpoint: /api/v1/bullet-private
    auth: rest_bullet_token
    renewal: refresh_before_expiry
    renew_before_expiry_ms: 3600000
    fallback: rest_reconciliation
unsupported:
  - operation: contract_product
    status: delegated
    delegate_adapter: kucoinfutures
    reason: "KuCoin Futures is handled by the separate kucoinfutures adapter; this kucoin adapter remains Spot-only."
endpoints:
  - operation: get_symbol_rules
    product: spot
    transport: rest
    method: GET
    path: /api/v2/symbols
    auth: none
    rate_limit_bucket: spot_public
    weight: 1
    request_spec_required: false
  - operation: get_order_book
    product: spot
    transport: rest
    method: GET
    path: /api/v1/market/orderbook/level2_20
    auth: none
    rate_limit_bucket: spot_public
    weight: 1
    request_spec_required: false
    notes: "Depth <= 20 uses level2_20; deeper snapshots use level2_100 in code."
  - operation: get_order_book_deep
    product: spot
    transport: rest
    method: GET
    path: /api/v1/market/orderbook/level2_100
    auth: none
    rate_limit_bucket: spot_public
    weight: 1
    request_spec_required: false
  - operation: get_balances
    product: spot
    transport: rest
    method: GET
    path: /api/v1/accounts
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: spot_private_hf
    weight: 1
    request_spec_required: true
  - operation: get_fees
    product: spot
    transport: rest
    method: GET
    path: /api/v1/trade-fees
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: spot_private_hf
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/kucoin/request_specs/trade_fees.json
  - operation: place_order
    product: spot
    transport: rest
    method: POST
    path: /api/v1/hf/orders
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: spot_orders
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/kucoin/request_specs/place_order_limit.json
    notes: "Signing vector: tests/fixtures/exchanges/kucoin/signing_vectors/private_get_accounts.json"
  - operation: cancel_order
    product: spot
    transport: rest
    method: DELETE
    path: /api/v1/hf/orders/{orderId}
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: spot_orders
    weight: 1
    request_spec_required: true
    request_spec:
      fixture: tests/fixtures/exchanges/kucoin/request_specs/cancel_order.json
  - operation: cancel_all_orders
    product: spot
    transport: rest
    method: DELETE
    path: /api/v1/hf/orders
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: spot_orders
    weight: 1
    request_spec_required: true
  - operation: amend_order
    product: spot
    transport: rest
    method: POST
    path: /api/v1/hf/orders/alter
    auth: hmac
    credential_scopes: [trade]
    rate_limit_bucket: spot_orders
    weight: 1
    request_spec_required: true
  - operation: query_order
    product: spot
    transport: rest
    method: GET
    path: /api/v1/hf/orders/{orderId}
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: spot_private_hf
    weight: 1
    request_spec_required: true
  - operation: get_open_orders
    product: spot
    transport: rest
    method: GET
    path: /api/v1/hf/orders/active
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: spot_private_hf
    weight: 1
    request_spec_required: true
  - operation: get_recent_fills
    product: spot
    transport: rest
    method: GET
    path: /api/v1/hf/fills
    auth: hmac
    credential_scopes: [read_only]
    rate_limit_bucket: spot_private_hf
    weight: 1
    request_spec_required: true
  - operation: get_private_bullet_token
    product: spot
    transport: rest
    method: POST
    path: /api/v1/bullet-private
    auth: hmac
    credential_scopes: [read_only, trade]
    rate_limit_bucket: spot_private_hf
    weight: 1
    request_spec_required: true
streams:
  - operation: public_orderbook_bbo
    product: spot
    transport: websocket
    channel: obu_depth1_realtime_bbo
    auth: none
    support: native
    resync:
      endpoint_operation: get_order_book
      mode: rest_snapshot
  - operation: public_orderbook_delta
    product: spot
    transport: websocket
    channel: obu_increment_realtime
    auth: none
    support: native
    sequence: [sequenceStart, sequenceEnd]
    resync:
      endpoint_operation: get_order_book
      mode: rest_snapshot_then_delta_replay
    parser_fixture: tests/fixtures/exchanges/kucoin/ws/obu_increment.json
  - operation: public_orderbook_depth50
    product: spot
    transport: websocket
    channel: obu_depth50_100ms
    auth: none
    support: native
    sequence: [sequence]
    parser_fixture: tests/fixtures/exchanges/kucoin/ws/obu_depth50_snapshot.json
